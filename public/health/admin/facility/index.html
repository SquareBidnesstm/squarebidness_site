<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Facility Inquiries — Admin | Square Bidness Health</title>
<meta name="robots" content="noindex,nofollow" />
<link rel="icon" type="image/png" sizes="32x32" href="/assets/health-32.png" />
<link rel="icon" type="image/png" sizes="16x16" href="/assets/health-16.png" />
<link rel="apple-touch-icon" sizes="180x180" href="/assets/health-180.png" />
<style>
:root{
  --gold:#b79c6e;--gold2:#8f7a55;--bg:#f6f4ef;--ink:#111111;
  --muted:rgba(0,0,0,.60);--card:#ffffff;--line:rgba(0,0,0,.09);
  --shadow:0 4px 24px rgba(0,0,0,.08);--green:#15803d;--green-bg:rgba(34,197,94,.1);
  --green-border:rgba(34,197,94,.25);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}
a{color:inherit;text-decoration:none}
.wrap{max-width:960px;margin:0 auto;padding:0 18px}

.nav{background:#111;border-bottom:1px solid rgba(255,255,255,.08)}
.nav-inner{min-height:56px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.brand{color:#fff;font-weight:700;font-size:14px;letter-spacing:.3px;display:flex;align-items:center;gap:8px}
.brand img{width:24px;height:24px;border-radius:6px}
.nav-links{display:flex;align-items:center;gap:16px}
.nav-back{font-size:13px;color:rgba(255,255,255,.55);transition:.15s}
.nav-back:hover{color:#fff}
.nav-badge{font-size:11px;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,.45)}

#authGate{display:flex;align-items:center;justify-content:center;min-height:calc(100vh - 56px);padding:40px 18px}
.auth-card{background:var(--card);border:1px solid var(--line);border-radius:20px;box-shadow:var(--shadow);padding:36px 32px;width:100%;max-width:380px}
.auth-card h2{font-size:20px;margin-bottom:6px}
.auth-card p{color:var(--muted);font-size:14px;margin-bottom:20px;line-height:1.6}
.auth-card input{width:100%;border:1px solid rgba(0,0,0,.12);border-radius:12px;background:#fff;color:#111;padding:12px 14px;font:inherit;outline:none;transition:border-color .2s,box-shadow .2s;margin-bottom:12px}
.auth-card input:focus{border-color:rgba(183,156,110,.75);box-shadow:0 0 0 4px rgba(183,156,110,.12)}
.auth-card .err{color:#991b1b;font-size:13px;margin-bottom:10px;display:none}

.btn{appearance:none;border:none;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;padding:12px 22px;border-radius:999px;font-weight:600;font-size:14px;letter-spacing:.2px;transition:.2s}
.btn-gold{background:var(--gold);color:#fff;width:100%}
.btn-gold:hover{background:var(--gold2)}
.btn-gold:disabled{opacity:.6;cursor:not-allowed}
.btn-sm{padding:6px 14px;font-size:12px}
.btn-ghost{background:rgba(0,0,0,.05);color:var(--ink)}
.btn-ghost:hover{background:rgba(0,0,0,.09)}

#dashboard{display:none;padding:28px 0 60px}
.dash-header{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:22px;flex-wrap:wrap}
.dash-title{font-size:22px;font-weight:700}
.count-badge{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;letter-spacing:.3px;padding:4px 10px;border-radius:999px;background:rgba(183,156,110,.14);border:1px solid rgba(183,156,110,.28);color:var(--gold2)}

.filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.filter-chip{font-size:12px;font-weight:600;letter-spacing:.4px;padding:6px 14px;border-radius:999px;border:1px solid rgba(0,0,0,.12);background:#fff;cursor:pointer;color:var(--muted);transition:.18s}
.filter-chip.active,.filter-chip:hover{background:#111;color:#fff;border-color:#111}

.f-list{display:grid;gap:14px}
.no-items{padding:52px 0;text-align:center;color:var(--muted);font-size:15px}

.f-card{background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);overflow:hidden}
.f-card-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;padding:16px 20px 12px;border-bottom:1px solid var(--line)}
.f-name{font-size:17px;font-weight:700;margin-bottom:2px}
.f-contact{font-size:13px;color:var(--muted)}
.f-date{font-size:12px;color:var(--muted);margin-top:2px}

.status-badge{flex-shrink:0;font-size:11px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;padding:4px 10px;border-radius:999px;white-space:nowrap}
.s-new{background:rgba(183,156,110,.14);border:1px solid rgba(183,156,110,.28);color:#8f7a55}
.s-contacted{background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.28);color:#1d4ed8}
.s-contracted{background:var(--green-bg);border:1px solid var(--green-border);color:var(--green)}
.s-declined{background:rgba(220,38,38,.08);border:1px solid rgba(220,38,38,.2);color:#991b1b}

.f-card-body{padding:14px 20px;display:grid;gap:10px}
.info-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:6px 16px}
.info-item{font-size:13px;color:var(--muted)}
.info-item strong{display:block;color:var(--ink);font-weight:600;font-size:13px}
.notes-block{font-size:13px;line-height:1.6;color:var(--ink);background:#f8f7f4;border-radius:10px;padding:10px 12px;border-left:3px solid rgba(183,156,110,.4)}
.urgency-high{color:#dc2626;font-weight:700}
.urgency-med{color:#d97706;font-weight:600}

.f-card-foot{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px 20px;border-top:1px solid var(--line);background:rgba(0,0,0,.015);flex-wrap:wrap}
.action-links{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.action-link{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;padding:5px 12px;border-radius:999px;text-decoration:none;transition:.15s}
.link-call{color:#15803d;background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.22)}
.link-call:hover{background:rgba(34,197,94,.2)}
.link-email{color:var(--gold2);background:rgba(183,156,110,.1);border:1px solid rgba(183,156,110,.22)}
.link-email:hover{background:rgba(183,156,110,.2);color:var(--ink)}
.del-btn{background:none;border:none;cursor:pointer;font-size:13px;color:rgba(0,0,0,.25);padding:4px 7px;border-radius:7px;transition:.15s;line-height:1}
.del-btn:hover{color:#dc2626;background:rgba(220,38,38,.08)}
.status-select{font-size:12px;font-weight:600;padding:6px 10px;border-radius:10px;border:1px solid rgba(0,0,0,.12);background:#fff;color:var(--ink);cursor:pointer;outline:none}
.status-select:focus{border-color:rgba(183,156,110,.7)}
.saving{font-size:12px;color:var(--muted);display:none}

.loading{padding:52px 0;text-align:center;color:var(--muted)}
.spinner{width:28px;height:28px;border:2px solid rgba(0,0,0,.1);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:600px){
  .auth-card{padding:26px 20px}
  .f-card-head{flex-direction:column;gap:8px}
  .dash-header{flex-direction:column;align-items:flex-start}
  .info-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<nav class="nav">
  <div class="wrap nav-inner">
    <div class="brand">
      <img src="/assets/health-48.png" alt="Square Bidness Health" />
      Square Bidness Health
    </div>
    <div class="nav-links">
      <a class="nav-back" href="/admin/">← CNA Apps</a>
      <a class="nav-back" href="/admin/questions/">Questions</a>
      <span class="nav-badge">Admin · Facilities</span>
    </div>
  </div>
</nav>

<div id="authGate">
  <div class="auth-card">
    <h2>Admin Access</h2>
    <p>Enter the admin token to view facility inquiries.</p>
    <div id="authErr" class="err">Incorrect token. Try again.</div>
    <input id="tokenInput" type="password" placeholder="Admin token" autocomplete="current-password" />
    <button id="authBtn" class="btn btn-gold" type="button">Enter</button>
  </div>
</div>

<div id="dashboard">
  <div class="wrap">
    <div class="dash-header">
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
        <h1 class="dash-title">Facility Inquiries</h1>
        <span id="countBadge" class="count-badge">— total</span>
      </div>
      <button id="refreshBtn" class="btn btn-ghost btn-sm" type="button">↻ Refresh</button>
    </div>

    <div class="filter-bar" id="filterBar">
      <button class="filter-chip active" data-filter="all">All</button>
      <button class="filter-chip" data-filter="new">New</button>
      <button class="filter-chip" data-filter="contacted">Contacted</button>
      <button class="filter-chip" data-filter="contracted">Contracted</button>
      <button class="filter-chip" data-filter="declined">Declined</button>
    </div>

    <div id="fList" class="f-list">
      <div class="loading"><div class="spinner"></div>Loading inquiries…</div>
    </div>
  </div>
</div>

<script>
(function(){
  const API = "/api/health/admin-facility-inquiries";
  let token = sessionStorage.getItem("health_admin_token") || "";
  let allInquiries = [];
  let activeFilter = "all";

  const authGate  = document.getElementById("authGate");
  const dashboard = document.getElementById("dashboard");
  const authErr   = document.getElementById("authErr");
  const tokenInput= document.getElementById("tokenInput");
  const authBtn   = document.getElementById("authBtn");

  function showDash(){ authGate.style.display="none"; dashboard.style.display="block"; }
  function showAuth(){ authGate.style.display="flex";  dashboard.style.display="none"; }

  authBtn.addEventListener("click", tryAuth);
  tokenInput.addEventListener("keydown", function(e){ if(e.key==="Enter") tryAuth(); });

  async function tryAuth(){
    const t = tokenInput.value.trim();
    if(!t) return;
    authBtn.disabled = true;
    authBtn.textContent = "Checking…";
    authErr.style.display = "none";
    const ok = await fetchInquiries(t);
    authBtn.disabled = false;
    authBtn.textContent = "Enter";
    if(ok){
      token = t;
      sessionStorage.setItem("health_admin_token", t);
      tokenInput.value = "";
      showDash();
    } else {
      authErr.style.display = "block";
    }
  }

  async function fetchInquiries(tok){
    try{
      const r = await fetch(API, { headers:{ "Authorization": "Bearer " + tok } });
      if(r.status === 401) return false;
      if(!r.ok) throw new Error("Server error");
      const data = await r.json();
      allInquiries = data.inquiries || [];
      render();
      updateCount();
      return true;
    }catch(e){
      document.getElementById("fList").innerHTML =
        '<div class="no-items">Error loading inquiries. Check console.</div>';
      return true;
    }
  }

  function render(){
    const list = document.getElementById("fList");
    const filtered = activeFilter === "all"
      ? allInquiries
      : allInquiries.filter(function(i){ return (i.status||"new") === activeFilter; });

    if(!filtered.length){
      list.innerHTML = '<div class="no-items">No inquiries' +
        (activeFilter !== "all" ? ' with status "' + activeFilter + '"' : '') + '.</div>';
      return;
    }
    list.innerHTML = filtered.map(fCard).join("");

    list.querySelectorAll(".status-select").forEach(function(sel){
      sel.addEventListener("change", async function(){
        const id = this.dataset.id;
        const status = this.value;
        const saving = document.getElementById("saving-" + id);
        saving.style.display = "inline";
        try{
          const r = await fetch(API, {
            method:"PATCH",
            headers:{"Content-Type":"application/json","Authorization":"Bearer "+token},
            body: JSON.stringify({id, status}),
          });
          if(r.ok){
            const inq = allInquiries.find(function(x){ return String(x.id)===String(id); });
            if(inq) inq.status = status;
            const badge = document.getElementById("badge-" + id);
            if(badge){ badge.className = "status-badge s-" + status; badge.textContent = status; }
          }
        }finally{
          saving.style.display = "none";
        }
      });
    });

    list.querySelectorAll(".del-btn").forEach(function(btn){
      btn.addEventListener("click", async function(){
        const id = this.dataset.id;
        const name = this.closest(".f-card").querySelector(".f-name").textContent;
        if(!confirm("Remove inquiry from " + name + "? Cannot be undone.")) return;
        const r = await fetch(API, {
          method:"DELETE",
          headers:{"Content-Type":"application/json","Authorization":"Bearer "+token},
          body: JSON.stringify({id}),
        });
        if(r.ok){
          allInquiries = allInquiries.filter(function(i){ return String(i.id) !== String(id); });
          render();
          updateCount();
        }
      });
    });
  }

  function fCard(f){
    const date = f.created_at
      ? new Date(f.created_at).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})
      : "—";

    const status = f.status || "new";
    const urgencyClass = f.urgency === "Urgent — need staff within 48 hours" ? "urgency-high"
      : f.urgency === "Soon — within 1–2 weeks" ? "urgency-med" : "";

    const mailSubject = encodeURIComponent("Re: Staffing Inquiry — " + (f.facility_name||"Your Facility"));
    const mailBody    = encodeURIComponent("Hi " + (f.contact_name||"").split(" ")[0] + ",\n\nThank you for reaching out to Square Bidness Health about staffing support.\n\n");
    const emailLink = f.email
      ? '<a class="action-link link-email" href="https://mail.google.com/mail/?view=cm&fs=1&from=health%40squarebidness.com&to=' + encodeURIComponent(f.email) + '&su=' + mailSubject + '&body=' + mailBody + '" target="_blank" rel="noopener">✉ Email</a>'
      : '';
    const callLink = f.phone
      ? '<a class="action-link link-call" href="tel:' + esc(f.phone.replace(/\D/g,"")) + '">📞 Call</a>'
      : '';

    const infoItems = [
      f.facility_type ? {label:"Type", val:f.facility_type} : null,
      f.parish        ? {label:"Parish", val:f.parish}       : null,
      f.shifts_needed ? {label:"Shifts Needed", val:f.shifts_needed} : null,
      f.urgency       ? {label:"Urgency", val:f.urgency, cls:urgencyClass} : null,
      f.phone         ? {label:"Phone", val:f.phone}         : null,
      f.email         ? {label:"Email", val:f.email}         : null,
    ].filter(Boolean);

    return [
      '<div class="f-card">',
        '<div class="f-card-head">',
          '<div>',
            '<div class="f-name">' + esc(f.facility_name || "—") + '</div>',
            '<div class="f-contact">' + esc(f.contact_name || "") + (f.title ? ' · ' + esc(f.title) : '') + '</div>',
            '<div class="f-date">' + date + (f.parish ? ' · ' + esc(f.parish) : '') + '</div>',
          '</div>',
          '<span id="badge-' + f.id + '" class="status-badge s-' + status + '">' + status + '</span>',
        '</div>',
        '<div class="f-card-body">',
          '<div class="info-grid">',
            infoItems.map(function(it){
              return '<div class="info-item"><strong>' + esc(it.label) + '</strong><span class="' + (it.cls||'') + '">' + esc(it.val) + '</span></div>';
            }).join(""),
          '</div>',
          (f.notes ? '<div class="notes-block">' + esc(f.notes) + '</div>' : ''),
        '</div>',
        '<div class="f-card-foot">',
          '<div class="action-links">' + callLink + emailLink + '</div>',
          '<div style="display:flex;align-items:center;gap:8px">',
            '<span id="saving-' + f.id + '" class="saving">Saving…</span>',
            '<select class="status-select" data-id="' + f.id + '">',
              ['new','contacted','contracted','declined'].map(function(s){
                return '<option value="' + s + '"' + (status===s?' selected':'') + '>' + s + '</option>';
              }).join(""),
            '</select>',
            '<button class="del-btn" data-id="' + f.id + '" title="Remove">✕</button>',
          '</div>',
        '</div>',
      '</div>',
    ].join("");
  }

  function updateCount(){
    const badge = document.getElementById("countBadge");
    const counts = {};
    ["new","contacted","contracted","declined"].forEach(function(s){
      counts[s] = allInquiries.filter(function(i){ return (i.status||"new") === s; }).length;
    });
    if(badge) badge.textContent = allInquiries.length + " total · " + (counts.new||0) + " new";
    document.querySelectorAll(".filter-chip").forEach(function(chip){
      const f = chip.dataset.filter;
      chip.textContent = f === "all"
        ? "All (" + allInquiries.length + ")"
        : f.charAt(0).toUpperCase() + f.slice(1) + " (" + (counts[f]||0) + ")";
    });
  }

  function esc(s){
    return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }

  document.getElementById("filterBar").addEventListener("click", function(e){
    const chip = e.target.closest(".filter-chip");
    if(!chip) return;
    document.querySelectorAll(".filter-chip").forEach(function(c){ c.classList.remove("active"); });
    chip.classList.add("active");
    activeFilter = chip.dataset.filter;
    render();
  });

  document.getElementById("refreshBtn").addEventListener("click", function(){
    if(token) fetchInquiries(token);
  });

  if(token){ showDash(); fetchInquiries(token); } else { showAuth(); }
})();
</script>
</body>
</html>
