<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />

  <title>Philson Le Fleuriste — Socials & Contact</title>
  <meta name="description" content="Connect with Philson Le Fleuriste on social media or reach out directly." />
  <link rel="canonical" href="https://www.squarebidness.com/philson-le-fleuriste/socials/" />

  <script defer src="/scripts/ga.js"></script>
  <script defer src="/scripts/sb-analytics.js"></script>

  <style>
    :root{
      --bg:#f8f5ef;
      --paper:#ffffff;
      --line:#e6ddd0;
      --text:#1d1a16;
      --muted:#6f675e;
      --dark:#111;
      --rose:#f4d5dc;
      --shadow:0 16px 46px rgba(0,0,0,.08);
      --radius:22px;
      --max:860px;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:ui-sans-serif,system-ui;
      background:var(--bg);
      color:var(--text);
    }

    .wrap{
      width:min(var(--max),calc(100% - 24px));
      margin:0 auto;
      padding:40px 0;
    }

    .brand{
      text-align:center;
      margin-bottom:30px;
    }

    .brand img{
      width:220px;
    }

    h1{
      text-align:center;
      font-family:Georgia,serif;
      font-weight:500;
      margin:20px 0 10px;
    }

    p{
      text-align:center;
      color:var(--muted);
      margin:0 0 30px;
    }

    .card{
      background:#fff;
      border:1px solid var(--line);
      border-radius:var(--radius);
      padding:26px;
      box-shadow:var(--shadow);
    }

    .stack{
      display:flex;
      flex-direction:column;
      gap:14px;
    }

    .btn{
      display:flex;
      align-items:center;
      justify-content:center;
      padding:16px;
      border-radius:999px;
      border:1px solid var(--line);
      background:#fff;
      font-weight:900;
      text-decoration:none;
      color:var(--text);
      transition:.15s;
    }

    .btn:hover{
      transform:translateY(-1px);
      box-shadow:var(--shadow);
    }

    .primary{
      background:var(--dark);
      color:#fff;
      border-color:var(--dark);
    }

    .soft{
      background:var(--rose);
      border-color:#ebc0cb;
    }

    .contact{
      margin-top:24px;
      padding-top:18px;
      border-top:1px solid var(--line);
      text-align:center;
      font-size:14px;
      color:var(--muted);
    }

    .contact div{
      margin-top:6px;
    }

    footer{
      text-align:center;
      margin-top:30px;
      font-size:13px;
      color:var(--muted);
    }
  </style>
</head>

<body>
  <div class="wrap">

    <div class="brand">
      <img src="/philson-le-fleuriste/assets/philson_logo.png" alt="Philson Le Fleuriste">
    </div>

    <h1>Follow the work. Connect the right way.</h1>

    <p>
      View Philson’s floral work across platforms or start a request to book properly.
    </p>

    <div class="card">
      <div class="stack">

        <a class="btn" href="https://www.instagram.com/philsonlefleuriste/" target="_blank">View Instagram</a>

        <a class="btn" href="https://www.facebook.com/FlowersbyPhilson" target="_blank">View Facebook</a>

        <a class="btn" href="https://www.tiktok.com/@philsonlefleurist" target="_blank">View TikTok</a>

        <a class="btn primary" href="/philson-le-fleuriste/deposit/">Start Deposit Request</a>

        <a class="btn soft" href="sms:+18326520062">Text Eddie</a>

      </div>

      <div class="contact">
        <div>Phone: +1 832-652-0062</div>
        <div>Email: flowersbyphilson@hotmail.com</div>
      </div>
    </div>

    <footer>
      © <span id="y"></span> Philson Le Fleuriste
    </footer>

  </div>

  <script>
    document.getElementById("y").textContent = new Date().getFullYear();
  </script>

</body>
</html>
