<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Invoice Generator — Philson Le Fleuriste</title>
  <meta name="robots" content="noindex,nofollow" />
  <link rel="icon" href="/philson-le-fleuriste/assets/icons/favicon-48.png" type="image/png" />
  <link rel="apple-touch-icon" href="/philson-le-fleuriste/assets/icons/icon-180.png" />
  <style>
    /* ---- reset ---- */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f0efec; color: #111; min-height: 100vh; }

    /* ---- layout ---- */
    .app {
      display: grid;
      grid-template-columns: 360px 1fr;
      min-height: 100vh;
    }
    @media (max-width: 860px) {
      .app { grid-template-columns: 1fr; }
    }

    /* ---- form panel ---- */
    .form-panel {
      background: #1a1a1a;
      color: #e5e7eb;
      padding: 1.5rem;
      overflow-y: auto;
      position: sticky;
      top: 0;
      height: 100vh;
    }
    @media (max-width: 860px) {
      .form-panel { position: static; height: auto; }
    }
    .form-panel h2 {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: #8b1a1a;
      margin-bottom: 1.25rem;
    }
    .form-section {
      margin-bottom: 1.4rem;
      padding-bottom: 1.4rem;
      border-bottom: 1px solid #2a2a2a;
    }
    .form-section:last-of-type { border-bottom: none; }
    .form-section h3 {
      font-size: .72rem;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: #888;
      margin-bottom: .75rem;
    }
    label {
      display: block;
      font-size: .8rem;
      color: #aaa;
      margin-bottom: .25rem;
      margin-top: .6rem;
    }
    input, textarea {
      width: 100%;
      background: #242424;
      border: 1px solid #333;
      border-radius: 6px;
      color: #e5e7eb;
      font-size: .9rem;
      padding: .5rem .65rem;
      outline: none;
      transition: border-color .15s;
      font-family: inherit;
    }
    input:focus, textarea:focus { border-color: #8b1a1a; }
    textarea { resize: vertical; min-height: 52px; }
    .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: .5rem; }

    /* ---- line items ---- */
    .item-block {
      background: #242424;
      border-radius: 8px;
      padding: .75rem;
      margin-bottom: .6rem;
      position: relative;
    }
    .item-block .remove-btn {
      position: absolute;
      top: .5rem;
      right: .5rem;
      background: none;
      border: none;
      color: #666;
      cursor: pointer;
      font-size: 1rem;
      line-height: 1;
      padding: .2rem .4rem;
      border-radius: 4px;
    }
    .item-block .remove-btn:hover { color: #cc3333; background: rgba(204,51,51,.1); }
    .add-item-btn {
      width: 100%;
      background: none;
      border: 1px dashed #333;
      border-radius: 6px;
      color: #888;
      font-size: .85rem;
      padding: .55rem;
      cursor: pointer;
      transition: border-color .15s, color .15s;
      font-family: inherit;
    }
    .add-item-btn:hover { border-color: #8b1a1a; color: #e5e7eb; }

    /* ---- action buttons ---- */
    .actions { margin-top: 1.5rem; display: flex; flex-direction: column; gap: .6rem; }
    .btn-print {
      background: #8b1a1a;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: .95rem;
      font-weight: 700;
      padding: .8rem 1rem;
      cursor: pointer;
      letter-spacing: .03em;
      font-family: inherit;
    }
    .btn-print:hover { background: #a51f1f; }
    .btn-reset {
      background: none;
      color: #666;
      border: 1px solid #333;
      border-radius: 8px;
      font-size: .85rem;
      padding: .6rem 1rem;
      cursor: pointer;
      font-family: inherit;
    }
    .btn-reset:hover { color: #aaa; border-color: #555; }

    /* ---- preview panel ---- */
    .preview-panel {
      background: #e8e7e4;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2.5rem 1.5rem;
      min-height: 100vh;
    }

    /* ---- INVOICE DOCUMENT ---- */
    .invoice-doc {
      background: #fff;
      width: 720px;
      max-width: 100%;
      padding: 48px 52px;
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      box-shadow: 0 4px 32px rgba(0,0,0,.12);
      border-radius: 4px;
    }

    /* logo */
    .inv-logo {
      display: block;
      width: 220px;
      height: auto;
      margin: 0 auto 20px;
    }

    /* red rule */
    .inv-rule {
      border: none;
      border-top: 2.5px solid #8b1a1a;
      margin: 0 0 0;
    }
    .inv-rule-thin {
      border: none;
      border-top: 1px solid #ccc;
      margin: 0;
    }

    /* header row */
    .inv-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #f4f4f4;
      padding: 10px 16px;
      margin: 0 -52px;
      padding-left: 52px;
      padding-right: 52px;
    }
    .inv-header-title {
      font-size: 1.4rem;
      font-weight: 900;
      letter-spacing: .04em;
    }
    .inv-header-meta {
      font-size: .83rem;
      color: #555;
      text-align: right;
    }

    /* bill to / event details */
    .inv-info-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin: 20px 0;
    }
    .inv-info-box {
      border-left: 3px solid #8b1a1a;
      padding: 10px 12px;
      background: #fafafa;
      border-radius: 0 4px 4px 0;
    }
    .inv-info-label {
      font-size: .65rem;
      font-weight: 900;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: #8b1a1a;
      margin-bottom: 6px;
    }
    .inv-info-name { font-weight: 700; font-size: .95rem; }
    .inv-info-line { font-size: .85rem; color: #555; margin-top: 2px; }
    .inv-info-detail {
      font-size: .85rem;
      display: flex;
      gap: 8px;
      margin-top: 3px;
    }
    .inv-info-detail-key { color: #888; min-width: 60px; font-weight: 600; }
    .inv-info-detail-val { color: #333; }

    /* table */
    .inv-table {
      width: 100%;
      border-collapse: collapse;
      margin: 8px 0 0;
    }
    .inv-table thead tr {
      background: #1a1a1a;
      color: #fff;
    }
    .inv-table th {
      font-size: .78rem;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      padding: 10px 14px;
      text-align: left;
    }
    .inv-table th:last-child { text-align: right; }
    .inv-table td {
      padding: 14px 14px;
      border-bottom: 1px solid #eee;
      vertical-align: top;
    }
    .inv-table td:last-child { text-align: right; font-weight: 700; font-size: 1rem; }
    .inv-item-desc { font-weight: 700; font-size: .95rem; }
    .inv-item-sub { font-size: .82rem; color: #777; margin-top: 3px; }

    /* totals */
    .inv-totals {
      display: flex;
      justify-content: flex-end;
      margin: 16px 0;
    }
    .inv-totals-box {
      background: #1a1a1a;
      color: #fff;
      border-radius: 6px;
      min-width: 220px;
      overflow: hidden;
    }
    .inv-totals-row {
      display: flex;
      justify-content: space-between;
      padding: 9px 16px;
      font-size: .85rem;
      color: #aaa;
      border-bottom: 1px solid #8b1a1a;
    }
    .inv-totals-row-total {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 16px;
    }
    .inv-total-label { color: #8b1a1a; font-weight: 700; font-size: .88rem; letter-spacing: .06em; text-transform: uppercase; }
    .inv-total-amount { font-size: 1.4rem; font-weight: 900; }

    /* payment instructions */
    .inv-payment {
      border: 1.5px solid #8b1a1a;
      border-radius: 6px;
      padding: 14px 16px;
      background: #fef9f9;
      margin-top: 12px;
    }
    .inv-payment-label {
      font-size: .65rem;
      font-weight: 900;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: #8b1a1a;
      margin-bottom: 6px;
    }
    .inv-payment-note { font-size: .88rem; color: #555; }
    .inv-payment-name { font-weight: 700; font-size: .95rem; margin-top: 2px; }

    /* empty item placeholder */
    .inv-table .no-items td {
      color: #bbb;
      font-style: italic;
      font-size: .88rem;
      text-align: center;
    }

    /* ---- print styles ---- */
    @media print {
      * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
      body { background: #fff; }
      .form-panel { display: none !important; }
      .app { display: block; }
      .preview-panel {
        display: block;
        padding: 0;
        background: #fff;
        min-height: auto;
      }
      .invoice-doc {
        width: 100%;
        max-width: 100%;
        padding: 32px 40px;
        box-shadow: none;
        border-radius: 0;
      }
      .actions { display: none; }
    }

    /* ---- notes area ---- */
    .inv-notes {
      margin-top: 12px;
      font-size: .82rem;
      color: #888;
      font-style: italic;
      min-height: 0;
    }
  </style>
</head>
<body>
  <div class="app">

    <!-- FORM PANEL -->
    <aside class="form-panel">
      <h2>Invoice Builder</h2>

      <div class="form-section">
        <h3>Invoice Info</h3>
        <label>Invoice # <span id="inv-number-badge" style="font-size:.65rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;background:#1e3a1e;color:#4ade80;border-radius:4px;padding:.1rem .35rem;margin-left:.3rem;">auto</span></label>
        <input type="text" id="inv-number" value="Loading…" readonly style="opacity:.6;cursor:default;" />
        <label>Date</label>
        <input type="date" id="inv-date" />
      </div>

      <div class="form-section">
        <h3>Bill To</h3>
        <label>Company / Name</label>
        <input type="text" id="bt-name" placeholder="Robinson Family Mortuary" />
        <label>Address</label>
        <input type="text" id="bt-addr1" placeholder="1815 Military Hwy" />
        <div class="row-2">
          <div>
            <label>City</label>
            <input type="text" id="bt-city" placeholder="Pineville" />
          </div>
          <div>
            <label>State &amp; Zip</label>
            <input type="text" id="bt-state" placeholder="LA 71360" />
          </div>
        </div>
      </div>

      <div class="form-section">
        <h3>Event Details</h3>
        <label>Name</label>
        <input type="text" id="ev-name" placeholder="Robinson Wedding" />
        <label>Event Date</label>
        <input type="date" id="ev-date" />
        <label>Location</label>
        <input type="text" id="ev-location" placeholder="St. James Catholic Church" />
      </div>

      <div class="form-section">
        <h3>Line Items</h3>
        <div id="items-container"></div>
        <button class="add-item-btn" onclick="addItem()">+ Add Line Item</button>
      </div>

      <div class="form-section">
        <h3>Payment</h3>
        <label>Checks Payable To</label>
        <input type="text" id="pay-to" value="Eddie Philson" />
        <label>Notes (optional)</label>
        <textarea id="inv-notes" placeholder="Thank you for your business." rows="2"></textarea>
      </div>

      <div class="actions">
        <button class="btn-print" id="generate-btn" onclick="generatePDF()">&#x2193; Generate PDF</button>
        <button class="btn-reset" onclick="resetForm()">Reset Form</button>
      </div>
    </aside>

    <!-- PREVIEW PANEL -->
    <div class="preview-panel">
      <div class="invoice-doc" id="invoice-preview">

        <img class="inv-logo" src="/philson-le-fleuriste/assets/philson_logo.png" alt="Philson Le Fleuriste" />
        <hr class="inv-rule" />

        <div class="inv-header">
          <div class="inv-header-title">INVOICE</div>
          <div class="inv-header-meta">
            Invoice #<span id="p-inv-number">2026-001</span> &nbsp;|&nbsp; Date: <span id="p-inv-date"></span>
          </div>
        </div>

        <div class="inv-info-row">
          <div class="inv-info-box">
            <div class="inv-info-label">Bill To</div>
            <div class="inv-info-name" id="p-bt-name">&mdash;</div>
            <div class="inv-info-line" id="p-bt-addr1"></div>
            <div class="inv-info-line" id="p-bt-citystate"></div>
          </div>
          <div class="inv-info-box">
            <div class="inv-info-label">Event Details</div>
            <div class="inv-info-detail">
              <span class="inv-info-detail-key">Name:</span>
              <span class="inv-info-detail-val" id="p-ev-name">&mdash;</span>
            </div>
            <div class="inv-info-detail">
              <span class="inv-info-detail-key">Date:</span>
              <span class="inv-info-detail-val" id="p-ev-date">&mdash;</span>
            </div>
            <div class="inv-info-detail">
              <span class="inv-info-detail-key">Location:</span>
              <span class="inv-info-detail-val" id="p-ev-location">&mdash;</span>
            </div>
          </div>
        </div>

        <table class="inv-table">
          <thead>
            <tr>
              <th>Description</th>
              <th>Amount</th>
            </tr>
          </thead>
          <tbody id="p-items-body">
            <tr class="no-items">
              <td colspan="2">No items added yet</td>
            </tr>
          </tbody>
        </table>

        <div class="inv-totals">
          <div class="inv-totals-box">
            <div class="inv-totals-row">
              <span>SUBTOTAL</span>
              <span id="p-subtotal">$0.00</span>
            </div>
            <div class="inv-totals-row-total">
              <span class="inv-total-label">Total Due</span>
              <span class="inv-total-amount" id="p-total">$0.00</span>
            </div>
          </div>
        </div>

        <div class="inv-payment">
          <div class="inv-payment-label">Payment Instructions</div>
          <div class="inv-payment-note">Please make checks payable to:</div>
          <div class="inv-payment-name" id="p-pay-to">Eddie Philson</div>
        </div>

        <div class="inv-notes" id="p-notes"></div>

      </div>
    </div>

  </div>

  <script>
    // Set today's date as default
    const today = new Date();
    document.getElementById('inv-date').valueAsDate = today;

    // ---- Invoice number backend ----
    async function loadNextNumber() {
      try {
        const r = await fetch('/api/philson/invoice-counter');
        const data = await r.json();
        if (data.ok) setInvNumber(data.invoiceNumber, true);
      } catch (_) {
        setInvNumber('2026-001', false);
      }
    }

    function setInvNumber(num, auto) {
      const el = document.getElementById('inv-number');
      const badge = document.getElementById('inv-number-badge');
      el.value = num;
      el.style.opacity = auto ? '.6' : '1';
      el.style.cursor = auto ? 'default' : 'text';
      el.readOnly = auto;
      badge.style.display = auto ? '' : 'none';
      updatePreview();
    }

    async function generatePDF() {
      const btn = document.getElementById('generate-btn');
      btn.textContent = 'Reserving…';
      btn.disabled = true;
      try {
        const r = await fetch('/api/philson/invoice-counter', { method: 'POST' });
        const data = await r.json();
        if (data.ok) setInvNumber(data.invoiceNumber, true);
      } catch (_) {
        // API down — still allow print with current number
      } finally {
        btn.textContent = '↓ Generate PDF';
        btn.disabled = false;
        window.print();
      }
    }

    // Format date for display
    function formatDate(dateStr) {
      if (!dateStr) return '';
      const d = new Date(dateStr + 'T00:00:00');
      return d.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
    }

    // Items array
    let items = [];
    let itemCounter = 0;

    function addItem(desc = '', sub = '', amount = '') {
      const id = ++itemCounter;
      items.push({ id, desc, sub, amount });
      renderItemBlocks();
      updatePreview();
    }

    function removeItem(id) {
      items = items.filter(i => i.id !== id);
      renderItemBlocks();
      updatePreview();
    }

    function renderItemBlocks() {
      const container = document.getElementById('items-container');
      container.innerHTML = '';
      items.forEach((item, idx) => {
        const block = document.createElement('div');
        block.className = 'item-block';
        block.innerHTML = `
          <button class="remove-btn" onclick="removeItem(${item.id})" title="Remove">&#x2715;</button>
          <label>Description</label>
          <input type="text" value="${esc(item.desc)}" oninput="updateItem(${item.id},'desc',this.value)" placeholder="Jones Casket Spray — White and Gold" />
          <label>Sub-description (optional)</label>
          <input type="text" value="${esc(item.sub)}" oninput="updateItem(${item.id},'sub',this.value)" placeholder="Floral arrangement — Saturday, June 27, 2026" />
          <label>Amount ($)</label>
          <input type="number" step="0.01" min="0" value="${esc(item.amount)}" oninput="updateItem(${item.id},'amount',this.value)" placeholder="425.00" />
        `;
        container.appendChild(block);
      });
    }

    function esc(str) {
      return String(str || '').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function updateItem(id, field, value) {
      const item = items.find(i => i.id === id);
      if (item) { item[field] = value; updatePreview(); }
    }

    function formatMoney(val) {
      const n = parseFloat(val) || 0;
      return '$' + n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
    }

    function updatePreview() {
      // Header
      const num = document.getElementById('inv-number').value || '—';
      document.getElementById('p-inv-number').textContent = num;

      const dateVal = document.getElementById('inv-date').value;
      document.getElementById('p-inv-date').textContent = formatDate(dateVal);

      // Bill to
      const btName = document.getElementById('bt-name').value;
      const btAddr = document.getElementById('bt-addr1').value;
      const btCity = document.getElementById('bt-city').value;
      const btState = document.getElementById('bt-state').value;
      document.getElementById('p-bt-name').textContent = btName || '—';
      document.getElementById('p-bt-addr1').textContent = btAddr;
      document.getElementById('p-bt-addr1').style.display = btAddr ? '' : 'none';
      const cityState = [btCity, btState].filter(Boolean).join(', ');
      document.getElementById('p-bt-citystate').textContent = cityState;
      document.getElementById('p-bt-citystate').style.display = cityState ? '' : 'none';

      // Event
      document.getElementById('p-ev-name').textContent = document.getElementById('ev-name').value || '—';
      const evDateVal = document.getElementById('ev-date').value;
      if (evDateVal) {
        const evD = new Date(evDateVal + 'T00:00:00');
        document.getElementById('p-ev-date').textContent = evD.toLocaleDateString('en-US', {
          weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
        });
      } else {
        document.getElementById('p-ev-date').textContent = '—';
      }
      document.getElementById('p-ev-location').textContent = document.getElementById('ev-location').value || '—';

      // Items table
      const tbody = document.getElementById('p-items-body');
      tbody.innerHTML = '';
      if (items.length === 0) {
        const tr = document.createElement('tr');
        tr.className = 'no-items';
        tr.innerHTML = '<td colspan="2">No items added yet</td>';
        tbody.appendChild(tr);
      } else {
        items.forEach(item => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td>
              <div class="inv-item-desc">${escHtml(item.desc || '—')}</div>
              ${item.sub ? `<div class="inv-item-sub">${escHtml(item.sub)}</div>` : ''}
            </td>
            <td>${formatMoney(item.amount)}</td>
          `;
          tbody.appendChild(tr);
        });
      }

      // Totals
      const total = items.reduce((sum, i) => sum + (parseFloat(i.amount) || 0), 0);
      document.getElementById('p-subtotal').textContent = formatMoney(total);
      document.getElementById('p-total').textContent = formatMoney(total);

      // Payment
      document.getElementById('p-pay-to').textContent = document.getElementById('pay-to').value || 'Eddie Philson';

      // Notes
      const notes = document.getElementById('inv-notes').value;
      document.getElementById('p-notes').textContent = notes;
      document.getElementById('p-notes').style.display = notes ? '' : 'none';
    }

    function escHtml(str) {
      return String(str || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    function resetForm() {
      if (!confirm('Clear the form and start over?')) return;
      document.getElementById('inv-date').valueAsDate = new Date();
      ['bt-name','bt-addr1','bt-city','bt-state','ev-name','ev-date','ev-location','inv-notes'].forEach(id => {
        document.getElementById(id).value = '';
      });
      document.getElementById('pay-to').value = 'Eddie Philson';
      items = [];
      itemCounter = 0;
      renderItemBlocks();
      updatePreview();
      loadNextNumber();
    }

    // Wire up all inputs to live update
    const formInputs = ['inv-number','inv-date','bt-name','bt-addr1','bt-city','bt-state',
                        'ev-name','ev-date','ev-location','pay-to','inv-notes'];
    formInputs.forEach(id => {
      const el = document.getElementById(id);
      if (el) el.addEventListener('input', updatePreview);
    });

    // Initial render
    addItem();
    updatePreview();
    loadNextNumber();
  </script>
</body>
</html>
