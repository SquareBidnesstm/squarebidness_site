<body>
 <header>
  <div class="wrap">
    <div class="topbar">
      <a class="brandmark" href="/philson-le-fleuriste/" aria-label="Philson Le Fleuriste home">
        <img src="/philson-le-fleuriste/assets/philson_logo.png" alt="Philson Le Fleuriste logo" />
      </a>
    </div>
  </div>
</header>

  <main>
    <div class="wrap">

      <section id="deposit-form">
        <div class="section-head">
          <h2>Deposit request form</h2>
        </div>

        <div class="card">
          <form id="philsonDepositForm">

            <div class="field-grid two">
              <div>
                <label for="fullName">Full Name</label>
                <input id="fullName" name="fullName" required />
              </div>

              <div>
                <label for="phone">Phone</label>
                <input id="phone" name="phone" required />
              </div>
            </div>

            <div class="field-grid two">
              <div>
                <label for="projectType">Project Type</label>
                <select id="projectType" name="projectType" required>
                  <option value="">Select one</option>
                  <option value="Wedding">Wedding</option>
                  <option value="Event">Event</option>
                  <option value="Funeral Tribute">Funeral Tribute</option>
                  <option value="Casket Spray">Casket Spray</option>
                  <option value="Luxury Bouquet">Luxury Bouquet</option>
                  <option value="Custom Tribute">Custom Tribute</option>
                  <option value="Other Custom Work">Other Custom Work</option>
                </select>
              </div>

              <div>
                <label for="eventDate">Date Needed</label>
                <input id="eventDate" type="date" name="eventDate" required />
              </div>
            </div>

            <div class="field-grid two">
              <div>
                <label for="budget">Budget Range</label>
                <select id="budget" name="budget" required>
                  <option value="">Select one</option>
                  <option value="$250 - $500">$250 - $500</option>
                  <option value="$500 - $750">$500 - $750</option>
                  <option value="$750 - $1,000">$750 - $1,000</option>
                  <option value="$1,000 - $2,500">$1,000 - $2,500</option>
                  <option value="$2,500+">$2,500+</option>
                  <option value="Not sure yet">Not sure yet</option>
                </select>
                <div class="helper">Starting prices may change based on color changes, rush timing, delivery, setup, or custom additions.</div>
              </div>

              <div>
                <label for="deliveryType">Pickup / Delivery / Setup</label>
                <select id="deliveryType" name="deliveryType">
                  <option value="">Select one</option>
                  <option value="Pickup">Pickup</option>
                  <option value="Delivery">Delivery</option>
                  <option value="On-Site Setup">On-Site Setup</option>
                  <option value="Not Sure Yet">Not Sure Yet</option>
                </select>
              </div>
            </div>

            <div>
              <label for="details">Details</label>
              <textarea id="details" name="details" required></textarea>
            </div>

            <div id="formStatus" class="status" aria-live="polite"></div>

            <div class="actions">
              <button class="btn primary" type="submit">Submit Request</button>
            </div>

          </form>
        </div>
      </section>
    </div>
  </main>

  <footer>
    <div class="wrap">
      <div class="footer-inner">
        <div>© <span id="y"></span> Philson Le Fleuriste</div>

        <div class="footer-links">
          <a href="/philson-le-fleuriste/" data-sb-action="footer_home" data-sb-component="footer" data-sb-label="home">Home</a>
          <a href="/philson-le-fleuriste/casket-sprays/" data-sb-action="footer_casket_sprays" data-sb-component="footer" data-sb-label="casket-sprays">Casket Sprays</a>
          <a href="/philson-le-fleuriste/tributes/" data-sb-action="footer_tributes" data-sb-component="footer" data-sb-label="tributes">Tribute Gallery</a>
          <a href="/philson-le-fleuriste/funeral-floral-tributes/" data-sb-action="footer_funeral" data-sb-component="footer" data-sb-label="funeral-tributes">Funeral Tributes</a>
          <a href="/philson-le-fleuriste/socials/" data-sb-action="footer_socials" data-sb-component="footer" data-sb-label="socials">Socials</a>
        </div>
      </div>
    </div>
  </footer>

  <script>
    document.getElementById("y").textContent = new Date().getFullYear();

    const form = document.getElementById("philsonDepositForm");
    const statusEl = document.getElementById("formStatus");
    const depositParams = new URLSearchParams(window.location.search);

    const incomingProjectType = depositParams.get("projectType");
    const incomingDesign = depositParams.get("design");
    const incomingPrice = depositParams.get("price");

    function showStatus(type, message) {
      statusEl.className = "status show " + type;
      statusEl.innerHTML = message;
    }

    if (incomingProjectType && form.projectType) {
      form.projectType.value = incomingProjectType;
    }

    if (incomingDesign && form.details) {
      form.details.value =
        "Selected Design: " + incomingDesign + "\n" +
        "Listed Price: " + (incomingPrice || "Not listed") + "\n\n" +
        "Please include service date, city, delivery location, color preferences, and any family notes.";

      showStatus(
        "ok",
        "<strong>" + incomingDesign + " selected.</strong><br>Continue filling out your request below."
      );
    }

    form.addEventListener("submit", async function (e) {
      e.preventDefault();

      const submitBtn = form.querySelector('button[type="submit"]');

      const data = {
        fullName: form.fullName.value.trim(),
        phone: form.phone.value.trim(),
        projectType: form.projectType.value,
        eventDate: form.eventDate.value,
        budget: form.budget.value,
        deliveryType: form.deliveryType.value,
        details: form.details.value.trim(),
        source: "philson-deposit-page"
      };

      if (!data.fullName || !data.phone || !data.projectType || !data.eventDate || !data.budget || !data.details) {
        showStatus("err", "Please complete all required fields before submitting your deposit request.");
        return;
      }

      try {
        if (submitBtn) {
          submitBtn.disabled = true;
          submitBtn.textContent = "Submitting...";
        }

        showStatus("ok", "Submitting your request...");

        const response = await fetch("/api/philson/deposit-request", {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify(data)
        });

        const result = await response.json();

        if (!response.ok || !result.ok) {
          throw new Error(result.error || "Request failed");
        }

        showStatus(
          "ok",
          `
          <strong>Request received.</strong><br>
          Your deposit request has been sent into Philson’s booking lane.<br><br>
          <strong>Request ID:</strong> ${result.requestId || "Pending"}<br><br>
          <strong>What happens next:</strong><br>
          1. The request is reviewed for date, scope, and fit.<br>
          2. If approved, deposit/payment instructions are confirmed.<br>
          3. Once deposit is handled, the project moves into production.
          `
        );

        form.reset();

      } catch (error) {
        showStatus("err", "Something went wrong submitting the request. Please try again or use the Contact / Socials page.");
        console.error("Philson deposit submit error:", error);
      } finally {
        if (submitBtn) {
          submitBtn.disabled = false;
          submitBtn.textContent = "Submit Request";
        }
      }
    });
  </script>
