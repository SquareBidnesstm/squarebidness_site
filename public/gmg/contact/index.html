<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Jason Gill - Gill Media Group</title>
  <meta name="description" content="Contact Jason Gill of Gill Media Group. Save contact, call, text, or scan the QR code." />
  <meta name="robots" content="index,follow" />
  <meta name="theme-color" content="#12183a" />
  <meta name="color-scheme" content="dark light" />
  <meta name="format-detection" content="telephone=no" />

  <link rel="canonical" href="https://www.squarebidness.com/gmg/contact/" />
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="apple-touch-icon" href="assets/gill.png" />

  <meta property="og:type" content="profile" />
  <meta property="og:site_name" content="Square Bidness" />
  <meta property="og:title" content="Jason Gill - Gill Media Group" />
  <meta property="og:description" content="Save Jason Gill's contact card." />
  <meta property="og:url" content="https://www.squarebidness.com/gmg/contact/" />
  <meta property="og:image" content="https://www.squarebidness.com/gmg/contact/assets/gill.png" />
  <meta property="og:image:alt" content="Jason Gill contact card" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Jason Gill - Gill Media Group" />
  <meta name="twitter:description" content="Save Jason Gill's contact card." />
  <meta name="twitter:image" content="https://www.squarebidness.com/gmg/contact/assets/gill.png" />

  <script defer src="/scripts/ga.js"></script>
  <script defer src="/scripts/sb-analytics.js"></script>
  <script defer src="/scripts/meta-pixel.js"></script>
  <script defer src="/scripts/sb-meta-bridge.js"></script>

  <style>
    :root{
      --ink:#f9fbff;
      --muted:rgba(249,251,255,.74);
      --soft:rgba(249,251,255,.58);
      --panel:rgba(54,62,112,.62);
      --panel2:rgba(69,77,132,.72);
      --line:rgba(255,255,255,.20);
      --deep:#10153a;
      --blue:#bfe3ef;
      --lav:#ddd5f0;
      --radius:34px;
      --shadow:0 34px 90px rgba(7,10,35,.48);
    }

    *{box-sizing:border-box}
    html{min-height:100%;background:#10153a;overflow-x:hidden}
    body{
      min-height:100%;
      margin:0;
      font-family:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      color:var(--ink);
      background:
        radial-gradient(circle at 78% 8%, rgba(197,237,240,.58), transparent 32%),
        radial-gradient(circle at 16% 16%, rgba(225,211,244,.72), transparent 34%),
        linear-gradient(160deg,#c9bfd7 0%,#809fac 40%,#465886 70%,#11082f 100%);
      overflow-x:hidden;
    }

    a{color:inherit;text-decoration:none}
    button,a{-webkit-tap-highlight-color:transparent}

    .shell{
      width:100%;
      max-width:520px;
      min-height:100svh;
      margin:0 auto;
      padding:clamp(18px,4vw,26px);
      display:flex;
      flex-direction:column;
      gap:18px;
      position:relative;
      overflow:hidden;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      min-height:54px;
      padding-top:env(safe-area-inset-top);
    }

    .round-btn{
      width:58px;
      height:58px;
      border-radius:50%;
      border:1px solid rgba(255,255,255,.62);
      background:rgba(255,255,255,.28);
      color:#10153a;
      display:grid;
      place-items:center;
      font-weight:950;
      font-size:2rem;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.48),0 12px 30px rgba(0,0,0,.12);
    }

    .pill{
      min-height:58px;
      padding:0 24px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.58);
      background:rgba(221,246,255,.52);
      color:#0e172d;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      font-weight:900;
      font-size:1.15rem;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.58),0 12px 30px rgba(0,0,0,.10);
    }

    .hero{
      text-align:center;
      padding:10px 0 0;
    }

    .avatar{
      width:178px;
      height:178px;
      margin:0 auto 10px;
      border-radius:50%;
      display:grid;
      place-items:center;
      background:rgba(94,107,145,.42);
      border:1px solid rgba(255,255,255,.18);
      box-shadow:inset 0 10px 24px rgba(0,0,0,.12),0 20px 40px rgba(0,0,0,.10);
      color:rgba(255,255,255,.78);
      font-size:5rem;
      font-weight:900;
      letter-spacing:-.08em;
    }

    h1{
      margin:0;
      font-size:clamp(2.72rem,11.2vw,4.2rem);
      line-height:.92;
      letter-spacing:-.055em;
      font-weight:950;
      text-shadow:0 10px 26px rgba(0,0,0,.18);
      max-width:100%;
      overflow-wrap:normal;
    }

    .company{
      margin:12px 0 0;
      color:rgba(255,255,255,.88);
      font-size:clamp(1.12rem,4.8vw,1.42rem);
      font-weight:850;
    }

    .quick-actions{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:8px;
      margin:12px 0 4px;
    }

    .action{
      aspect-ratio:1;
      border-radius:50%;
      background:rgba(63,72,126,.68);
      border:1px solid rgba(255,255,255,.10);
      box-shadow:0 16px 34px rgba(20,22,60,.22);
      display:grid;
      place-items:center;
      color:white;
      font-size:clamp(1rem,4vw,1.35rem);
      font-weight:900;
      min-width:0;
    }

    .action[aria-disabled="true"]{
      opacity:.42;
      pointer-events:none;
    }

    .row-card,
    .info-card,
    .qr-card{
      border:1px solid rgba(255,255,255,.10);
      background:var(--panel);
      backdrop-filter:blur(18px);
      -webkit-backdrop-filter:blur(18px);
      box-shadow:var(--shadow);
    }

    .row-card{
      min-height:84px;
      border-radius:28px;
      display:grid;
      grid-template-columns:58px 1fr 28px;
      align-items:center;
      gap:14px;
      padding:14px 18px;
    }

    .row-icon{
      width:56px;
      height:56px;
      border-radius:50%;
      display:grid;
      place-items:center;
      background:linear-gradient(145deg,#c6d9ff,#7688d8);
      color:white;
      font-size:1.6rem;
      font-weight:950;
    }

    .row-title{
      display:block;
      font-size:1.08rem;
      color:var(--muted);
      font-weight:700;
    }

    .row-main{
      display:block;
      margin-top:3px;
      font-size:1.35rem;
      line-height:1.1;
      font-weight:850;
    }

    .chev{
      font-size:2rem;
      line-height:1;
      color:rgba(255,255,255,.74);
    }

    .info-card{
      border-radius:32px;
      padding:22px 24px;
    }

    .line{
      display:grid;
      gap:4px;
      padding:0 0 18px;
      margin:0 0 18px;
      border-bottom:1px solid rgba(255,255,255,.46);
    }

    .line:last-child{
      border-bottom:0;
      margin-bottom:0;
      padding-bottom:0;
    }

    .label{
      color:#fff;
      font-size:1.2rem;
      font-weight:800;
    }

    .value{
      color:rgba(255,255,255,.70);
      font-size:1.38rem;
      line-height:1.2;
      font-weight:650;
    }

    .qr-card{
      border-radius:32px;
      padding:18px;
      display:grid;
      grid-template-columns:132px 1fr;
      gap:16px;
      align-items:center;
    }

    .qr-card img{
      width:132px;
      height:132px;
      display:block;
      border-radius:18px;
      background:#fff;
      padding:8px;
    }

    .qr-copy h2{
      margin:0;
      font-size:1.25rem;
      line-height:1.1;
    }

    .qr-copy p{
      margin:8px 0 0;
      color:rgba(255,255,255,.72);
      line-height:1.35;
      font-size:.98rem;
      font-weight:650;
    }

    .save{
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:72px;
      border-radius:999px;
      background:#fff;
      color:#10153a;
      font-weight:950;
      font-size:1.34rem;
      box-shadow:0 24px 50px rgba(0,0,0,.22);
      margin-top:auto;
    }

    .footer{
      padding:0 0 calc(12px + env(safe-area-inset-bottom));
      text-align:center;
      color:rgba(255,255,255,.68);
      font-size:.88rem;
      font-weight:700;
    }

    .footer a{
      font-weight:900;
    }

    @media (max-width:390px){
      .shell{padding:14px;gap:14px}
      .avatar{width:148px;height:148px;font-size:4.2rem}
      .quick-actions{gap:9px}
      .qr-card{grid-template-columns:112px 1fr}
      .qr-card img{width:112px;height:112px}
      .value{font-size:1.18rem}
    }
  </style>
</head>
<body>
  <main class="shell" aria-labelledby="contact-name">
    <header class="topbar" aria-label="Contact controls">
      <a class="round-btn" href="/gmg/" aria-label="Back to Gill Media Group">‹</a>
      <a class="pill" href="jason-gill.vcf">Save</a>
    </header>

    <section class="hero" aria-label="Jason Gill">
      <div class="avatar" aria-hidden="true">G</div>
      <h1 id="contact-name">Jason Gill</h1>
      <p class="company">Gill Media Group</p>
    </section>

    <nav class="quick-actions" aria-label="Quick contact actions">
      <a class="action" href="sms:+17135942912" aria-label="Text Jason Gill">Msg</a>
      <a class="action" href="tel:+17135942912" aria-label="Call mobile number">Call</a>
      <a class="action" href="tel:+18322447640" aria-label="Call work number">Work</a>
      <span class="action" aria-disabled="true" aria-label="Email not provided">Mail</span>
    </nav>

    <a class="row-card" href="jason-gill.vcf" data-sb-action="contact_save" data-sb-component="jason_gill">
      <span class="row-icon" aria-hidden="true">G</span>
      <span>
        <span class="row-title">Contact Card</span>
        <span class="row-main">Save Jason Gill</span>
      </span>
      <span class="chev" aria-hidden="true">›</span>
    </a>

    <section class="info-card" aria-label="Contact details">
      <a class="line" href="tel:+17135942912">
        <span class="label">Mobile</span>
        <span class="value">(713) 594-2912</span>
      </a>
      <a class="line" href="tel:+18322447640">
        <span class="label">Work</span>
        <span class="value">+1 (832) 244-7640</span>
      </a>
      <div class="line">
        <span class="label">Notes</span>
        <span class="value">Gill Media Group</span>
      </div>
    </section>

    <section class="qr-card" aria-label="QR code to save contact">
      <a href="jason-gill.vcf" aria-label="Open Jason Gill contact card">
        <img src="assets/gmg-contact-qr.png" alt="QR code for Jason Gill contact card" />
      </a>
      <div class="qr-copy">
        <h2>Scan To Save</h2>
        <p>Point a phone camera here to open the Jason Gill contact card.</p>
      </div>
    </section>

    <a class="save" href="jason-gill.vcf" data-sb-action="contact_save_primary" data-sb-component="jason_gill">
      Save Contact
    </a>

    <footer class="footer">
      <a href="/">Square Bidness</a> contact lane
    </footer>
  </main>

  <script>
    document.querySelectorAll('a[href$=".vcf"]').forEach((btn) => {
      btn.addEventListener("click", () => {
        const original = btn.textContent;
        if (!original || original.length > 20) return;
        btn.textContent = "Opening...";
        setTimeout(() => {
          btn.textContent = original;
        }, 1800);
      });
    });
  </script>
</body>
</html>
