<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Jason Gill - Gill Media Group QR</title>
  <meta name="description" content="Scan to open Jason Gill's Gill Media Group contact card." />
  <meta name="robots" content="index,follow" />
  <meta name="theme-color" content="#000000" />
  <link rel="canonical" href="https://www.squarebidness.com/gmg/contact/qr/" />
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Jason Gill - Gill Media Group QR" />
  <meta property="og:description" content="Scan to open Jason Gill's contact card." />
  <meta property="og:url" content="https://www.squarebidness.com/gmg/contact/qr/" />
  <meta property="og:image" content="https://www.squarebidness.com/gmg/contact/assets/gill.png" />
  <style>
    :root{
      --bg:#030303;
      --panel:#141414;
      --line:#2c2c2c;
      --text:#f7f7f7;
      --muted:#a7a7ad;
      --white:#fff;
    }
    *{box-sizing:border-box}
    html,body{margin:0;min-height:100%;background:#000;color:var(--text);font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;overflow-x:hidden}
    body{display:grid;place-items:center;padding:clamp(18px,3vw,34px)}
    .phone{
      width:min(100vw,720px);
      max-width:720px;
      min-height:min(92svh,980px);
      border:2px solid var(--line);
      border-radius:52px;
      background:
        radial-gradient(circle at 50% 4%,rgba(255,255,255,.1),transparent 24%),
        linear-gradient(180deg,#191919 0%,#050505 58%,#000 100%);
      padding:clamp(24px,4vw,46px);
      display:flex;
      flex-direction:column;
      gap:28px;
      box-shadow:0 34px 90px rgba(0,0,0,.65);
      overflow:hidden;
    }
    .brand{
      display:flex;
      align-items:center;
      gap:18px;
      min-height:74px;
    }
    .mark{
      width:74px;
      height:74px;
      flex:0 0 auto;
      border-radius:22px;
      display:grid;
      place-items:center;
      background:#050505;
      border:1px solid #242424;
      color:#fff;
      font-weight:1000;
      font-size:1.35rem;
      letter-spacing:-.08em;
    }
    .brand h1{
      margin:0;
      color:var(--muted);
      font-size:clamp(1.45rem,4vw,2.1rem);
      line-height:1.1;
      font-weight:700;
      letter-spacing:-.04em;
    }
    .qr-wrap{
      width:100%;
      min-width:0;
      background:var(--white);
      border-radius:38px;
      padding:clamp(28px,5vw,58px);
      overflow:hidden;
      box-shadow:0 22px 70px rgba(0,0,0,.45);
    }
    .qr-wrap img{
      width:100%;
      height:auto;
      display:block;
      image-rendering:pixelated;
    }
    .button{
      min-height:84px;
      border-radius:999px;
      background:#fff;
      color:#000;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:0 24px;
      font-weight:950;
      font-size:clamp(1.35rem,4.5vw,2.15rem);
      text-decoration:none;
      margin-top:auto;
    }
    .hint{
      margin:0;
      color:#8f8f96;
      text-align:center;
      font-weight:800;
      letter-spacing:.02em;
    }
    @media(max-width:720px){
      body{padding:0}
      .phone{width:min(100vw,430px);min-height:100svh;border-radius:0;border:0}
      .brand{gap:14px}
      .mark{width:62px;height:62px;border-radius:18px}
    }
  </style>
</head>
<body>
  <main class="phone" aria-label="Gill Media Group contact QR">
    <header class="brand">
      <div class="mark" aria-hidden="true">GMG</div>
      <h1>Jason Gill · Gill Media Group</h1>
    </header>
    <section class="qr-wrap" aria-label="QR code">
      <img src="/gmg/contact/assets/gmg-contact-qr.png" alt="QR code for Jason Gill Gill Media Group contact card" />
    </section>
    <a class="button" href="/gmg/contact/">Open Contact Card</a>
    <p class="hint">squarebidness.com/gmg/contact/</p>
  </main>
</body>
</html>
