<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Puff's Table Tent</title>
<style>
  body {
    margin: 0;
    background: #fff;
  }

  .sheet {
    width: 10.25in;
    height: 7.25in;
    position: relative;
    font-family: Arial, sans-serif;
  }

  .panel {
    width: 5in;
    height: 7in;
    position: absolute;
    top: 0.125in;
    background: #2B1B12;
    color: #fff;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 0.5in;
    box-sizing: border-box;
  }

  .left {
    left: 0.125in;
  }

  .right {
    right: 0.125in;
  }

  .logo {
    font-size: 28px;
    font-weight: bold;
    margin-bottom: 20px;
    color: #D4AF37;
    text-align: center;
  }

  .cta {
    font-size: 20px;
    letter-spacing: 2px;
    margin-bottom: 10px;
  }

  .sub {
    font-size: 14px;
    opacity: 0.8;
    margin-bottom: 20px;
  }

  .qr {
    width: 180px;
    height: 180px;
    background: #fff;
    padding: 10px;
  }

  .tag {
    margin-top: 15px;
    font-size: 12px;
    letter-spacing: 2px;
  }

</style>
</head>
<body>

<div class="sheet">

  <!-- LEFT PANEL (FRONT) -->
  <div class="panel left">
    <div class="logo">PUFF’S SMOKEHOUSE</div>
    <div class="cta">ORDER ONLINE</div>
    <div class="sub">Ponchatoula, Louisiana</div>

    <img class="qr" src="puffs_qr.png" />

    <div class="tag">SCAN TO ORDER</div>
  </div>

  <!-- RIGHT PANEL (BACK / CATERING SIDE) -->
  <div class="panel right">
    <div class="logo">PUFF’S SMOKEHOUSE</div>
    <div class="cta">CATERING AVAILABLE</div>
    <div class="sub">Events • Parties • Bulk Orders</div>

    <img class="qr" src="puffs_catering_qr.png" />

    <div class="tag">SCAN FOR CATERING</div>
  </div>

</div>

</body>
</html>
