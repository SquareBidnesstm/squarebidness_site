  <style>
    :root{
      --bg:#0b0b0b;
      --card:#121212;
      --text:#f3f3f3;
      --muted:#b8b8b8;
      --line:rgba(255,255,255,.10);
      --btn:#ffffff;
      --btnText:#0b0b0b;
      --btnGhost:rgba(255,255,255,.10);
      --shadow:0 12px 40px rgba(0,0,0,.45);
      --r:18px;
      --max:900px;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      background: radial-gradient(1200px 600px at 30% -10%, rgba(255,255,255,.08), transparent 55%),
                  radial-gradient(800px 500px at 90% 20%, rgba(255,255,255,.06), transparent 55%),
                  var(--bg);
      color:var(--text);
      font:16px/1.45 system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
    }
    a{color:inherit}
    .wrap{max-width:var(--max); margin:0 auto; padding:28px 18px 40px}
    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--r);
      box-shadow:var(--shadow);
      padding:22px;
    }
    h1{margin:0 0 10px;font-size:clamp(2rem,5vw,3rem)}
    p{color:var(--muted)}
    .btnrow{display:flex;gap:12px;flex-wrap:wrap;margin-top:18px}
    .btn{
      display:inline-flex;align-items:center;justify-content:center;
      padding:12px 16px;border-radius:14px;text-decoration:none;font-weight:800;
      border:1px solid transparent;
    }
    .btn.primary{background:var(--btn);color:var(--btnText)}
    .btn.ghost{background:var(--btnGhost);color:var(--text);border-color:var(--line)}
    .tiny{font-size:.92rem;color:#9e9e9e;margin-top:14px}
  </style>
</head>
<body>
  <div class="wrap">
    <section class="card">
      <h1>Puff’s daily orders now run through the menu lane.</h1>
      <p>
        For plates and pickup orders, build your cart on the menu page and pay there.
        Catering stays on its own page.
      </p>

      <div class="btnrow">
        <a class="btn primary" href="/puffs/menu/">Go to Menu & Order</a>
        <a class="btn ghost" href="/puffs/catering/">Catering</a>
        <a class="btn ghost" href="/puffs/">Back to Puff’s</a>
      </div>

      <div class="tiny">
        This page remains live so older links and QR placements still land cleanly.
      </div>
    </section>
  </div>
</body>
