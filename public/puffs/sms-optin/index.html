<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Puff’s Smokehouse — SMS Consent</title>
  <meta name="robots" content="noindex,follow" />
  <link rel="canonical" href="https://www.squarebidness.com/puffs/sms-optin/" />

  <style>
    body{
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
      background:#0b0b0b;
      color:#f2f2f2;
      margin:0;
      padding:40px 20px;
    }
    .wrap{
      max-width:640px;
      margin:0 auto;
      background:#111;
      border:1px solid #232323;
      border-radius:16px;
      padding:24px;
    }
    h1{margin-top:0}
    label{display:block;margin-top:16px}
    input[type="tel"]{
      width:100%;
      padding:10px;
      margin-top:6px;
      background:#0f0f0f;
      border:1px solid #2a2a2a;
      color:#fff;
      border-radius:10px;
    }
    .smsConsent{
      display:flex;
      gap:10px;
      align-items:flex-start;
      margin-top:16px;
      padding:14px;
      border:1px solid #262626;
      border-radius:12px;
      background:#0f0f0f;
    }
    .smsConsent input{
      margin-top:4px;
      transform:scale(1.15);
    }
    .smsConsent span{
      font-size:.92rem;
      line-height:1.4;
      color:#d6d6d6;
    }
    a{color:#fff;text-decoration:underline}
    .tiny{opacity:.8;font-size:.85rem;margin-top:8px}
  </style>
</head>
<body>

  <div class="wrap">
    <h1>SMS Consent (Optional)</h1>

    <p>This page demonstrates how customers opt in to receive transactional SMS messages from Puff’s Smokehouse.</p>

    <label>
      Phone Number (Optional)
      <input type="tel" placeholder="(xxx) xxx-xxxx" />
    </label>

    <label class="smsConsent">
      <input type="checkbox" />
      <span>
        I agree to receive <strong>transactional SMS messages</strong> from Puff’s Smokehouse related to my order,
        including payment confirmations, order status updates, and pickup notifications.
        Message frequency varies. Message and data rates may apply.
        Reply <strong>STOP</strong> to opt out. Reply <strong>HELP</strong> for assistance.
        <br /><br />
        <strong>Phone number is optional.</strong> If you do not opt in, you will not receive SMS messages.
        <br /><br />
        <a href="https://www.squarebidness.com/puffs/privacy/">Privacy Policy</a> ·
        <a href="https://www.squarebidness.com/puffs/terms/">SMS Terms &amp; Conditions</a>
      </span>
    </label>

    <p class="tiny">
      Customers must actively check the box above to provide consent. No marketing or promotional messages are sent.
    </p>

  </div>

</body>
</html>
