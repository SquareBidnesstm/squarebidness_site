<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="sb:build" content="stripe-connect-refresh-v1" />
  <title>Link Expired | Square Bidness</title>
  <meta name="description" content="Your Stripe Connect onboarding link has expired. Generate a new one to continue." />
  <script defer src="/scripts/sb-analytics.js"></script>
  <style>
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#08090b;color:#f5f2ea;font-family:Inter,system-ui,sans-serif;padding:22px}
    .card{width:min(680px,100%);border:1px solid rgba(255,255,255,.12);border-radius:30px;background:linear-gradient(180deg,#171b23,#101217);padding:32px;box-shadow:0 24px 80px rgba(0,0,0,.45)}
    .kicker{color:#d8b35a;font-weight:900;text-transform:uppercase;letter-spacing:.12em;font-size:.78rem}
    h1{font-size:clamp(2.1rem,7vw,4rem);line-height:.9;letter-spacing:-.06em;margin:14px 0}
    p{color:#cfc8ba;font-size:1.02rem}
    .btn{display:inline-flex;margin-top:18px;border-radius:999px;padding:14px 18px;background:#d8b35a;color:#15110a;font-weight:900;text-decoration:none}
  </style>
</head>
<body>
  <main class="card">
    <div class="kicker">Stripe Connect</div>
    <h1>Link Expired.</h1>
    <p>
      This Stripe onboarding link expired or was already used. Generate a new one to continue — it only takes a second.
    </p>
    <a class="btn" id="restartStripe" href="/api/stripe-connect/create-account-link/">
      Get a New Link
    </a>
  </main>

  <script>
    const restartStripe = document.getElementById("restartStripe");
    const params = new URLSearchParams(window.location.search);
    const restartUrl = new URL("/api/stripe-connect/create-account-link/", window.location.origin);
    const source = params.get("source") || "stripe_connect_refresh";
    const client = params.get("client") || "";
    const leadId = params.get("leadId") || "";
    const returnTo = params.get("returnTo") || "";

    restartUrl.searchParams.set("source", source);

    if (client) {
      restartUrl.searchParams.set("client", client);
    }

    if (leadId) {
      restartUrl.searchParams.set("leadId", leadId);
    }

    if (returnTo && returnTo.startsWith("/") && !returnTo.startsWith("//")) {
      restartUrl.searchParams.set("returnTo", returnTo);
    }

    restartStripe.href = restartUrl.pathname + restartUrl.search;
  </script>
</body>
</html>
