<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="robots" content="noindex,nofollow" />
  <title>Stripe Connect | Square Bidness</title>
  <script defer src="/scripts/sb-analytics.js"></script>
  <style>
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#08090b;color:#f5f2ea;font-family:Inter,system-ui,sans-serif;padding:22px}
    .card{width:min(520px,100%);border:1px solid rgba(255,255,255,.12);border-radius:30px;background:linear-gradient(180deg,#171b23,#101217);overflow:hidden;box-shadow:0 24px 80px rgba(0,0,0,.45)}
    .kicker{display:flex;align-items:center;justify-content:center;gap:10px;background:rgba(216,179,90,.10);border-bottom:1px solid rgba(216,179,90,.20);padding:14px;color:#d8b35a;font-weight:900;text-transform:uppercase;letter-spacing:.14em;font-size:.82rem}
    .dot{width:8px;height:8px;border-radius:50%;background:#28d17c;box-shadow:0 0 14px rgba(40,209,124,.75)}
    .body{padding:32px}
    h1{font-size:clamp(1.7rem,5vw,2.4rem);line-height:1.05;letter-spacing:-.04em;margin:0 0 20px}
    .status{border:1px solid rgba(216,179,90,.32);background:rgba(216,179,90,.08);border-radius:18px;padding:16px;color:#ddd5c9}
    .status b{display:block;color:#d8b35a;margin-bottom:4px}
    .status[data-state="ready"]{border-color:rgba(40,209,124,.26);background:rgba(40,209,124,.08)}
    .status[data-state="ready"] b{color:#28d17c}
    .btn{display:flex;align-items:center;justify-content:center;margin-top:20px;border-radius:999px;padding:16px;background:#d8b35a;color:#15110a;font-weight:900;font-size:1rem;text-decoration:none}
    .help{display:block;text-align:center;margin-top:14px;color:#a9a59b;font-size:.88rem;text-decoration:underline}
  </style>
</head>
<body>
  <main class="card">
    <div class="kicker"><span class="dot"></span> Stripe Connect</div>
    <div class="body">
      <h1>Finish Connecting to Stripe</h1>
      <div class="status" id="stripeStatus" data-state="warn">
        <b>Stripe Account Pending.</b>
        <span id="statusDetail"></span>
      </div>
      <a class="btn" id="nextStep" href="/stripe-connect/">Back to Stripe Connect</a>
      <a class="help" href="/stripe-connect/support/">Need help connecting?</a>
    </div>
  </main>

  <script>
    const statusBox = document.getElementById("stripeStatus");
    const statusDetail = document.getElementById("statusDetail");
    const nextStep = document.getElementById("nextStep");
    const params = new URLSearchParams(window.location.search);
    const account = params.get("account");
    const client = params.get("client") || "";
    const returnTo = params.get("returnTo") || "";

    const clientLabels = {
      delish: "Delish", puffs: "Puff's",
      philson: "Philson Le Fleuriste", restaurant: "Restaurant", foodtruck: "Food Truck"
    };

    if (returnTo && returnTo.startsWith("/") && !returnTo.startsWith("//")) {
      nextStep.href = returnTo;
      nextStep.textContent = clientLabels[client] ? `Back to ${clientLabels[client]}` : "Back to Stripe Connect";
    }

    async function checkStatus() {
      if (!account) return;
      try {
        const r = await fetch(`/api/stripe-connect/account-status/?account=${encodeURIComponent(account)}`);
        const data = await r.json();
        if (!r.ok) return;
        if (data.detailsSubmitted && data.chargesEnabled && data.payoutsEnabled) {
          statusBox.dataset.state = "ready";
          statusBox.querySelector("b").textContent = "Stripe Account Ready.";
          return;
        }
        const open = [...(data.currentlyDue || []), ...(data.pastDue || [])].length;
        if (open > 0) statusDetail.textContent = `${open} requirement${open === 1 ? "" : "s"} still need attention.`;
      } catch (_) {}
    }

    checkStatus();
  </script>
</body>
</html>
