<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Stripe Connect QR | Square Bidness</title>
  <meta name="description" content="Fast QR access for Square Bidness Stripe Connect onboarding." />
  <meta name="robots" content="noindex,follow" />
  <meta name="theme-color" content="#000000" />
  <meta name="application-name" content="Stripe Connect QR" />
  <meta name="apple-mobile-web-app-title" content="Stripe QR" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <link rel="canonical" href="https://www.squarebidness.com/stripe-connect/qr/" />
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="apple-touch-icon" sizes="180x180" href="/stripe-connect/qr/assets/stripe-connect-qr-icon-180.png" />
  <link rel="manifest" href="/stripe-connect/qr/manifest.webmanifest" />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Square Bidness" />
  <meta property="og:title" content="Stripe Connect QR | Square Bidness" />
  <meta property="og:description" content="Scan to open Square Bidness Stripe Connect onboarding." />
  <meta property="og:url" content="https://www.squarebidness.com/stripe-connect/qr/" />
  <meta property="og:image" content="https://www.squarebidness.com/assets/meta_connect_1200x630.jpg" />
  <style>
    :root{--line:#242427;--text:#f7f7f8;--muted:#a1a1aa;--green:#86efac;--gold:#d7ae72;--shadow:0 24px 80px rgba(0,0,0,.55)}
    *{box-sizing:border-box}
    html,body{margin:0;min-height:100%;background:#000;color:var(--text);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    body{min-height:100vh;min-height:100dvh;display:grid;place-items:center;padding:calc(14px + env(safe-area-inset-top)) 14px calc(14px + env(safe-area-inset-bottom));overflow-x:hidden}
    a{color:inherit;text-decoration:none}
    .shell{width:100%;max-width:362px;display:grid;gap:14px}
    .card{border:1px solid var(--line);border-radius:28px;background:radial-gradient(circle at top,rgba(255,255,255,.08),transparent 32%),linear-gradient(180deg,#090909,#030303);box-shadow:var(--shadow);padding:18px;overflow:hidden}
    .brand{display:flex;align-items:center;gap:12px;margin-bottom:16px}
    .brand img{width:46px;height:46px;border-radius:14px}
    .brand strong{display:block;font-size:1.06rem;letter-spacing:-.02em}
    .brand span{display:block;color:var(--muted);font-size:.9rem;margin-top:1px}
    .qr-box{border-radius:24px;background:#fff;padding:18px}
    .qr-box img{display:block;width:100%;height:auto;image-rendering:crisp-edges}
    h1{margin:16px 0 6px;font-size:clamp(2rem,10vw,3.2rem);line-height:.92;letter-spacing:-.06em}
    p{margin:0;color:var(--muted);line-height:1.45}
    .actions{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-top:16px}
    .btn{min-height:52px;border-radius:999px;display:inline-flex;align-items:center;justify-content:center;text-align:center;padding:0 14px;border:1px solid var(--line);background:#0b0b0b;font-weight:950;line-height:1.1;min-width:0;overflow-wrap:anywhere}
    .btn.primary{grid-column:1 / -1;background:#fff;color:#000;border-color:#fff}
    .btn.green{background:#071607;color:var(--green);border-color:#166534}
    .btn.gold{background:#191307;color:var(--gold);border-color:#5b3f12}
    .note{color:#71717a;text-align:center;font-size:.82rem}
    @media(max-width:420px){.card{padding:16px}.brand strong{font-size:1rem}.brand span{font-size:.84rem}.qr-box{padding:14px;border-radius:20px}h1{font-size:clamp(1.9rem,8.8vw,2.6rem);letter-spacing:-.045em}.btn{font-size:.92rem;padding:0 10px}}
  </style>
</head>
<body>
  <main class="shell">
    <section class="card" aria-labelledby="qr-title">
      <div class="brand">
        <img src="/connect/assets/square-bidness-mark.png" alt="" />
        <div>
          <strong>Stripe Connect</strong>
          <span>Square Bidness · payment rails lane</span>
        </div>
      </div>
      <div class="qr-box">
        <img src="/stripe-connect/assets/stripe-connect-qr.png" alt="QR code to open Square Bidness Stripe Connect onboarding" />
      </div>
      <h1 id="qr-title">Stripe QR.</h1>
      <p>Use this from your home screen when a serious operator is ready to connect payment rails.</p>
      <div class="actions">
        <a class="btn primary" href="/stripe-connect/">Open Stripe Connect</a>
        <a class="btn green" href="/foodtruck/qr/">Food QR</a>
        <a class="btn green" href="/restaurant/qr/">Rest QR</a>
        <a class="btn gold" href="/connect/">Connect</a>
        <a class="btn" href="sms:+19859817001">Text</a>
      </div>
    </section>
    <div class="note">Add this page to Home Screen as “Stripe QR”.</div>
  </main>
</body>
</html>
