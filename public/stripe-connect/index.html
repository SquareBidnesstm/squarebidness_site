<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="sb:build" content="stripe-connect-v1" />

  <title>Stripe Connect | Square Bidness</title>
  <meta name="description" content="Secure Stripe Connect for Square Bidness operator systems." />

  <script defer src="/scripts/sb-analytics.js"></script>

  <style>
    :root{
      --bg:#08090b;
      --panel:#11141a;
      --panel2:#171b23;
      --text:#f5f2ea;
      --muted:#a9a59b;
      --line:rgba(255,255,255,.12);
      --gold:#d8b35a;
      --green:#28d17c;
      --shadow:0 24px 80px rgba(0,0,0,.42);
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      min-height:100vh;
      background:
        radial-gradient(circle at top left, rgba(216,179,90,.18), transparent 36%),
        radial-gradient(circle at bottom right, rgba(40,209,124,.10), transparent 34%),
        var(--bg);
      color:var(--text);
      font-family:Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height:1.5;
    }

    a{color:inherit;text-decoration:none}

    .wrap{
      width:min(520px, calc(100% - 32px));
      margin:0 auto;
      padding:40px 0 60px;
      display:flex;
      flex-direction:column;
      align-items:center;
    }

    .topbar{
      width:100%;
      display:flex;
      justify-content:center;
      margin-bottom:48px;
    }

    .center{
      width:100%;
    }

    .card{
      border:1px solid var(--line);
      background:linear-gradient(180deg, rgba(23,27,35,.92), rgba(13,15,20,.94));
      border-radius:32px;
      box-shadow:var(--shadow);
    }

    .main{
      padding:36px;
    }

    .kicker{
      display:inline-flex;
      align-items:center;
      gap:9px;
      color:var(--gold);
      font-weight:850;
      font-size:.78rem;
      letter-spacing:.12em;
      text-transform:uppercase;
      margin-bottom:16px;
    }

    .dot{
      width:8px;
      height:8px;
      border-radius:50%;
      background:var(--green);
      box-shadow:0 0 18px rgba(40,209,124,.75);
    }

    h1{
      margin:0 0 28px;
      font-size:clamp(1.9rem, 5vw, 2.6rem);
      letter-spacing:-.04em;
      line-height:1.05;
    }

    .ack{
      display:flex;
      gap:14px;
      align-items:center;
      padding:18px 20px;
      border:1px solid rgba(216,179,90,.28);
      background:rgba(216,179,90,.08);
      border-radius:18px;
      color:#dfd6c7;
      font-weight:700;
      font-size:1.05rem;
      cursor:pointer;
    }

    .ack input{
      width:22px;
      height:22px;
      accent-color:var(--gold);
      flex:0 0 auto;
      cursor:pointer;
    }

    .actions{
      margin-top:20px;
    }

    .btn{
      border:1px solid var(--line);
      border-radius:999px;
      padding:18px 24px;
      font-weight:900;
      font-size:1.1rem;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      width:100%;
    }

    .btn.primary{
      background:linear-gradient(135deg, var(--gold), #f3d47a);
      color:#15110a;
      border-color:rgba(255,255,255,.22);
      box-shadow:0 18px 50px rgba(216,179,90,.25);
    }

    .btn[aria-disabled="true"]{
      opacity:.4;
      pointer-events:none;
      box-shadow:none;
    }

    .footer{
      margin-top:28px;
      color:var(--muted);
      font-size:.84rem;
      text-align:center;
    }

    @media(max-width:540px){
      .main{padding:26px}
    }
  </style>
</head>

<body>
  <main class="wrap">
    <header class="topbar">
      <a href="/" aria-label="Square Bidness Home">
        <img src="/assets/cleantextlogo.png" alt="Square Bidness" width="156" height="26"
          decoding="async" style="height:26px;width:auto;display:block;" />
      </a>
    </header>

    <section class="center">
      <div class="card main">
        <div class="kicker"><span class="dot"></span> Stripe Connect</div>
        <h1>Connect Your Business to Stripe</h1>

        <label class="ack" for="phaseTwoAck">
          <input id="phaseTwoAck" type="checkbox" />
          <span>My business is ready to connect to Stripe.</span>
        </label>

        <div class="actions">
          <a class="btn primary" id="connectStripe" href="/api/stripe-connect/create-account-link/" aria-disabled="true">
            Connect to Stripe Now
          </a>
        </div>
      </div>
    </section>

    <p class="footer">© Square Bidness</p>
  </main>

  <script>
    const ack = document.getElementById("phaseTwoAck");
    const connectStripe = document.getElementById("connectStripe");
    const params = new URLSearchParams(window.location.search);
    const connectUrl = new URL("/api/stripe-connect/create-account-link/", window.location.origin);
    const source = params.get("source") || "direct_stripe_connect";
    const client = params.get("client") || "";
    const leadId = params.get("leadId") || "";
    const returnTo = params.get("returnTo") || "";

    connectUrl.searchParams.set("source", source);

    if (client) {
      connectUrl.searchParams.set("client", client);
    }

    if (leadId) {
      connectUrl.searchParams.set("leadId", leadId);
    }

    if (returnTo && returnTo.startsWith("/") && !returnTo.startsWith("//")) {
      connectUrl.searchParams.set("returnTo", returnTo);
    }

    connectStripe.href = connectUrl.pathname + connectUrl.search;

    ack.addEventListener("change", () => {
      connectStripe.setAttribute("aria-disabled", ack.checked ? "false" : "true");
    });
  </script>
</body>
</html>
