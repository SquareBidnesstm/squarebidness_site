<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="robots" content="noindex,nofollow" />
  <title>Connected to Holdings | Square Bidness</title>
  <script defer src="/scripts/sb-analytics.js"></script>
  <style>
    body{margin:0;min-height:100vh;width:100%;display:grid;place-items:center;background:#08090b;color:#f5f2ea;font-family:Inter,system-ui,sans-serif;padding:22px;box-sizing:border-box}
    .card{width:min(520px,100%);border:1px solid rgba(255,255,255,.12);border-radius:30px;background:linear-gradient(180deg,#171b23,#101217);overflow:hidden;box-shadow:0 24px 80px rgba(0,0,0,.45)}
    .kicker{display:flex;align-items:center;justify-content:center;gap:10px;background:rgba(40,209,124,.10);border-bottom:1px solid rgba(40,209,124,.20);padding:14px;color:#28d17c;font-weight:900;text-transform:uppercase;letter-spacing:.14em;font-size:.82rem}
    .dot{width:8px;height:8px;border-radius:50%;background:#28d17c;box-shadow:0 0 14px rgba(40,209,124,.75)}
    .body{padding:32px;text-align:center}
    .check{font-size:3rem;margin:0 0 16px;display:block}
    h1{font-size:clamp(1.7rem,5vw,2.2rem);line-height:1.05;letter-spacing:-.04em;margin:0 0 10px}
    .sub{color:#a9a59b;font-size:.95rem;margin:0 0 28px;line-height:1.5}
    .btn{display:flex;align-items:center;justify-content:center;border-radius:999px;padding:16px;background:#d8b35a;color:#15110a;font-weight:900;font-size:1rem;text-decoration:none;margin-bottom:12px}
    .btn.ghost{background:transparent;border:1px solid rgba(255,255,255,.18);color:#f5f2ea}
  </style>
</head>
<body>
  <main class="card">
    <div class="kicker"><span class="dot"></span> Holdings Connected</div>
    <div class="body">
      <span class="check">&#10003;</span>
      <h1>Payments Are Ready.</h1>
      <p class="sub">Your Stripe account is connected to Square Bidness Holdings. You're ready to start receiving payments.</p>

      <a class="btn" href="/">squarebidness.com</a>
      <a class="btn ghost" href="/stripe/">Back to Connect</a>
    </div>
  </main>
</body>
</html>
