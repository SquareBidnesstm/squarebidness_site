<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Send a Drink | Chocolate City Lounge LLC</title>
  <meta name="description" content="Send a drink credit to someone at Chocolate City Lounge LLC. Staff verifies redemption at the venue." />

  <link rel="icon" type="image/png" sizes="32x32" href="/chocolate-city/assets/cc-icon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/chocolate-city/assets/cc-icon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/chocolate-city/assets/cc-icon-180.png">
  <link rel="manifest" href="/chocolate-city/manifest.json">

  <style>
    :root{
      --bg:#080504;
      --panel:#130c0a;
      --gold:#d7a84f;
      --gold2:#f5d58a;
      --text:#fff7ea;
      --muted:#c7a983;
      --line:rgba(245,213,138,.22);
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:Arial,Helvetica,sans-serif;
      background:
        radial-gradient(circle at 20% 10%,rgba(215,168,79,.16),transparent 28%),
        linear-gradient(180deg,#080504,#160b07);
      color:var(--text);
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:18px;
    }

    .card{
      width:100%;
      max-width:600px;
      background:linear-gradient(180deg,#170d09,#100806);
      border:1px solid var(--line);
      border-radius:30px;
      padding:28px;
      box-shadow:0 28px 80px rgba(0,0,0,.55);
    }

    .logo{
      width:74px;
      height:74px;
      border-radius:50%;
      display:block;
      margin-bottom:14px;
    }

    .kicker{
      color:var(--gold2);
      letter-spacing:.16em;
      text-transform:uppercase;
      font-size:12px;
      font-weight:900;
      margin-bottom:8px;
    }

    h1{
      margin:0;
      font-size:46px;
      letter-spacing:-.06em;
      color:var(--gold2);
    }

    p{
      color:var(--muted);
      line-height:1.5;
      font-size:16px;
    }

    label{
      display:block;
      margin:16px 0 7px;
      color:var(--gold2);
      font-weight:900;
      font-size:13px;
    }

    input,textarea,select{
      width:100%;
      padding:14px;
      border-radius:14px;
      border:1px solid var(--line);
      background:#080504;
      color:var(--text);
      font-size:16px;
    }

    textarea{
      min-height:90px;
      resize:vertical;
    }

    .btn{
      margin-top:18px;
      width:100%;
      min-height:52px;
      border:0;
      border-radius:999px;
      background:linear-gradient(135deg,var(--gold),var(--gold2));
      color:#080504;
      font-weight:900;
      font-size:16px;
      cursor:pointer;
    }

    .back{
      display:inline-flex;
      margin-top:16px;
      color:var(--gold2);
      font-weight:900;
      text-decoration:none;
    }

    .note{
      margin-top:14px;
      padding:14px;
      border:1px solid var(--line);
      border-radius:18px;
      background:rgba(215,168,79,.10);
      color:var(--gold2);
      font-size:13px;
      font-weight:800;
    }
  </style>
</head>

<body>
  <main class="card">
    <img class="logo" src="/chocolate-city/assets/cc-icon-192.png" alt="Chocolate City Lounge logo">

    <div class="kicker">Remote Drink Credit</div>
    <h1>Send a Drink</h1>

    <p>
      Send a drink credit to someone at Chocolate City. Staff verifies age, entry,
      and redemption at the venue.
    </p>

    <label>Amount</label>
    <select id="optionId">
      <option value="drink_10">$10 Drink Credit</option>
      <option value="drink_25">$25 Premium Drink Credit</option>
      <option value="drink_50">$50 Bottle Contribution</option>
    </select>

    <label>Recipient Name</label>
    <input id="recipientName" placeholder="Who is this for?" />

    <label>Your Name</label>
    <input id="senderName" placeholder="Who is sending it?" />

    <label>Message Optional</label>
    <textarea id="message" placeholder="Example: Happy birthday — enjoy one on me."></textarea>

    <button class="btn" id="sendBtn">Send Drink Credit</button>

    <div class="note">
      Drink credits are redeemed in person only. Must meet venue age and entry requirements.
    </div>

    <a class="back" href="/chocolate-city/">← Back to Chocolate City</a>
  </main>

  <script>
    document.getElementById("sendBtn").addEventListener("click", async () => {
      const btn = document.getElementById("sendBtn");

      const payload = {
        optionId: document.getElementById("optionId").value,
        recipientName: document.getElementById("recipientName").value.trim(),
        senderName: document.getElementById("senderName").value.trim(),
        message: document.getElementById("message").value.trim()
      };

      if(!payload.recipientName){
        alert("Enter the recipient name first.");
        document.getElementById("recipientName").focus();
        return;
      }

      btn.disabled = true;
      btn.textContent = "Opening checkout...";

      try{
        const res = await fetch("/api/chocolate-city/send-drink-checkout/", {
          method:"POST",
          headers:{ "Content-Type":"application/json" },
          body:JSON.stringify(payload)
        });

        const data = await res.json();

        if(!data.ok){
          alert(data.error || "Checkout unavailable.");
          btn.disabled = false;
          btn.textContent = "Send Drink Credit";
          return;
        }

        window.location.href = data.url;
      }catch(err){
        alert("Checkout unavailable.");
        btn.disabled = false;
        btn.textContent = "Send Drink Credit";
      }
    });
  </script>
</body>
</html>
