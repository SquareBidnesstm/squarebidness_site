<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Drink Credit Sent | Chocolate City</title>

  <link rel="icon" type="image/png" sizes="32x32" href="/chocolate-city/assets/cc-icon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/chocolate-city/assets/cc-icon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/chocolate-city/assets/cc-icon-180.png">
  <link rel="manifest" href="/chocolate-city/manifest.json">

  <style>
    :root{
      --bg:#080504;
      --panel:#130c0a;
      --gold:#d7a84f;
      --gold2:#f5d58a;
      --text:#fff7ea;
      --muted:#c7a983;
      --line:rgba(245,213,138,.22);
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:Arial,Helvetica,sans-serif;
      background:#080504;
      color:var(--text);
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:18px;
    }

    .card{
      width:100%;
      max-width:560px;
      background:linear-gradient(180deg,#170d09,#100806);
      border:1px solid var(--line);
      border-radius:30px;
      padding:30px;
      text-align:center;
      box-shadow:0 28px 80px rgba(0,0,0,.55);
    }

    .logo{
      width:76px;
      height:76px;
      border-radius:50%;
      display:block;
      margin:0 auto 14px;
    }

    h1{
      color:var(--gold2);
      margin:0;
      font-size:38px;
      letter-spacing:-.04em;
    }

    p{
      color:var(--muted);
      line-height:1.5;
      font-size:16px;
    }

    .note{
      margin-top:18px;
      padding:14px;
      border:1px solid var(--line);
      border-radius:18px;
      background:rgba(215,168,79,.10);
      color:var(--gold2);
      font-weight:800;
    }

    a{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      margin-top:18px;
      min-height:48px;
      padding:0 18px;
      border-radius:999px;
      background:linear-gradient(135deg,var(--gold),var(--gold2));
      color:#080504;
      font-weight:900;
      text-decoration:none;
    }
  </style>
</head>

<body>
  <main class="card">
    <img class="logo" src="/chocolate-city/assets/cc-icon-192.png" alt="Chocolate City Lounge logo">

    <h1>Drink Credit Sent</h1>

    <p>
      Your drink credit has been submitted. Chocolate City staff will verify and handle redemption at the venue.
    </p>

    <div class="note">
      Drink credits are redeemed in person only. Recipient must meet age and entry requirements.
    </div>

    <a href="/chocolate-city/">Back to Chocolate City</a>
  </main>
</body>
</html>
