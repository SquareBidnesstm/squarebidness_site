<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Chocolate City — VIP Complete</title>
  <meta name="robots" content="noindex,nofollow" />

  <link rel="icon" type="image/png" sizes="32x32" href="/chocolate-city/assets/cc-icon-32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/chocolate-city/assets/cc-icon-180.png">

  <style>
    :root{
      --bg:#080504;
      --gold:#d7a84f;
      --gold2:#f5d58a;
      --text:#fff7ea;
      --muted:#c7a983;
      --line:rgba(245,213,138,.25);
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:28px;
      font-family:Arial,Helvetica,sans-serif;
      background:
        radial-gradient(circle at center,rgba(215,168,79,.20),transparent 35%),
        linear-gradient(180deg,#080504,#160b07);
      color:var(--text);
    }

    .card{
      width:min(1000px,100%);
      border:1px solid var(--line);
      border-radius:36px;
      background:linear-gradient(180deg,#1b100b,#0d0604);
      padding:50px 30px;
      box-shadow:0 35px 90px rgba(0,0,0,.65);
    }

    .logo{
      width:150px;
      height:150px;
      border-radius:50%;
      object-fit:cover;
      margin-bottom:18px;
    }

    .kicker{
      color:var(--gold2);
      letter-spacing:.2em;
      text-transform:uppercase;
      font-weight:900;
      font-size:14px;
      margin-bottom:16px;
    }

    h1{
      margin:0;
      color:var(--gold2);
      font-size:clamp(3.5rem,10vw,8rem);
      line-height:.9;
      letter-spacing:-.08em;
      text-transform:uppercase;
    }

    p{
      margin:24px auto 0;
      max-width:760px;
      color:var(--muted);
      font-size:clamp(1.2rem,3vw,2rem);
      line-height:1.35;
      font-weight:800;
    }

    .footer{
      margin-top:36px;
      color:var(--gold);
      letter-spacing:.14em;
      text-transform:uppercase;
      font-weight:900;
    }
  </style>
</head>

<body>
  <main class="card">
    <img class="logo" src="/chocolate-city/assets/cc-icon-192.png" alt="Chocolate City Lounge logo">

    <div class="kicker">Chocolate City Lounge LLC</div>

    <h1>VIP Locked</h1>

    <p>
      All VIP sections are confirmed for tonight. Please see staff at the door for check-in.
    </p>

    <div class="footer">All Roads Lead to Chocolate City</div>
  </main>
</body>
</html>
