<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Chocolate City — Redeem Drink Credits</title>

  <meta name="robots" content="noindex,nofollow" />

  <link rel="icon" type="image/png" sizes="32x32" href="/chocolate-city/assets/cc-icon-32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/chocolate-city/assets/cc-icon-180.png">

  <style>
    :root{
      --bg:#080504;
      --panel:#130c0a;
      --gold:#d7a84f;
      --gold2:#f5d58a;
      --text:#fff7ea;
      --muted:#c7a983;
      --line:rgba(245,213,138,.22);
      --good:#1d6b39;
      --bad:#a12626;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      min-height:100vh;
      padding:22px;
      font-family:Arial,Helvetica,sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top,rgba(215,168,79,.18),transparent 34%),
        linear-gradient(180deg,#080504,#160b07);
    }

    .wrap{
      max-width:1500px;
      margin:0 auto;
    }

    .top{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:18px;
      margin-bottom:18px;
      flex-wrap:wrap;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:16px;
    }

    .logo{
      width:72px;
      height:72px;
      border-radius:50%;
    }

    h1{
      margin:0;
      font-size:clamp(2.4rem,5vw,4.5rem);
      line-height:.9;
      letter-spacing:-.06em;
      color:var(--gold2);
      text-transform:uppercase;
    }

    .sub{
      margin-top:10px;
      color:var(--muted);
      font-size:1.08rem;
      font-weight:800;
    }

    .token{
      margin-bottom:18px;
      display:flex;
      gap:10px;
    }

    .token input{
      flex:1;
      padding:14px;
      border-radius:16px;
      border:1px solid var(--line);
      background:#050302;
      color:var(--text);
      font-size:16px;
    }

    button{
      border:0;
      border-radius:999px;
      padding:0 20px;
      background:linear-gradient(135deg,var(--gold),var(--gold2));
      color:#100603;
      font-weight:900;
      cursor:pointer;
    }

    .status{
      margin-bottom:18px;
      padding:14px 16px;
      border-radius:18px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.04);
      color:var(--muted);
      min-height:56px;
      display:flex;
      align-items:center;
      font-weight:800;
    }

    .status.good{
      border-color:rgba(29,107,57,.35);
      background:rgba(29,107,57,.10);
      color:#d7f3df;
    }

    .status.bad{
      border-color:rgba(161,38,38,.35);
      background:rgba(161,38,38,.10);
      color:#ffd1d1;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(340px,1fr));
      gap:18px;
    }

    .card{
      border:1px solid var(--line);
      border-radius:28px;
      background:linear-gradient(180deg,#1b100b,#0d0604);
      padding:22px;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:36px;
      padding:0 12px;
      border-radius:999px;
      background:rgba(215,168,79,.14);
      border:1px solid rgba(215,168,79,.25);
      color:var(--gold2);
      font-size:.82rem;
      font-weight:900;
      letter-spacing:.10em;
      text-transform:uppercase;
    }

    .recipient{
      margin-top:16px;
      font-size:2.4rem;
      font-weight:900;
      letter-spacing:-.05em;
    }

    .amount{
      margin-top:10px;
      color:var(--gold);
      font-size:2rem;
      font-weight:900;
    }

    .meta{
      margin-top:14px;
      display:grid;
      gap:8px;
      color:var(--muted);
      font-weight:800;
    }

    .message{
      margin-top:16px;
      padding:14px;
      border-radius:16px;
      background:rgba(255,255,255,.04);
      border:1px solid var(--line);
      color:var(--text);
      min-height:72px;
      line-height:1.45;
    }

    .action{
      margin-top:18px;
    }

    .btn{
      width:100%;
      min-height:50px;
      border:none;
      border-radius:999px;
      background:linear-gradient(135deg,var(--gold),var(--gold2));
      color:#100603;
      font-weight:900;
      cursor:pointer;
      font-size:1rem;
    }

    .btn[disabled]{
      opacity:.5;
      cursor:not-allowed;
    }

    .empty{
      padding:60px 24px;
      border-radius:28px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.035);
      text-align:center;
      color:var(--muted);
      font-size:1.3rem;
      font-weight:900;
    }

    .empty strong{
      display:block;
      font-size:2.4rem;
      color:var(--gold2);
      margin-bottom:10px;
    }
  </style>
</head>

<body>
  <main class="wrap">
    <div class="top">
      <div class="brand">
        <img class="logo" src="/chocolate-city/assets/cc-icon-192.png" alt="Chocolate City logo">

        <div>
          <h1>Redeem Drinks</h1>
          <div class="sub">
            Clear redeemed drink credits from TV screens
          </div>
        </div>
      </div>
    </div>

    <div class="token">
      <input id="token" type="password" placeholder="Admin token">
      <button onclick="saveToken()">Load Credits</button>
    </div>

    <div class="status" id="statusBox">
      Loading drink credits...
    </div>

    <section class="grid" id="creditsGrid">
      <div class="empty">
        <strong>Loading…</strong>
        Active drink credits will appear here.
      </div>
    </section>
  </main>

  <script>
    const grid = document.getElementById("creditsGrid");
    const statusBox = document.getElementById("statusBox");

    function escapeHtml(str){
      return String(str || "").replace(/[&<>"']/g, m => ({
        "&":"&amp;",
        "<":"&lt;",
        ">":"&gt;",
        '"':"&quot;",
        "'":"&#039;"
      }[m]));
    }

    function setStatus(message, tone=""){
      statusBox.className = "status" + (tone ? ` ${tone}` : "");
      statusBox.textContent = message;
    }

    function saveToken(){
      const token = document.getElementById("token").value.trim();
      if(token) localStorage.setItem("cc_admin_token", token);
      loadCredits();
    }

    function renderCredits(credits){
      if(!credits.length){
        grid.innerHTML = `
          <div class="empty">
            <strong>No Active Credits</strong>
            Nothing needs redemption right now.
          </div>
        `;
        return;
      }

      grid.innerHTML = credits.map(c => `
        <article class="card">
          <div class="badge">Drink Credit</div>

          <div class="recipient">
            ${escapeHtml(c.recipientName || "Guest")}
          </div>

          <div class="amount">
            $${escapeHtml(String(c.amount || 0))}
          </div>

          <div class="meta">
            <div>From: ${escapeHtml(c.senderName || "Anonymous")}</div>
          </div>

          <div class="message">
            ${escapeHtml(c.message || "Enjoy your drink at Chocolate City.")}
          </div>

          <div class="action">
            <button class="btn" data-redeem-id="${escapeHtml(c.sessionId || "")}">
              Redeemed
            </button>
          </div>
        </article>
      `).join("");

      document.querySelectorAll("[data-redeem-id]").forEach(button => {
        button.addEventListener("click", () => {
          redeemDrink(button.getAttribute("data-redeem-id"), button);
        });
      });
    }

    async function loadCredits(){
      const token = localStorage.getItem("cc_admin_token") || document.getElementById("token").value.trim();

      if(!token){
        setStatus("Enter admin token first.", "bad");
        return;
      }

      try{
        const res = await fetch(`/api/chocolate-city/drink-credits/?t=${Date.now()}`, {
          headers:{ "X-Admin-Token": token },
          cache:"no-store"
        });

        const data = await res.json();

        if(!data.ok) throw new Error(data.error || "Unable to load");

        const credits = Array.isArray(data.credits) ? data.credits : [];

        renderCredits(credits);

        setStatus(
          `${credits.length} active drink credit${credits.length === 1 ? "" : "s"} loaded.`,
          "good"
        );
      }catch(err){
        setStatus(err.message || "Unable to load drink credits.", "bad");

        grid.innerHTML = `
          <div class="empty">
            <strong>Connection Error</strong>
            Unable to load drink credits.
          </div>
        `;
      }
    }

    async function redeemDrink(sessionId, button){
      if(!sessionId) return;

      const token = localStorage.getItem("cc_admin_token") || document.getElementById("token").value.trim();

      const originalText = button.textContent;

      button.disabled = true;
      button.textContent = "Clearing...";

      try{
        const res = await fetch("/api/chocolate-city/redeem-drink/", {
          method:"POST",
          headers:{
            "Content-Type":"application/json",
            "X-Admin-Token": token
          },
          body:JSON.stringify({ sessionId })
        });

        const data = await res.json();

        if(!data.ok){
          throw new Error(data.error || "Unable to redeem");
        }

        setStatus("Drink credit redeemed and cleared.", "good");
        await loadCredits();
      }catch(err){
        button.disabled = false;
        button.textContent = originalText;
        setStatus(err.message || "Unable to redeem credit.", "bad");
      }
    }

    document.getElementById("token").value =
      localStorage.getItem("cc_admin_token") || "";

    loadCredits();
    setInterval(loadCredits, 10000);
  </script>
</body>
</html>
