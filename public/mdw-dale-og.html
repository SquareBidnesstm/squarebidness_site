<!doctype html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>MDW Dale Williams — OG Preview</title>
  <style>
    body, html {
      margin: 0; padding: 0;
      width: 1200px; height: 630px;
      font-family: Arial, sans-serif;
    }
    .card {
      position: relative;
      width: 1200px; height: 630px;
      background: #0b0b0b;
      color: #fff;
      padding: 40px;
      box-sizing: border-box;
    }
    .logo {
      position: absolute;
      top: 40px; left: 40px;
      width: 140px; height: 140px;
    }
    .logo img {
      width: 100%; height: 100%; object-fit: contain;
    }
    .heading {
      position: absolute;
      top: 40px; left: 200px;
      font-size: 48px;
      font-weight: bold;
      color: #fff;
    }
    .subheading {
      position: absolute;
      top: 100px; left: 200px;
      font-size: 28px;
      color: #ccc;
    }
    .contact {
      position: absolute;
      bottom: 120px; left: 40px;
      font-size: 26px;
      line-height: 1.4;
    }
    .contact span {
      display: block;
      margin-bottom: 8px;
    }
    .cta {
      position: absolute;
      bottom: 40px; left: 40px;
      font-size: 22px;
      color: #e11d48;
      font-weight: bold;
    }
    .qr {
      position: absolute;
      top: 40px; right: 40px;
      width: 260px; height: 260px;
      background: #fff;
    }
    .qr img {
      width: 100%; height: 100%; object-fit: contain;
    }
  </style>
</head>
<body>
  <div class="card">
    <!-- MDW Logo -->
    <div class="logo">
      <img src="/mdw/assets/icons/android-chrome-512x512.png" alt="MDW Investments LLC" />
    </div>

    <!-- Heading -->
    <div class="heading">MDW Investments LLC</div>
    <div class="subheading">Dale Williams — Commercial Real Estate</div>

    <!-- Contact Info -->
    <div class="contact">
      <span>📞 (318) 542-8050</span>
      <span>📧 mdwinvestmentsllc@gmail.com</span>
    </div>

    <div class="cta">Scan to Connect</div>

    <!-- QR Code (replace src with your actual QR URL) -->
    <div class="qr">
      <img src="YOUR_QR_CODE_IMAGE_URL" alt="Scan QR Code" />
    </div>
  </div>
</body>
</html>
