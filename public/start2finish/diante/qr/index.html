<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Diante QR | Start2Finish</title>
  <meta name="description" content="Start2Finish Diante Culvert QR web app." />
  <meta name="robots" content="noindex,nofollow" />
  <meta name="theme-color" content="#050505" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Diante QR" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="canonical" href="https://www.squarebidness.com/start2finish/diante/qr/" />
  <link rel="manifest" href="/start2finish/diante/qr/manifest.webmanifest" />
  <link rel="apple-touch-icon" href="/start2finish/assets/icons/apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="/start2finish/assets/icons/android-chrome-192x192.png" />

  <style>
    :root{
      --bg:#000;
      --panel:#111;
      --line:rgba(255,255,255,.12);
      --text:#f8f8f8;
      --muted:rgba(255,255,255,.64);
      --green:#9ff0aa;
    }

    *{box-sizing:border-box}
    html{background:var(--bg)}
    body{
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      padding:clamp(20px,5vw,46px) 16px;
      background:
        radial-gradient(circle at 50% 0%, rgba(255,255,255,.12), transparent 28rem),
        var(--bg);
      color:var(--text);
      font-family:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    }

    .shell{
      width:358px;
      max-width:calc(100vw - 32px);
      padding:16px;
      border:1px solid var(--line);
      border-radius:28px;
      background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.03));
      box-shadow:0 22px 64px rgba(0,0,0,.6);
    }

    .brand{
      display:flex;
      align-items:center;
      gap:14px;
      margin-bottom:18px;
    }

    .mark{
      width:56px;
      height:56px;
      border-radius:16px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.10);
      background:#050505;
      flex:0 0 auto;
    }

    .mark img{width:100%;height:100%;object-fit:cover;display:block}
    h1{margin:0;font-size:1.28rem;line-height:1.1}
    .brand p{margin:4px 0 0;color:var(--muted);font-size:1rem}

    .qr-wrap{
      padding:22px;
      border-radius:28px;
      background:#fff;
      margin-bottom:14px;
    }

    .qr-wrap img{
      display:block;
      width:100%;
      height:auto;
      aspect-ratio:1;
      object-fit:contain;
    }

    .actions{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }

    .btn{
      min-height:58px;
      border-radius:999px;
      border:1px solid var(--line);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:14px 16px;
      color:var(--text);
      text-decoration:none;
      font-weight:900;
      font-size:1.02rem;
      background:rgba(0,0,0,.42);
    }

    .btn.primary{
      grid-column:1 / -1;
      background:#fff;
      color:#000;
      border-color:#fff;
    }

    .btn.green{
      color:var(--green);
      border-color:rgba(99,255,126,.35);
      background:rgba(0,60,12,.42);
    }

    .hint{
      margin:18px 0 0;
      color:rgba(255,255,255,.42);
      text-align:center;
      font-size:.92rem;
    }
  </style>
</head>

<body>
  <main>
    <section class="shell" aria-label="Start2Finish Diante QR">
      <header class="brand">
        <div class="mark">
          <img src="/start2finish/assets/icons/android-chrome-192x192.png" alt="Start2Finish" width="192" height="192" />
        </div>
        <div>
          <h1>Start2Finish</h1>
          <p>Diante Culvert</p>
        </div>
      </header>

      <div class="qr-wrap">
        <img
          src="/start2finish/diante/assets/start2finish_brady_qr_print.png"
          alt="QR code for Diante Culvert Start2Finish contact card"
          width="2870"
          height="2870"
          loading="eager"
          decoding="async"
        />
      </div>

      <nav class="actions" aria-label="Start2Finish quick links">
        <a class="btn primary" href="/start2finish/">Contractor Page</a>
        <a class="btn green" href="/start2finish/commercial/">Commercial Property</a>
        <a class="btn green" href="/start2finish/buy/">Buy a House</a>
        <a class="btn" href="/start2finish/rentals/">Find Rentals</a>
      </nav>
    </section>

    <p class="hint">Add this page to Home Screen as “Diante QR”.</p>
  </main>
</body>
</html>
