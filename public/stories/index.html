<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />

  <title>Stories — Square Bidness</title>
  <meta name="description" content="Stories, milestones, and real operator moments from Square Bidness." />
  <link rel="canonical" href="https://www.squarebidness.com/stories/" />
  <meta name="robots" content="index,follow" />

  <link rel="stylesheet" href="/styles/global.css" />
</head>

<body>

  <!-- Header -->
  <div id="site-header"></div>

  <main class="wrap">

    <header class="page-header">
      <h1>Stories</h1>
      <p>Operator moments. Real installs. Real movement.</p>
    </header>

    <section class="stories-grid">

      <!-- 1) 2025 Round Up -->
      <article class="story-card">
        <a class="card-link" href="/stories/2025-roundup/">
          <div class="story-card__media">
            <picture>
              <source
                type="image/webp"
                srcset="
                  /founder/assets/founder-hero-420.webp 420w,
                  /founder/assets/founder-hero-640.webp 640w,
                  /founder/assets/founder-hero-780.webp 780w,
                  /founder/assets/founder-hero-800.webp 800w,
                  /founder/assets/founder-hero-1200.webp 1200w,
                  /founder/assets/founder-hero-1536.webp 1536w
                "
                sizes="(max-width: 768px) 100vw, 520px"
              />
              <source
                type="image/jpeg"
                srcset="
                  /founder/assets/founder-hero-420.jpg 420w,
                  /founder/assets/founder-hero-640.jpg 640w,
                  /founder/assets/founder-hero-780.jpg 780w,
                  /founder/assets/founder-hero-800.jpg 800w,
                  /founder/assets/founder-hero-1200.jpg 1200w,
                  /founder/assets/founder-hero-1536.jpg 1536w
                "
                sizes="(max-width: 768px) 100vw, 520px"
              />
              <img
                src="/founder/assets/founder-hero-780.jpg"
                alt="Marcus Buckner in a Square Bidness fit — founder story moment"
                width="780"
                height="520"
                loading="lazy"
                decoding="async"
                style="object-fit:cover; object-position:center top;"
                onerror="this.onerror=null;this.src='/assets/placeholder-wide.png';"
              />
            </picture>

            <div class="story-badge">Story</div>

            <p class="story-card__excerpt">
              From Louisiana buildouts to New York boardrooms, 2025 proved Square Bidness can stand anywhere.
            </p>

            <div class="story-cta">
              <span class="btn btn--gold">Read feature →</span>
            </div>
          </div>
        </a>
      </article>

    </section>

  </main>

  <!-- Footer -->
  <div id="site-footer"></div>

  <script defer src="/scripts/partials.js"></script>
  <script defer src="/scripts/sb-analytics.js"></script>

</body>
</html>
