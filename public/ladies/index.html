<!-- /public/ladies/index.html -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Ladies — Square Bidness</title>

<link rel="canonical" href="https://www.squarebidness.com/ladies/" />
<meta name="description" content="Square Bidness Ladies — Launching Soon." />
<meta name="theme-color" content="#000000" />
<meta name="color-scheme" content="dark light" />

<link rel="preload" href="/styles/style.css" as="style" />
<link rel="stylesheet" href="/styles/style.css" />

<script defer src="/scripts/ga.js"></script>
<script defer src="/scripts/sb-analytics.js"></script>
<script defer src="/scripts/partials.js"></script>

<style>
#site-header{
  position:absolute;
  width:100%;
  z-index:20;
  background:transparent !important;
  border:none !important;
}

.hero-wrapper{
  position:relative;
  height:100vh;
  overflow:hidden;
  background:#000;
}

/* Slow cinematic zoom */
.hero-wrapper video{
  position:absolute;
  top:50%;
  left:50%;
  min-width:100%;
  min-height:100%;
  width:auto;
  height:auto;
  transform:translate(-50%, -50%) scale(1);
  object-fit:cover;
  animation:slowZoom 18s ease-in-out infinite alternate;
}

@keyframes slowZoom{
  from { transform:translate(-50%, -50%) scale(1); }
  to { transform:translate(-50%, -50%) scale(1.08); }
}

/* Film grain overlay */
.hero-wrapper::after{
  content:"";
  position:absolute;
  inset:0;
  background-image:url("data:image/svg+xml,\
  <svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'>\
  <filter id='noise'><feTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='2' stitchTiles='stitch'/></filter>\
  <rect width='100%' height='100%' filter='url(%23noise)' opacity='0.05'/></svg>");
  pointer-events:none;
  mix-blend-mode:overlay;
}

.hero-overlay{
  position:absolute;
  inset:0;
  background:linear-gradient(to bottom, rgba(0,0,0,.2), rgba(0,0,0,.65));
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:2rem;
}

.hero-content{
  color:#fff;
  max-width:900px;
  opacity:0;
  transform:translateY(30px);
  animation:fadeUp 2s ease forwards;
}

.hero-content h1{
  font-size:clamp(2.2rem,5vw,4.5rem);
  font-weight:400;
  letter-spacing:.08em;
  margin-bottom:1rem;
}

.hero-content p{
  font-size:.9rem;
  letter-spacing:.25em;
  text-transform:uppercase;
  opacity:.85;
}

@keyframes fadeUp{
  to{
    opacity:1;
    transform:translateY(0);
  }
}

/* Scroll reveal section */
.section-next{
  padding:7rem 1.5rem;
  text-align:center;
  background:#020617;
  opacity:0;
  transform:translateY(40px);
  transition:all .8s ease;
}

.section-next.visible{
  opacity:1;
  transform:translateY(0);
}

.btn-outline{
  display:inline-block;
  margin-top:2rem;
  padding:.8rem 1.6rem;
  border:1px solid #fff;
  border-radius:999px;
  text-decoration:none;
  color:#fff;
  font-size:.85rem;
  letter-spacing:.2em;
  text-transform:uppercase;
  transition:all .3s ease;
}

.btn-outline:hover{
  background:#fff;
  color:#000;
}
</style>
</head>

<body class="theme-dark">

<div id="site-header"></div>

<section class="hero-wrapper">

  <!-- Video -->
  <video autoplay muted loop playsinline preload="auto">
    <source src="/assets/video/ladies-teaser.mp4" type="video/mp4" />
  </video>

  <!-- Optional Licensed Piano Audio -->
  <audio id="bgMusic" loop>
    <source src="/assets/audio/ladies-piano.mp3" type="audio/mpeg">
  </audio>

  <div class="hero-overlay">
    <div class="hero-content">
      <h1>Square Bidness Ladies</h1>
      <p>Launching Soon</p>
    </div>
  </div>

</section>

<section class="section-next" id="nextSection">
  <h2 style="font-weight:400; letter-spacing:.1em;">Designed With Intention</h2>
  <p style="max-width:600px; margin:0 auto; opacity:.8;">
    Elevated essentials. Controlled drops.
    Built on presence, precision, and power.
  </p>
  <a href="/connect/" class="btn-outline">Stay Connected</a>
</section>

<div id="site-footer"></div>

<script>
/* Scroll reveal */
const observer = new IntersectionObserver(entries=>{
  entries.forEach(entry=>{
    if(entry.isIntersecting){
      entry.target.classList.add('visible');
    }
  });
},{threshold:.2});
observer.observe(document.getElementById('nextSection'));

/* Soft piano activation after interaction (required for autoplay policy) */
document.addEventListener("click", function(){
  const audio = document.getElementById("bgMusic");
  if(audio.paused){
    audio.volume = 0.3;
    audio.play().catch(()=>{});
  }
},{ once:true });
</script>

</body>
</html>
