  <script>
    // Scroll reveal
    const el = document.getElementById("nextSection");
    const io = new IntersectionObserver((entries) => {
      entries.forEach((entry) => {
        if (entry.isIntersecting) entry.target.classList.add("visible");
      });
    }, { threshold: 0.2 });
    io.observe(el);

    // Click tracking (Conversion Lab)
    document.addEventListener("click", (e) => {
      const a = e.target && e.target.closest ? e.target.closest("a") : null;
      if (!a) return;

      const action = a.getAttribute("data-sb-action");
      if (!action) return;

      try {
        if (typeof window.sbTrack === "function") {
          window.sbTrack("sb_action", {
            sb_brand: document.documentElement.getAttribute("data-sb-brand") || "squarebidness",
            sb_tier: document.documentElement.getAttribute("data-sb-tier") || "landing",
            sb_variant: document.documentElement.getAttribute("data-sb-variant") || "",
            page_path: "/ladies/",
            page_title: document.title || "",
            action,
            component: a.getAttribute("data-sb-component") || "ladies",
            label: a.getAttribute("data-sb-label") || a.textContent.trim(),
            link_url: a.getAttribute("href") || ""
          });
        }
      } catch (_) {}
    });
