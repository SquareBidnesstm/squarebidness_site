<!-- /public/ladies/index.html -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Ladies — Square Bidness</title>

<link rel="canonical" href="https://www.squarebidness.com/ladies/" />
<meta name="description" content="Square Bidness Ladies — Launching Soon." />
<meta name="theme-color" content="#000000" />
<meta name="color-scheme" content="dark light" />

<link rel="preload" href="/styles/style.css" as="style" />
<link rel="stylesheet" href="/styles/style.css" />

<script defer src="/scripts/ga.js"></script>
<script defer src="/scripts/sb-analytics.js"></script>
<script defer src="/scripts/partials.js"></script>

<style>
#site-header{min-height:72px;}
#site-footer{min-height:120px;}

.hero-video-wrapper{
  position:relative;
  width:100%;
  height:100vh;
  overflow:hidden;
  background:#000;
}

.hero-video-wrapper video{
  position:absolute;
  top:50%;
  left:50%;
  min-width:100%;
  min-height:100%;
  width:auto;
  height:auto;
  transform:translate(-50%, -50%);
  object-fit:cover;
}

.hero-overlay{
  position:absolute;
  inset:0;
  background:linear-gradient(to bottom, rgba(0,0,0,.25), rgba(0,0,0,.65));
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:1.5rem;
}

.hero-content{
  color:#fff;
  max-width:800px;
  opacity:0;
  transform:translateY(30px);
  animation:fadeUp 1.8s ease forwards;
}

.hero-content h1{
  font-size:clamp(2rem,5vw,4rem);
  font-weight:400;
  letter-spacing:.08em;
  margin-bottom:1rem;
}

.hero-content p{
  font-size:1rem;
  letter-spacing:.18em;
  text-transform:uppercase;
  opacity:.85;
}

@keyframes fadeUp{
  to{
    opacity:1;
    transform:translateY(0);
  }
}

/* Scroll section */
.section-next{
  padding:6rem 1.5rem;
  text-align:center;
  background:#020617;
  opacity:0;
  transform:translateY(40px);
  transition:all .8s ease;
}

.section-next.visible{
  opacity:1;
  transform:translateY(0);
}

.section-next h2{
  font-weight:400;
  letter-spacing:.1em;
  margin-bottom:1rem;
}

.section-next p{
  max-width:600px;
  margin:0 auto;
  opacity:.8;
}

.btn-outline{
  display:inline-block;
  margin-top:2rem;
  padding:.8rem 1.4rem;
  border:1px solid #fff;
  border-radius:999px;
  text-decoration:none;
  color:#fff;
  font-size:.9rem;
  letter-spacing:.15em;
  text-transform:uppercase;
  transition:all .3s ease;
}

.btn-outline:hover{
  background:#fff;
  color:#000;
}
</style>
</head>

<body class="theme-dark">

<div id="site-header"></div>

<section class="hero-video-wrapper">
  <video autoplay muted loop playsinline preload="auto">
    <source src="/assets/video/ladies-teaser.mp4" type="video/mp4" />
  </video>

  <div class="hero-overlay">
    <div class="hero-content">
      <h1>Square Bidness Ladies</h1>
      <p>Launching Soon</p>
    </div>
  </div>
</section>

<section class="section-next" id="nextSection">
  <h2>Designed With Intention</h2>
  <p>
    Elevated essentials. Controlled drops.  
    Built on principles, presence, and power.
  </p>

  <a href="/connect/" class="btn-outline">Stay Connected</a>
</section>

<div id="site-footer"></div>

<script>
const observer = new IntersectionObserver(entries=>{
  entries.forEach(entry=>{
    if(entry.isIntersecting){
      entry.target.classList.add('visible');
    }
  });
},{threshold:.2});

observer.observe(document.getElementById('nextSection'));
</script>

</body>
</html>
