  <style>
  /* CLS guards for injected partials */
  #site-header{min-height:72px;}

  /* Transparent header only on this page */
  #site-header{
    position:absolute;
    left:0; right:0; top:0;
    z-index:30;
    background:transparent !important;
    border:0 !important;
  }

  /* iOS-safe hero height */
  .hero{
    position:relative;
    min-height:100svh; /* modern mobile viewport */
    min-height:100vh;  /* fallback */
    background:#000;
    overflow:hidden;
  }

  /* We animate a wrapper instead of the video itself for iOS stability */
  .hero-media{
    position:absolute;
    inset:0;
    transform:scale(1);
    animation:sbSlowZoom 18s ease-in-out infinite alternate;
    will-change:transform;
  }
  @keyframes sbSlowZoom{
    from{ transform:scale(1); }
    to{ transform:scale(1.06); }
  }

  .hero video{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }

  /* Soft gradient + contrast overlay */
  .hero::before{
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(to bottom, rgba(0,0,0,.12), rgba(0,0,0,.62));
    z-index:10;
    pointer-events:none;
  }

  /* Lightweight film grain */
  .hero::after{
    content:"";
    position:absolute;
    inset:0;
    z-index:11;
    pointer-events:none;
    opacity:.10;
    background-image:radial-gradient(rgba(255,255,255,.06) 1px, transparent 1px);
    background-size:3px 3px;
    mix-blend-mode:overlay;
  }

  /* ✅ PERFECT CENTER TEXT */
  .hero-content{
    position:absolute;
    inset:0;
    z-index:20;
    display:flex;
    align-items:center;      /* vertical center */
    justify-content:center;  /* horizontal center */
    text-align:center;
    padding:1.25rem;
  }

  .hero-text{
    max-width:900px;
    margin:0 auto;
    opacity:0;
    transform:translateY(18px);
    animation:sbFadeUp 1.8s ease forwards;
  }
  @keyframes sbFadeUp{
    to{ opacity:1; transform:translateY(0); }
  }

  .hero-title{

  <script>
    // Scroll reveal
    const el = document.getElementById("nextSection");
    const io = new IntersectionObserver((entries) => {
      entries.forEach((entry) => {
        if (entry.isIntersecting) entry.target.classList.add("visible");
      });
    }, { threshold: 0.2 });
    io.observe(el);

    // Simple click tracking hook (optional)
    document.addEventListener("click", (e) => {
      const a = e.target?.closest?.("a[data-sb]");
      if (!a) return;
      const label = a.getAttribute("data-sb") || a.getAttribute("href") || "(unknown)";
      try {
        if (typeof window.sbTrack === "function") {
          window.sbTrack("sb_click", { brand:"squarebidness", page:"/ladies/", component:"ladies", action:"click", label, href:a.getAttribute("href")||"" });
        }
      } catch (_) {}
    });
