<!-- /public/ladies/index.html -->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Ladies — Square Bidness</title>

  <link rel="canonical" href="https://www.squarebidness.com/ladies/" />
  <meta name="description" content="Square Bidness Ladies — coming soon." />
  <meta name="robots" content="index,follow" />
  <meta name="theme-color" content="#000000" />
  <meta name="color-scheme" content="dark light" />

  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Square Bidness" />
  <meta property="og:locale" content="en_US" />
  <meta property="og:title" content="Ladies — Square Bidness" />
  <meta property="og:description" content="Square Bidness Ladies — coming soon." />
  <meta property="og:url" content="https://www.squarebidness.com/ladies/" />
  <meta property="og:image" content="https://www.squarebidness.com/assets/og-default-1200x630.jpg" />

  <link rel="preload" href="/styles/style.css" as="style" />
  <link rel="stylesheet" href="/styles/style.css" />

  <script defer src="/scripts/ga.js"></script>
  <script defer src="/scripts/sb-analytics.js"></script>
  <script defer src="/scripts/partials.js"></script>

  <style>
    #site-header{min-height:72px;}
    #site-footer{min-height:120px;}

    .wrap{padding:2.2rem 0 2.4rem;}
    .panel{
      background:#020617;
      border-radius:18px;
      border:1px solid #0f172a;
      padding:1.1rem 1.1rem 1.2rem;
      box-shadow:0 18px 45px rgba(15,23,42,.55);
    }

    .pill{
      display:inline-flex;align-items:center;gap:.45rem;
      padding:.22rem .6rem;border-radius:999px;
      border:1px solid #1f2937;
      font-size:.72rem;letter-spacing:.14em;text-transform:uppercase;
      color:#e5e7eb;background:#020617;
      margin-bottom:.7rem;
    }
    .dot{width:.45rem;height:.45rem;border-radius:999px;background:#ec4899;}

    .video-box{
      border-radius:16px;
      overflow:hidden;
      border:1px solid #111827;
      background:#000;
    }
    video{
      width:100%;
      height:auto;
      display:block;
    }

    .muted{opacity:.85;max-width:62ch;margin:.75rem 0 0;}
    .row{display:flex;flex-wrap:wrap;gap:.6rem;margin-top:1rem;}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:.35rem;cursor:pointer;text-decoration:none;border-radius:999px;}
    .btn--outline{
      border:1px solid #4b5563;background:transparent;color:#e5e7eb;
      padding:.65rem 1rem;font-weight:900;font-size:.95rem;
    }
    .btn--outline:hover{border-color:#9ca3af;}
  </style>
</head>

<body class="theme-dark" id="top">
  <div id="site-header" aria-busy="true" style="content-visibility:auto;contain-intrinsic-size:80px;"></div>

  <main class="section" role="main">
    <div class="container wrap">
      <section class="panel" aria-label="Ladies teaser">
        <p class="pill"><span class="dot"></span>Ladies — Coming Soon</p>
        <h1 class="page-title">Square Bidness Ladies</h1>

        <div class="video-box" style="margin-top:1rem;">
          <video
            controls
            playsinline
            preload="metadata"
            poster="/assets/og-default-1200x630.jpg"
            data-sb="ladies-video"
          >
            <source src="/assets/video/ladies-teaser.mp4" type="video/mp4" />
            Sorry — your browser doesn’t support this video.
          </video>
        </div>

        <p class="muted">
          New looks building now. Tap Connect for partnerships, or hit Socials to stay tapped in.
        </p>

        <div class="row">
          <a class="btn btn--outline" href="/connect/" data-sb="ladies-back-connect">Connect</a>
          <a class="btn btn--outline" href="/social/" data-sb="ladies-socials">Socials</a>
        </div>
      </section>
    </div>
  </main>

  <div id="site-footer" aria-busy="true" style="content-visibility:auto;contain-intrinsic-size:140px;"></div>

  <script>
    document.addEventListener("click", (e) => {
      const a = e.target?.closest?.("a[data-sb]");
      if (!a) return;
      const label = a.getAttribute("data-sb") || a.getAttribute("href") || "(unknown)";
      try {
        if (typeof window.sbTrack === "function") {
          window.sbTrack("sb_click", { brand:"squarebidness", page:"/ladies/", component:"ladies", action:"click", label, href:a.getAttribute("href")||"" });
          return;
        }
      } catch (_) {}
      try {
        if (typeof window.gtag === "function") {
          window.gtag("event","sb_click",{ brand:"squarebidness", page_path:"/ladies/", event_category:"ladies", event_label:label });
        }
      } catch (_) {}
    });
  </script>
</body>
</html>
