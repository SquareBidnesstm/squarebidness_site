<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>You're Booked — Courageaux Aesthetics</title>
  <meta name="description" content="Your Courageaux Aesthetics appointment is confirmed and paid." />
  <meta name="robots" content="noindex" />
  <link rel="icon" href="/courageaux/assets/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="/courageaux/assets/favicon-32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/courageaux/assets/icon_180.png">
  <style>
    :root{--bg:#0b0b0b;--ink:#fff;--muted:#bdbdbd;--muted2:#71717a;--stroke:#1f1f1f;--gold:#c9a227;--ok:#20c997}
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{min-height:100dvh;background:var(--bg);color:var(--ink);font-family:system-ui,-apple-system,sans-serif;line-height:1.5;display:flex;flex-direction:column}
    a{color:inherit;text-decoration:none}
    nav{border-bottom:1px solid var(--stroke);background:rgba(0,0,0,.6);backdrop-filter:blur(10px)}
    .nav-inner{max-width:600px;margin:0 auto;padding:12px 16px;display:flex;align-items:center;justify-content:space-between}
    .cx-brand{display:inline-flex;align-items:center;gap:9px;font-weight:950;font-size:.92rem}
    .cx-brand img{width:22px;height:22px;border-radius:7px;border:1px solid rgba(255,255,255,.14);background:#fff;padding:2px}
    .cx-back{color:var(--muted2);font-size:.88rem;font-weight:800}
    main{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px}
    .card{max-width:420px;width:100%;text-align:center}
    .icon{font-size:3rem;margin-bottom:16px}
    h1{font-size:2rem;letter-spacing:-.02em;margin-bottom:10px;color:var(--ok)}
    p{color:var(--muted);margin-bottom:24px;line-height:1.6;max-width:36ch;margin-left:auto;margin-right:auto}
    .btn-row{display:flex;flex-direction:column;gap:10px}
    .btn{display:inline-flex;align-items:center;justify-content:center;padding:14px 24px;border-radius:12px;font-weight:950;font-size:.95rem;text-decoration:none;transition:opacity .12s}
    .btn--gold{background:var(--gold);color:#000}
    .btn--ghost{border:1px solid var(--stroke);color:var(--muted)}
    .btn:active{opacity:.8}
    footer{border-top:1px solid var(--stroke);padding:14px;text-align:center;color:var(--muted2);font-size:.8rem}
    footer a{color:var(--gold);font-weight:950}
  </style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a class="cx-brand" href="/courageaux/">
      <img src="/courageaux/assets/icon_courageaux_512.png" alt="Courageaux" width="22" height="22" loading="eager">
      Courageaux
    </a>
    <a class="cx-back" href="/courageaux/">← Home</a>
  </div>
</nav>

<main>
  <div class="card">
    <div class="icon">💛</div>
    <h1>You're booked!</h1>
    <p>Payment confirmed. Amari will be at your door. Keep your phone nearby — she'll reach out with any updates.</p>
    <div class="btn-row">
      <a class="btn btn--gold" href="https://instagram.com/courageuxaesthetics" target="_blank" rel="noopener">Follow @courageuxaesthetics</a>
      <a class="btn btn--ghost" href="/courageaux/">Back to Courageaux</a>
    </div>
  </div>
</main>

<footer>
  <a href="https://lab.squarebidness.com/" target="_blank" rel="noopener">Square Bidness Tech Lab</a>
</footer>

</body>
</html>
