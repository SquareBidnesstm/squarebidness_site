  <style>
    :root{--bg:#0b0b0b;--ink:#fff;--muted:#bdbdbd;--muted2:#71717a;--stroke:#1f1f1f;--gold:#c9a227;--ok:#20c997}
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{min-height:100dvh;background:var(--bg);color:var(--ink);font-family:system-ui,-apple-system,sans-serif;line-height:1.5;display:flex;flex-direction:column}
    a{color:inherit;text-decoration:none}

    .wrap{flex:1;max-width:560px;margin:0 auto;padding:48px 20px 96px;display:flex;flex-direction:column;justify-content:center}

    .brand{display:inline-flex;align-items:center;gap:10px;margin-bottom:28px}
    .brand img{width:40px;height:40px;border-radius:12px;border:1px solid rgba(255,255,255,.12);background:#fff;padding:3px}
    .brand-name{font-weight:950;font-size:1rem;letter-spacing:-.01em}

    h1{font-size:clamp(2rem,6vw,3rem);letter-spacing:-.025em;line-height:1.08;margin-bottom:10px}
    .sub{color:#d0d3d8;font-size:1rem;line-height:1.55;margin-bottom:20px;max-width:44ch}

    .chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:0}
    .chip{display:inline-flex;align-items:center;gap:7px;padding:6px 10px;border-radius:999px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.04);font-weight:900;font-size:.8rem;white-space:nowrap}
    .dot{width:7px;height:7px;border-radius:50%;background:var(--muted2)}
    .dot--ok{background:var(--ok)}
    .dot--gold{background:var(--gold)}

    nav{position:sticky;top:0;z-index:50;border-bottom:1px solid var(--stroke);background:rgba(11,11,11,.85);backdrop-filter:blur(10px)}
    .nav-inner{max-width:560px;margin:0 auto;padding:11px 16px;display:flex;align-items:center;justify-content:space-between}
    .nav-brand{display:inline-flex;align-items:center;gap:8px;font-weight:950;font-size:.9rem}
    .nav-brand img{width:22px;height:22px;border-radius:7px;border:1px solid rgba(255,255,255,.14);background:#fff;padding:2px}
    .nav-book{background:var(--gold);color:#000;font-weight:950;font-size:.82rem;padding:7px 14px;border-radius:999px;white-space:nowrap}

    footer{border-top:1px solid var(--stroke);padding:20px;text-align:center}
    .footer-links{display:flex;flex-wrap:wrap;justify-content:center;gap:10px 16px;font-size:.85rem;color:var(--muted2);margin-bottom:8px}
    .footer-links a{color:var(--muted);font-weight:800}
    .footer-links a:hover{color:var(--gold)}
    .footer-copy{font-size:.78rem;color:var(--muted2)}
    .footer-copy a{color:var(--gold);font-weight:950}

    .sticky-book{position:fixed;bottom:0;left:0;right:0;z-index:90;padding:13px 16px env(safe-area-inset-bottom,0);background:var(--gold);display:flex;align-items:center;justify-content:center;box-shadow:0 -2px 20px rgba(0,0,0,.5)}
    .sticky-book a{color:#000;font-weight:950;font-size:1rem;text-decoration:none;letter-spacing:-.01em}
  </style>
</head>
<body>
  <noscript><img height="1" width="1" style="display:none" src="https://www.facebook.com/tr?id=914123084877133&ev=PageView&noscript=1" /></noscript>

  <nav>
    <div class="nav-inner">
      <a class="nav-brand" href="/courageaux/">
        <img src="/courageaux/assets/icon_courageaux_512.png" alt="Courageaux" width="22" height="22" loading="eager">
        Courageaux
      </a>
      <a class="nav-book" href="/courageaux/book/">Book a Facial</a>
    </div>
  </nav>

  <div class="wrap">
    <div class="brand">
      <img src="/courageaux/assets/icon_courageaux_512.png" alt="Courageaux Aesthetics" width="40" height="40" loading="eager" decoding="async">
      <span class="brand-name">Courageaux Aesthetics</span>
    </div>

    <h1>Clean, calm,<br>confident skin.</h1>
    <p class="sub">Routine-first corrective care. Mobile service — Amari comes to you.</p>

    <div class="chips">
      <div class="chip" id="booking-chip">
        <span class="dot" id="booking-dot"></span>
        <span id="booking-chip-text">Checking…</span>
      </div>
      <div class="chip">
        <span class="dot dot--gold"></span>
        <strong style="color:var(--gold)">MOBILE</strong>&nbsp;· We come to you
      </div>
    </div>
  </div>

  <footer>
    <div class="footer-links">
      <a href="/courageaux/book/">Book</a>
      <span style="color:var(--muted2);cursor:default">Products <span style="font-size:.7rem;opacity:.6">coming soon</span></span>
    </div>
    <div class="footer-copy">
      © <span id="yr"></span> Courageaux Aesthetics · Southeast Louisiana
      · <a href="/courageaux/admin/">Admin</a>
    </div>
  </footer>

  <div class="sticky-book">
    <a href="/courageaux/book/" data-sb-action="cx_sticky_book" data-sb-label="Book a Facial Now">Book a Facial Now →</a>
  </div>

  <script>
    document.getElementById("yr").textContent = new Date().getFullYear();
    (async () => {
      try {
        const {state} = await (await fetch("/api/courageaux/status")).json();
        const dot  = document.getElementById("booking-dot");
        const text = document.getElementById("booking-chip-text");
        if (state.bookingOpen) {
          dot.classList.add("dot--ok");
          text.innerHTML = state.flashSaleActive && state.flashSaleLabel
            ? `<strong style="color:var(--ok)">OPEN</strong> · 🔥 ${state.flashSaleLabel}`
            : `<strong style="color:var(--ok)">OPEN</strong> · Booking now`;
        } else {
          text.innerHTML = `<strong>CLOSED</strong> · Not taking bookings`;
        }
      } catch {}
    })();
  </script>
</body>
