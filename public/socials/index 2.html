<!-- /public/socials/index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Socials — Square Bidness</title>

  <link rel="canonical" href="https://www.squarebidness.com/socials/" />
  <meta name="description" content="Official Square Bidness socials and channels." />
  <meta name="robots" content="index,follow" />
  <meta name="theme-color" content="#000000" />
  <meta name="sb:build" content="v20260425-socials-hub" />

  <link rel="preload" href="/styles/style.css" as="style" />
  <link rel="stylesheet" href="/styles/style.css" />

  <script defer src="/scripts/ga.js"></script>
  <script defer src="/scripts/sb-analytics.js"></script>
  <script defer src="/scripts/partials.js"></script>

  <style>
    #site-header{min-height:72px;}
    #site-footer{min-height:120px;}

    body{background:#020617;color:#e5e7eb;}

    .socials-hero{
      padding:2.5rem 0 1.75rem;
      border-bottom:1px solid #0f172a;
      background:radial-gradient(circle at top left,#111827,#020617 55%);
    }

    .socials-panel{
      background:#020617;
      border:1px solid #1f2937;
      border-radius:22px;
      padding:1.4rem;
      box-shadow:0 18px 45px rgba(15,23,42,.55);
    }

    .stack{display:grid;gap:.75rem;margin-top:1rem;}

    .social-btn{
      display:flex;
      align-items:center;
      justify-content:center;
      width:100%;
      padding:1rem;
      border-radius:999px;
      border:1px solid #1f2937;
      background:#020617;
      color:#e5e7eb;
      text-decoration:none;
      font-weight:900;
    }

    .social-btn:hover{background:#0b1220;border-color:#374151;}

    .row{display:flex;gap:.65rem;flex-wrap:wrap;margin-top:1rem;}

    .mini-btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:.7rem 1rem;
      border-radius:999px;
      border:1px solid #4b5563;
      color:#e5e7eb;
      text-decoration:none;
      font-weight:800;
    }
  </style>
</head>

<body class="theme-dark" id="top">
  <div id="site-header" aria-busy="true" style="content-visibility:auto;contain-intrinsic-size:80px;"></div>

  <header class="socials-hero">
    <div class="container">
      <h1 class="page-title">Socials</h1>
    </div>
  </header>

  <main class="section">
    <div class="container">
      <section class="socials-panel">
        <div class="stack">
          <a class="social-btn" href="/socials/instagram/" data-sb="socials-instagram">Instagram (@squarebidnesstm)</a>
          <a class="social-btn" href="/socials/tiktok/" data-sb="socials-tiktok">TikTok (@squarebidnesstm)</a>
          <a class="social-btn" href="/socials/facebook/" data-sb="socials-facebook">Facebook</a>
          <a class="social-btn" href="/socials/youtube/" data-sb="socials-youtube">YouTube</a>
          <a class="social-btn" href="/socials/linkedin/" data-sb="socials-linkedin">LinkedIn</a>
          <a class="social-btn" href="/socials/bluesky/" data-sb="socials-bluesky">Bluesky</a>
          <a class="social-btn" href="/socials/x/" data-sb="socials-x">X (@marcusbuckner_)</a>
        </div>

        <div class="row">
          <a class="mini-btn" href="/connect/" data-sb="socials-back-connect">Back to Connect</a>
          <a class="mini-btn" href="https://lab.squarebidness.com/" target="_blank" rel="noopener" data-sb="socials-open-lab">Open Tech Lab</a>
        </div>
      </section>
    </div>
  </main>

  <div id="site-footer" aria-busy="true" style="content-visibility:auto;contain-intrinsic-size:140px;"></div>
</body>
</html>
