<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />

  <title>Restaurant System Install — Square Bidness</title>
  <meta name="description" content="Install a prepaid ordering system for your restaurant. Clean orders, less phone traffic, better operations." />

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0b0b0b;
      color: #fff;
      margin: 0;
      padding: 20px;
    }

    .wrap {
      max-width: 600px;
      margin: auto;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 10px;
    }

    p {
      color: #ccc;
      margin-bottom: 20px;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    input, select, textarea {
      padding: 12px;
      border-radius: 8px;
      border: none;
      font-size: 16px;
    }

    button {
      padding: 14px;
      background: #D4AF37;
      color: #000;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }
  </style>
</head>
<body>

<div class="wrap">
  <h1>Install a Ordering System</h1>
  <p>
    We take your restaurant from call-in orders to a structured, prepaid system.
  </p>

  <form action="/api/install-intake" method="POST">
    <input name="name" placeholder="Your Name" required />
    <input name="business" placeholder="Business Name" required />
    <input name="phone" placeholder="Phone Number" required />
    <input name="city" placeholder="City" required />

    <select name="order_flow">
      <option value="">How do orders come in?</option>
      <option>Calls</option>
      <option>Text Messages</option>
      <option>Facebook / Social Media</option>
      <option>Mix of everything</option>
    </select>

    <select name="prepaid">
      <option value="">Do you want prepaid orders?</option>
      <option>Yes</option>
      <option>No</option>
    </select>

    <textarea name="notes" placeholder="Anything else we should know?"></textarea>

    <button type="submit">Request Install</button>
  </form>
</div>

</body>
</html>
