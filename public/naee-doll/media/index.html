  <style>
    :root{--bg:#000;--fg:#fff;--muted:rgba(255,255,255,.68);--gold:#c7a65c;--line:rgba(255,255,255,.12);--card:rgba(255,255,255,.04)}
    *{box-sizing:border-box} body{margin:0;background:#000;color:#fff;font-family:system-ui,-apple-system,Segoe UI,Roboto,Inter,sans-serif}
    a{color:inherit;text-decoration:none}.container{max-width:1040px;margin:0 auto;padding:0 16px}
    .hero{min-height:72vh;display:grid;place-items:center;text-align:center;padding:4rem 0;border-bottom:1px solid var(--line);background:radial-gradient(900px 500px at 50% 10%,rgba(199,166,92,.13),transparent 60%),#000}
    .kicker{display:inline-block;border:1px solid rgba(199,166,92,.6);color:var(--gold);border-radius:999px;padding:.45rem .9rem;text-transform:uppercase;letter-spacing:.12em;font-size:.78rem}
    h1{font-size:clamp(2.4rem,7vw,5.5rem);margin:1rem 0 .4rem;letter-spacing:.04em}.sub{color:var(--muted);font-size:1.05rem}
    .cta{display:flex;gap:.65rem;flex-wrap:wrap;justify-content:center;margin-top:1.4rem}.btn{border:1px solid var(--line);border-radius:999px;padding:.75rem 1rem;background:rgba(255,255,255,.05);font-weight:700}.btn.gold{border-color:rgba(199,166,92,.7);color:var(--gold)}
    .section{padding:2.5rem 0;border-bottom:1px solid var(--line)}.title{text-transform:uppercase;letter-spacing:.12em;color:var(--gold);font-size:.82rem}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:1rem;margin-top:1rem}
    .card{border:1px solid var(--line);background:var(--card);border-radius:18px;overflow:hidden}.card img{width:100%;aspect-ratio:4/5;object-fit:cover;display:block}.card div{padding:1rem;color:var(--muted)}
    footer{text-align:center;padding:2rem 1rem;color:var(--muted);font-size:.88rem}footer a{text-decoration:underline;text-underline-offset:3px}
  </style>
</head>
<body>
  <header class="hero">
    <div class="container">
      <span class="kicker">Naee Doll • Media</span>
      <h1>Visual record.</h1>
      <p class="sub">Frames, footage, and controlled presence.</p>
      <div class="cta">
        <a class="btn gold" href="/naee-doll/linkme/" onclick="sbIntent('naee_media_linkme', this)">Linkme →</a>
        <a class="btn" href="/naee-doll/modeling/" onclick="sbIntent('naee_media_modeling', this)">Modeling →</a>
      </div>
    </div>
  </header>

  <main>
    <section class="section">
      <div class="container">
        <p class="title">Media archive</p>
        <div class="grid">
          <figure class="card">
            <img src="/naee-doll/assets/nae-doll_780.jpg" alt="Naee Doll media frame one" loading="lazy" decoding="async">
            <div>Frame One • Still Ridin.</div>
          </figure>
          <figure class="card">
            <img src="/naee-doll/assets/nae-doll-2_780.jpg" alt="Naee Doll media frame two" loading="lazy" decoding="async">
            <div>Frame Two • Public Record</div>

        </div>

    </section>
  </main>

  <footer>
    Naee Doll • Square Bidness © 2026 •
