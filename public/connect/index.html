<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Connect — Square Bidness</title>

  <link rel="canonical" href="https://www.squarebidness.com/connect/" />
  <meta name="description" content="Connect with Marcus Buckner and Square Bidness — save contact, LinkedIn, email, events, booking, systems, and socials." />
  <meta name="robots" content="index,follow" />

  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Square Bidness" />
  <meta property="og:title" content="Connect — Square Bidness" />
  <meta property="og:description" content="Direct Square Bidness contact lane — save contact, LinkedIn, email, events, booking, systems, and socials." />
  <meta property="og:url" content="https://www.squarebidness.com/connect/" />
  <meta property="og:image" content="https://www.squarebidness.com/connect/assets/connect_1200x630.jpg" />
  <meta property="og:image:width" content="1200" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Connect — Square Bidness" />
  <meta name="twitter:description" content="Direct Square Bidness contact lane." />
  <meta name="twitter:image" content="https://www.squarebidness.com/connect/assets/connect_1200x630.jpg" />

  <link rel="preload" href="/styles/style.css" as="style" />
  <link rel="stylesheet" href="/styles/style.css" />

  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="apple-touch-icon" href="/icon_180.png" />
  <link rel="manifest" href="/manifest.webmanifest" />

  <script defer src="/scripts/ga.js"></script>
  <script defer src="/scripts/sb-analytics.js"></script>
  <script defer src="/scripts/meta-pixel.js"></script>
  <script defer src="/scripts/sb-meta-bridge.js"></script>

  <style>
    :root{
      --bg:#000;
      --panel:#050505;
      --panel2:#0b0b0b;
      --line:#1d1d1f;
      --line2:#2a2a2d;
      --text:#f5f5f5;
      --muted:#a1a1aa;
      --soft:#d4d4d8;
      --white:#fff;
      --shadow:0 26px 70px rgba(0,0,0,.55);
      --radius:28px;
      --max:1040px;
    }

    html,
    body{
      overflow-x:hidden;
    }

    body{
      background:#000;
      color:var(--text);
    }

    .connect-wrap{
      width:min(calc(100% - 28px),var(--max));
      margin:0 auto;
    }

    .connect-main{
      padding:clamp(14px,3vw,34px) 0 0;
      background:
        radial-gradient(circle at 50% -18%, rgba(255,255,255,.08), transparent 34%),
        radial-gradient(circle at 12% 8%, rgba(15,23,42,.55), transparent 36%),
        #000;
    }

    .connect-card{
      width:100%;
      max-width:760px;
      margin:0 auto;
      overflow:hidden;
      border-radius:var(--radius);
      border:1px solid var(--line);
      background:linear-gradient(180deg,#070707,#030303);
      box-shadow:var(--shadow);
    }

    .identity-panel{
      padding:clamp(14px,3vw,28px);
      background:
        radial-gradient(circle at 50% 0%, rgba(255,255,255,.08), transparent 34%),
        #030303;
    }

    .brand-box{
      min-width:0;
      min-height:0;
      display:flex;
      flex-direction:column;
      justify-content:center;
      gap:0;
      border-radius:24px;
      border:1px solid var(--line2);
      background:#000;
      padding:clamp(34px,7vw,58px) 22px;
    }

    .brand-mark{
      width:min(70%,320px);
      margin:0 auto;
    }

    .brand-mark img{
      display:block;
      width:100%;
      height:auto;
    }

    .brand-name{
      margin:clamp(26px,5vh,44px) 0 0;
      text-align:center;
      max-width:100%;
      font-size:clamp(2.15rem,6.5vw,4.2rem);
      line-height:1;
      letter-spacing:-.045em;
      font-weight:950;
      color:#fff;
      overflow-wrap:normal;
    }

    .brand-role{
      margin:14px 0 0;
      text-align:center;
      color:#d4d4d8;
      font-weight:900;
      font-size:clamp(1.35rem,4.2vw,2.05rem);
      line-height:1.1;
    }

    .action-panel{
      padding:clamp(18px,3vw,28px);
      display:grid;
      gap:14px;
      align-content:start;
    }

    .action-grid{
      display:grid;
      grid-template-columns:1fr;
      gap:14px;
    }

    .sb-btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:76px;
      padding:0 24px;
      border-radius:999px;
      text-decoration:none;
      font-size:clamp(1.25rem,4vw,2rem);
      font-weight:950;
      transition:transform .12s ease, background .14s ease, border-color .14s ease, box-shadow .14s ease;
      white-space:nowrap;
    }

    .sb-btn:hover{
      transform:translateY(-1px);
    }

    .sb-btn:active{
      transform:scale(.97);
    }

    .sb-btn--primary{
      background:#fff;
      color:#000;
      border:1px solid #fff;
      box-shadow:0 18px 30px rgba(255,255,255,.10);
    }

    .sb-btn--ghost{
      background:#0b0b0b;
      color:#fff;
      border:1px solid #242427;
    }

    .sb-btn--outline{
      background:transparent;
      color:#fff;
      border:1px solid #3a3a3d;
    }

    .sb-btn--accent{
      background:#0a1a0a;
      color:#22c55e;
      border:1px solid #166534;
      box-shadow:0 0 24px rgba(34,197,94,.10);
    }

    .sb-btn--accent:hover{
      background:#0d2010;
      border-color:#22c55e;
      box-shadow:0 0 32px rgba(34,197,94,.18);
    }

    .connect-footer{
      width:min(calc(100% - 28px),760px);
      margin:18px auto 0;
      padding:20px 16px 30px;
      border-top:1px solid #171717;
      text-align:center;
      color:#d7dae0;
    }

    .connect-footer a{
      color:#fff;
      text-decoration:none;
      font-weight:800;
    }

    .connect-footer p{
      margin:0;
      line-height:1.55;
      font-size:clamp(.9rem,3.2vw,1.08rem);
      text-wrap:balance;
    }

    .connect-footer p + p{
      margin-top:8px;
    }

    @media(max-width:780px){
      .connect-wrap{
        width:min(calc(100% - 18px),var(--max));
      }

      .identity-panel{
        border-bottom:1px solid var(--line);
        padding:10px;
      }

      .brand-box{
        padding:clamp(30px,8vw,44px) 12px;
      }

      .brand-mark{
        width:min(68%,245px);
      }

      .brand-name{
        margin-top:clamp(22px,5vh,36px);
        font-size:clamp(1.65rem,8.4vw,2.08rem);
        letter-spacing:-.055em;
      }

      .action-panel{
        padding:18px 14px 22px;
      }

      .sb-btn{
        min-height:68px;
      }

      .connect-footer{
        width:min(calc(100% - 18px),760px);
        margin-top:14px;
        padding:18px 10px 28px;
      }
    }
  </style>
</head>

<body class="theme-dark" id="top">
  <noscript>
    <img height="1" width="1" style="display:none"
         src="https://www.facebook.com/tr?id=914123084877133&ev=PageView&noscript=1" />
  </noscript>
  <main class="connect-main" role="main">
    <div class="connect-wrap">
      <section class="connect-card" aria-labelledby="connect-heading">

        <div class="identity-panel">
          <div class="brand-box">
            <div aria-labelledby="connect-heading">
              <div class="brand-mark">
                <img src="/connect/assets/sb-wordmark-white.png" alt="Square Bidness" />
              </div>

              <h1 class="brand-name" id="connect-heading">Marcus Buckner</h1>
              <p class="brand-role">Founder</p>
            </div>
          </div>
        </div>

        <div class="action-panel">
          <div class="action-grid">

            <a class="sb-btn sb-btn--primary"
               href="/connect/marcus-buckner.vcf"
               data-sb-action="cx_connect_save_contact"
               data-sb-component="connect"
               data-sb-label="Save Contact">
              Save Contact
            </a>

            <a class="sb-btn sb-btn--ghost"
               href="http://linkedin.com/in/marcus-buckner-sb"
               target="_blank"
               rel="noopener"
               data-sb-action="cx_connect_linkedin"
               data-sb-component="connect">
              LinkedIn
            </a>

            <a class="sb-btn sb-btn--outline"
               href="mailto:marcusbuckner@squarebidness.com"
               data-sb-action="cx_connect_email"
               data-sb-component="connect">
              Email
            </a>

            <a class="sb-btn sb-btn--ghost"
               href="https://events.squarebidness.com/"
               target="_blank"
               rel="noopener"
               data-sb-action="cx_connect_events"
               data-sb-component="connect">
              Events
            </a>

            <a class="sb-btn sb-btn--ghost"
               href="https://booking.squarebidness.com/"
               target="_blank"
               rel="noopener"
               data-sb-action="cx_connect_booking"
               data-sb-component="connect">
              Booking
            </a>

            <a class="sb-btn sb-btn--outline"
               href="/work/"
               data-sb-action="cx_connect_systems"
               data-sb-component="connect">
              Systems
            </a>

            <a class="sb-btn sb-btn--ghost"
               href="/socials/"
               data-sb-action="cx_connect_socials"
               data-sb-component="connect">
              Socials
            </a>

          </div>

        </div>

      </section>
    </div>
  </main>

  <footer class="connect-footer" aria-label="Square Bidness footer">
    <p><a href="/">2026 Square Bidness</a></p>
    <p>Principles. Morals. Business Done Right.</p>
    <p>Louisiana · US</p>
  </footer>

  <script>
    document.querySelectorAll('a[href$=".vcf"]').forEach(btn => {
      btn.addEventListener("click", () => {
        const original = btn.textContent;
        btn.textContent = "Opening…";
        setTimeout(() => {
          btn.textContent = original;
        }, 2000);
      });
    });
  </script>
</body>
</html>
