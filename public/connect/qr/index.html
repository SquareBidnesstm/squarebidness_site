<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>SB Connect QR | Square Bidness</title>
  <meta name="description" content="Fast QR access for the Square Bidness connect card." />
  <meta name="robots" content="noindex,follow" />
  <meta name="theme-color" content="#000000" />
  <meta name="application-name" content="SB QR" />
  <meta name="apple-mobile-web-app-title" content="SB QR" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <link rel="canonical" href="https://www.squarebidness.com/connect/qr/" />
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="apple-touch-icon" sizes="180x180" href="/connect/qr/assets/sb-qr-icon-180.png" />
  <link rel="manifest" href="/connect/qr/manifest.webmanifest" />

  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Square Bidness" />
  <meta property="og:title" content="SB Connect QR" />
  <meta property="og:description" content="Scan to connect with Marcus Buckner and Square Bidness." />
  <meta property="og:url" content="https://www.squarebidness.com/connect/qr/" />
  <meta property="og:image" content="https://www.squarebidness.com/connect/assets/connect_1200x630.jpg" />

  <style>
    :root{
      --bg:#000;
      --panel:#080808;
      --panel2:#101010;
      --line:#242427;
      --text:#f7f7f8;
      --muted:#a1a1aa;
      --green:#22c55e;
      --shadow:0 24px 80px rgba(0,0,0,.55);
    }

    *{box-sizing:border-box}

    html,body{
      margin:0;
      min-height:100%;
      background:#000;
      color:var(--text);
      font-family:Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow-x:hidden;
    }

    body{
      min-height:100vh;
      min-height:100dvh;
      display:grid;
      place-items:center;
      padding:calc(18px + env(safe-area-inset-top)) 18px calc(18px + env(safe-area-inset-bottom));
      overflow-x:hidden;
    }

    a{
      color:inherit;
      text-decoration:none;
    }

    .shell{
      width:min(310px,calc(100vw - 40px));
      max-width:calc(100vw - 36px);
      display:grid;
      gap:14px;
    }

    .card{
      border:1px solid var(--line);
      border-radius:28px;
      background:
        radial-gradient(circle at top,rgba(255,255,255,.08),transparent 32%),
        linear-gradient(180deg,#090909,#030303);
      box-shadow:var(--shadow);
      padding:14px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      margin-bottom:16px;
    }

    .brand img{
      width:46px;
      height:46px;
      border-radius:14px;
    }

    .brand strong{
      display:block;
      font-size:1.06rem;
      letter-spacing:-.02em;
    }

    .brand span{
      display:block;
      color:var(--muted);
      font-size:.9rem;
      margin-top:1px;
    }

    .qr-box{
      border-radius:24px;
      background:#fff;
      padding:16px;
    }

    .qr-box img{
      display:block;
      width:100%;
      height:auto;
      image-rendering:crisp-edges;
    }

    .actions{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:9px;
      margin-top:14px;
    }

    .btn{
      min-height:52px;
      border-radius:999px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:0 14px;
      border:1px solid var(--line);
      background:#0b0b0b;
      font-weight:950;
      line-height:1.1;
      min-width:0;
      font-size:clamp(.9rem,4vw,1rem);
      overflow-wrap:anywhere;
    }

    .btn.primary{
      grid-column:1 / -1;
      background:#fff;
      color:#000;
      border-color:#fff;
    }

    .btn.green{
      background:#071607;
      color:#86efac;
      border-color:#166534;
    }

    .note{
      color:#71717a;
      text-align:center;
      font-size:.82rem;
    }

    @media(max-width:600px){
      body{place-items:start}
      .shell{margin-left:0;margin-right:auto}
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="card" aria-label="Square Bidness connect QR">
      <div class="brand">
        <img src="/connect/assets/square-bidness-mark.png" alt="" />
        <div>
          <strong>Square Bidness</strong>
          <span>Marcus Buckner · Direct connect</span>
        </div>
      </div>

      <div class="qr-box">
        <img src="/connect/assets/sb_connect_qr.png" alt="QR code to open Square Bidness connect page" />
      </div>

      <div class="actions">
        <a class="btn primary" href="/connect/">Open Connect Card</a>
        <a class="btn" href="/events/qr/">Events</a>
        <a class="btn" href="/booking/qr/">Booking</a>
        <a class="btn green" href="/restaurant/qr/">Restaurants</a>
        <a class="btn green" href="/foodtruck/qr/">Food Trucks</a>
        <a class="btn" href="/stripe-connect/qr/">Stripe QR</a>
      </div>
    </section>

    <div class="note">Add this page to Home Screen as “SB QR”.</div>
  </main>
</body>
</html>
