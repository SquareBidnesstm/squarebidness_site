  <style>
    :root{
      --bg:#0b0b0b;
      --line:rgba(255,255,255,.14);
      --text:#f2f2f2;
      --muted:rgba(255,255,255,.72);
      --radius:18px;
      --shadow:0 16px 48px rgba(0,0,0,.55);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
      color:var(--text);

      /* ✅ CENTER IT BACK (like before) */
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:18px;

      /* Darker background (kept) */
      background:
        radial-gradient(900px 500px at 20% -10%, rgba(255,255,255,.06), transparent 60%),
        radial-gradient(900px 500px at 80% 0%, rgba(255,255,255,.04), transparent 60%),
        #070707;
    }

    .wrap{width:100%; max-width:520px;}

    .card{
      background:linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.015));
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      overflow:hidden;
    }
    .top{
      padding:20px 18px 14px;
      border-bottom:1px solid var(--line);
    }
    .brand{
      display:flex;
      gap:12px;
      align-items:center;
      justify-content:space-between;
      flex-wrap:wrap;
    }
    .leftbrand{
      display:flex;
      gap:12px;
      align-items:center;
      min-width:240px;
    }
    .mark{
      width:44px;
      height:44px;
      border-radius:14px;
      border:1px solid var(--line);
      background:rgba(0,0,0,.35);
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
    }
    .title{line-height:1.15;}
    .title h1{font-size:18px; margin:0 0 4px 0; letter-spacing:.2px;}
    .title p{margin:0; color:var(--muted); font-size:13px;}

    .body{padding:16px 18px 18px;}
    .name{margin:0 0 2px 0; font-size:22px; letter-spacing:.2px;}
    .role{margin:0 0 14px 0; color:var(--muted); font-size:14px;}

    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin:10px 0 14px;
    }
    .btn{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      padding:12px 12px;
      border-radius:14px;
      background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.02));
      border:1px solid var(--line);
      color:var(--text);
      text-decoration:none;
      font-weight:800;
      letter-spacing:.2px;
      min-height:46px;
      transition:transform .05s ease, border-color .15s ease, background .15s ease;
      user-select:none;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:hover{border-color:rgba(255,255,255,.22)}
    .btn:active{transform:translateY(1px)}
    .btn.secondary{
      background:linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.01));
      font-weight:700;
    }
    .full{grid-column:1 / -1;}

    .detail{
      border-top:1px solid var(--line);
      padding-top:12px;
      color:var(--muted);
      font-size:13px;
      line-height:1.45;
    }
    .slogan{
      margin:10px 0 0;
      color:rgba(255,255,255,.86);
      font-size:12.5px;
      letter-spacing:.2px;
    }

    .footer{
      padding:12px 18px 14px;
      border-top:1px solid var(--line);
      display:flex;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
      color:var(--muted);
      font-size:12px;
    }
    .chip{
      border:1px solid var(--line);
      padding:6px 10px;
      border-radius:999px;
      background:rgba(0,0,0,.25);
    }
    @media (max-width:420px){
      .grid{grid-template-columns:1fr;}
    }
  </style>
</head>

<body>
  <main class="wrap">
    <section class="card" aria-label="Square Bidness Founder Contact Card">
      <header class="top">
        <div class="brand">
          <div class="leftbrand">
            <div class="mark" aria-label="Square Bidness icon">

                   alt="Square Bidness Mark"

            </div>
            <div class="title">
              <h1>Square Bidness</h1>
              <p>Founder Direct</p>

        </div>

      <div class="body">
        <h2 class="name">Marcus Buckner</h2>
        <p class="role">Founder</p>

        <div class="grid" aria-label="Actions">
          <a class="btn"
             href="tel:+19859817001"
             data-sb-event="sb_click"

             data-component="founder_connect"
             data-action="call"

            Call
          </a>

          <a class="btn"
             href="sms:+19859817001?body=Hi%20Marcus%2C%20this%20is%20%5BYour%20Name%5D%20%E2%80%94%20reaching%20out%20from%20Square%20Bidness."
             data-sb-event="sb_click"
             data-brand="squarebidness"
             data-component="founder_connect"
             data-action="text"
             data-label="text_founder">
            Text
          </a>

          <a class="btn secondary full"
             href="mailto:marcusbuckner@squarebidness.com?subject=Square%20Bidness%20—%20Founder%20Direct"
             data-sb-event="sb_click"
             data-brand="squarebidness"
             data-component="founder_connect"
             data-action="email"
             data-label="email_founder">
            Email
          </a>

          <a class="btn secondary full"
             href="/connect/marcus-buckner.vcf"
             download="marcus-buckner.vcf"
             data-sb-event="sb_click"
             data-brand="squarebidness"
             data-component="founder_connect"
             data-action="save_contact"
             data-label="download_vcf">
            Save Contact (vCard)
          </a>
        </div>

        <div class="detail">
          <div><strong>Direct:</strong> 985.981.7001</div>
          <div><strong>Email:</strong> marcusbuckner@squarebidness.com</div>
          <p class="slogan">Principles. Morals. Business Done Right.</p>
        </div>
      </div>

      <footer class="footer">
        <span class="chip">v20260224-sb-founder-direct</span>
        <span class="chip">/connect/founder/</span>
      </footer>
    </section>
  </main>
