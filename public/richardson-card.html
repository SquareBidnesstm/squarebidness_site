<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Richardson Business Card</title>

<style>
  body{
    margin:0;
    background:#e5e5e5;
    font-family:Arial, sans-serif;
  }

  .sheet{
    width:10.25in;
    height:3.5in;
    position:relative;
  }

  .card{
    width:3.5in;
    height:2in;
    position:absolute;
    top:0.25in;
    background:#000;
    color:#fff;
    border-radius:6px;
    overflow:hidden;
  }

  .front{ left:0.25in; }
  .back{ right:0.25in; }

  .inner{
    padding:0.25in;
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:center;
  }

  .logo{
    width:48px;
    height:48px;
    margin-bottom:10px;
  }

  .title{
    font-size:18px;
    font-weight:800;
    letter-spacing:-0.02em;
  }

  .subtitle{
    font-size:11px;
    color:#C9A227;
    letter-spacing:0.12em;
    text-transform:uppercase;
    margin-top:4px;
  }

  .tagline{
    margin-top:10px;
    font-size:11px;
    color:#aaa;
    line-height:1.4;
  }

  .divider{
    width:40px;
    height:2px;
    background:#C9A227;
    margin:10px 0;
  }

  .contact{
    font-size:12px;
    line-height:1.6;
  }

  .highlight{
    color:#C9A227;
    font-weight:700;
  }

  /* BACK SIDE */

  .back .inner{
    justify-content:space-between;
  }

  .qr{
    width:90px;
    height:90px;
    background:#fff;
    border-radius:6px;
    display:flex;
    align-items:center;
    justify-content:center;
    margin-bottom:10px;
  }

  .qr img{
    width:100%;
    height:100%;
    object-fit:contain;
  }

  .cta{
    font-size:13px;
    font-weight:700;
    color:#fff;
  }

  .cta span{
    color:#C9A227;
  }

  .footer{
    font-size:10px;
    color:#888;
  }

</style>
</head>

<body>

<div class="sheet">

  <!-- FRONT -->
  <div class="card front">
    <div class="inner">

      <img src="/richardson/icons/icon-512.png" class="logo" />

      <div class="title">Richardson Fashion</div>
      <div class="subtitle">Hammond, Louisiana</div>

      <div class="divider"></div>

      <div class="tagline">
        Prom • Weddings • Church • Business • Special Events
      </div>

      <div class="contact" style="margin-top:12px;">
        <div class="highlight">985-507-1718</div>
      </div>

    </div>
  </div>

  <!-- BACK -->
  <div class="card back">
    <div class="inner">

      <div>
        <div class="cta">
          <span>Scan</span> to view fits & book
        </div>

        <div class="qr">
          <img src="/richardson/assets/qr.png" alt="QR Code" />
        </div>
      </div>

      <div class="footer">
        Suits • Tuxedos • Alterations<br>
        2751 W Thomas St C · Hammond, LA
      </div>

    </div>
  </div>

</div>

</body>
</html>
