<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<title>Delish Meta Generator</title>
</head>
<body style="margin:0;background:#000;display:flex;justify-content:center;align-items:center;height:100vh;">

<div style="position:relative;width:1200px;height:630px;overflow:hidden;font-family:system-ui;">
  
  <img src="delish-3-meta_1200x630.jpg" 
       style="width:100%;height:100%;object-fit:cover;" />

  <!-- Gradient -->
  <div style="
    position:absolute;
    left:0;
    right:0;
    bottom:0;
    height:45%;
    background:linear-gradient(to top, rgba(0,0,0,0.75), transparent);
  "></div>

  <!-- Text -->
  <div style="
    position:absolute;
    bottom:32px;
    left:32px;
    right:32px;
    color:#fff;
  ">
    <div style="
      font-size:18px;
      color:#f2d7ad;
      font-weight:600;
      margin-bottom:6px;
    ">
      Delish • Alexandria, Louisiana
    </div>

    <div style="
      font-size:42px;
      font-weight:800;
      line-height:1.1;
    ">
      Order Online. Pick Up Fresh.
    </div>
  </div>

</div>

</body>
</html>
