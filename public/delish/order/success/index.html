<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Order Confirmed — Delish</title>
  <meta name="robots" content="noindex,nofollow" />
  <meta name="theme-color" content="#0f0f0f" />

  <link rel="icon" sizes="16x16" href="/delish/assets/delish-favicon-16.png" />
  <link rel="icon" sizes="32x32" href="/delish/assets/delish-favicon-32.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/delish/assets/delish-logo-mark-180.png" />

  <style>
    body{
      margin:0;
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      background:#0b0b0b;
      color:#fff;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
    }
    .wrap{
      width:min(100%,540px);
      text-align:center;
    }
    .badge{
      display:inline-block;
      background:#D4AF37;
      color:#000;
      padding:8px 14px;
      border-radius:999px;
      font-weight:800;
      margin-bottom:16px;
    }
    h1{
      margin:0 0 12px;
      font-size:clamp(2rem,5vw,2.6rem);
      line-height:1.02;
    }
    p{
      margin:0;
      color:#cfcfcf;
      font-size:1rem;
      line-height:1.6;
    }
    .status{
      margin-top:22px;
      background:#121212;
      border:1px solid #242424;
      border-radius:16px;
      padding:18px;
      color:#f3f3f3;
      line-height:1.6;
    }
    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:48px;
      padding:0 18px;
      margin-top:22px;
      border-radius:999px;
      background:#D4AF37;
      color:#000;
      font-weight:800;
      text-decoration:none;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="badge">Order Confirmed</div>
    <h1>Thank you. Your order is in.</h1>
    <p>
      Your payment was successful and Delish is preparing your food.
    </p>

    <div class="status">
      Please arrive during your selected pickup time.<br><br>
      Your order will be ready for pickup when you arrive.
    </div>

    <a class="btn" href="/delish/">Back to Delish</a>
  </div>
</body>
</html>
