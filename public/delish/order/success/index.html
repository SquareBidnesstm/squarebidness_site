<!-- FILE: /public/delish/order/success/index.html -->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Order Confirmed — Delish</title>
  <meta name="robots" content="noindex,nofollow" />
  <meta name="theme-color" content="#0f0f0f" />
  <style>
    body{
      margin:0;
      font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      background:#0f0f10;
      color:#f5f2ea;
    }
    .wrap{
      width:min(760px,92%);
      margin:0 auto;
      padding:64px 0;
    }
    .card{
      border:1px solid #2c2c2f;
      border-radius:24px;
      padding:28px;
      background:#171718;
    }
    h1{
      margin:0;
      font-size:clamp(2rem,4vw,3rem);
      letter-spacing:-.03em;
    }
    p{
      color:#cfc7ba;
      line-height:1.6;
    }
    .status{
      margin-top:16px;
      padding:14px 16px;
      border-radius:16px;
      background:rgba(215,174,114,.1);
      border:1px solid rgba(215,174,114,.2);
      color:#f4ead8;
    }
    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:48px;
      padding:0 18px;
      border-radius:999px;
      background:linear-gradient(180deg,#f2d7ad,#d7ae72);
      color:#181410;
      font-weight:800;
      text-decoration:none;
      margin-top:18px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Order received.</h1>
      <p>
        Your payment was completed successfully. Delish is now processing your pickup order.
      </p>
      <div id="status" class="status">Finalizing your order record...</div>
      <a class="btn" href="/delish/">Back to Delish</a>
    </div>
  </div>

  <script>
    async function finalizeOrder() {
      const statusEl = document.getElementById("status");
      const params = new URLSearchParams(window.location.search);
      const sessionId = params.get("session_id");

      if (!sessionId) {
        statusEl.textContent = "Missing session information.";
        return;
      }

      try {
        const res = await fetch(`/api/delish-finalize-checkout/?session_id=${encodeURIComponent(sessionId)}`, {
          method: "GET",
          cache: "no-store"
        });

        const data = await res.json();

        if (!data.ok) {
          throw new Error(data.error || "Unable to finalize order.");
        }

        statusEl.textContent = `Order confirmed: ${data.orderNumber}`;
      } catch (error) {
        statusEl.textContent = "Payment completed, but final order confirmation is still being processed.";
      }
    }

    finalizeOrder();
  </script>
</body>
</html>
