<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />

<title>Order Confirmed — Delish</title>

<style>
body {
  margin:0;
  font-family:system-ui;
  background:#0b0b0b;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
}

.wrap {
  max-width:500px;
  padding:30px;
  text-align:center;
}

h1 {
  font-size:28px;
  margin-bottom:10px;
}

p {
  color:#ccc;
  margin-bottom:20px;
}

.status {
  background:#111;
  padding:16px;
  border-radius:12px;
  margin-top:20px;
  font-size:15px;
}

.badge {
  display:inline-block;
  background:#D4AF37;
  color:#000;
  padding:6px 12px;
  border-radius:999px;
  font-weight:bold;
  margin-bottom:15px;
}
</style>
</head>

<body>

<div class="wrap">

  <div class="badge">Order Confirmed</div>

  <h1>Thank you. Your order is in.</h1>

  <p>
    Your payment was successful and Delish is preparing your food.
  </p>

  <div class="status">
    Please arrive during your selected pickup time.<br><br>
    Your order will be ready for pickup when you arrive.
  </div>

</div>

</body>
</html>
