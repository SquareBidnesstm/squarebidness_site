<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Delish — Ready</title>
  <meta name="robots" content="noindex,nofollow" />
  <meta name="theme-color" content="#111111" />
  <link rel="manifest" href="/delish/manifest.json" />
  <link rel="icon" sizes="16x16" href="/delish/assets/delish-favicon-16.png" />
  <link rel="icon" sizes="32x32" href="/delish/assets/delish-favicon-32.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/delish/assets/delish-logo-mark-180.png" />

  <style>
  :root{
    --bg:#0f1012;
    --panel:#181a1f;
    --panel-2:#13151a;
    --line:rgba(255,255,255,.10);
    --text:#f5f2ea;
    --muted:rgba(255,255,255,.60);
    --accent:#d7ae72;
    --accent-2:#f2d8ae;
    --good:#1d6b39;
    --good-2:#c7f5d6;
    --shadow:0 20px 50px rgba(0,0,0,.30);
  }

  *{box-sizing:border-box;margin:0;padding:0}

  html,body{
    height:100%;
    overflow:hidden;
    background:
      radial-gradient(circle at top, rgba(215,174,114,.10), transparent 35%),
      linear-gradient(180deg,#0d0e10 0%, #111318 100%);
    color:var(--text);
    font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  }

  body{
    display:flex;
    flex-direction:column;
    padding:20px;
    height:100vh;
  }

  .wrap{
    width:min(1600px,100%);
    margin:0 auto;
    flex:1;
    display:flex;
    flex-direction:column;
    min-height:0;
  }

  .header{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:18px;
    margin-bottom:14px;
    flex-shrink:0;
  }

  .brand{
    display:flex;
    align-items:center;
    gap:14px;
  }

  .logo{
    width:64px;
    height:64px;
    border-radius:16px;
    object-fit:cover;
    border:1px solid rgba(255,255,255,.08);
    background:#fff;
  }

  .title{
    font-size:clamp(1.8rem,3.5vw,3.2rem);
    line-height:1;
    font-weight:900;
    letter-spacing:-.04em;
  }

  .subline{
    margin-top:6px;
    font-size:1rem;
    color:var(--muted);
  }

  .right-meta{
    text-align:right;
    display:grid;
    gap:8px;
    min-width:220px;
  }

  .time{
    font-size:1.9rem;
    font-weight:900;
    color:var(--accent-2);
  }

  .count{
    font-size:1rem;
    color:var(--muted);
    font-weight:800;
  }

  .banner{
    margin-bottom:14px;
    padding:12px 18px;
    border-radius:16px;
    background:linear-gradient(180deg,rgba(215,174,114,.14),rgba(215,174,114,.08));
    border:1px solid rgba(215,174,114,.20);
    color:var(--accent-2);
    font-size:1rem;
    font-weight:800;
    flex-shrink:0;
  }

  .layout{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:18px;
    flex:1;
    min-height:0;
  }

  .panel{
    border-radius:24px;
    background:linear-gradient(180deg,#181b21,#14171c);
    border:1px solid var(--line);
    box-shadow:var(--shadow);
    overflow:hidden;
    display:flex;
    flex-direction:column;
    height:100%;
  }

  .panel-body{
    padding:22px;
    flex:1;
    overflow-y:auto;
    display:flex;
    flex-direction:column;
  }

  .panel-label{
    color:var(--muted);
    font-size:.85rem;
    text-transform:uppercase;
    letter-spacing:.12em;
    font-weight:900;
    margin-bottom:10px;
    flex-shrink:0;
  }

  /* NOW SERVING */
  .now-serving{
    background:
      radial-gradient(circle at top,rgba(29,107,57,.20),transparent 45%),
      linear-gradient(180deg,#1a2a20 0%,#152019 100%);
    border:1px solid rgba(29,107,57,.30);
  }

  .now-serving .panel-body{
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:32px 24px;
  }

  .now-badge{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    min-height:38px;
    padding:0 16px;
    border-radius:999px;
    background:rgba(29,107,57,.24);
    border:1px solid rgba(29,107,57,.38);
    color:var(--good-2);
    font-size:.82rem;
    letter-spacing:.12em;
    text-transform:uppercase;
    font-weight:900;
    flex-shrink:0;
  }

  @keyframes namePulse{
    0%  { text-shadow:0 0 0 rgba(199,245,214,0); }
    25% { text-shadow:0 0 60px rgba(199,245,214,.55); }
    100%{ text-shadow:0 0 0 rgba(199,245,214,0); }
  }

  .now-name{
    margin-top:18px;
    font-size:clamp(3.5rem,9vw,7.5rem);
    line-height:1;
    font-weight:900;
    letter-spacing:-.05em;
    word-break:break-word;
  }

  .now-name.is-fresh{
    animation:namePulse 1.4s ease-out forwards;
  }

  .now-number{
    margin-top:12px;
    font-size:1.25rem;
    color:var(--muted);
    font-weight:700;
    letter-spacing:.02em;
  }

  .now-window{
    margin-top:8px;
    font-size:1rem;
    color:var(--accent-2);
    font-weight:700;
  }

  /* QUEUE */
  .queue-head{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:12px;
    margin-bottom:14px;
    flex-shrink:0;
  }

  .queue-title{
    font-size:1.2rem;
    font-weight:900;
    letter-spacing:-.03em;
  }

  .queue-sub{
    color:var(--muted);
    font-size:.9rem;
    font-weight:700;
    margin-top:2px;
  }

  .queue{
    display:grid;
    gap:10px;
  }

  .queue-card{
    padding:16px 18px;
    border-radius:18px;
    background:linear-gradient(180deg,#1b1e25,#15181d);
    border:1px solid var(--line);
  }

  .queue-card.is-new{
    border-color:rgba(215,174,114,.50);
    box-shadow:0 0 0 1px rgba(215,174,114,.25) inset;
  }

  .queue-top{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:12px;
  }

  .queue-name{
    font-size:1.7rem;
    font-weight:900;
    letter-spacing:-.03em;
    line-height:1;
  }

  .queue-number{
    margin-top:6px;
    color:var(--muted);
    font-size:.9rem;
    font-weight:700;
  }

  .queue-window{
    margin-top:6px;
    font-size:.85rem;
    color:var(--accent-2);
    font-weight:700;
  }

  .queue-time{
    color:var(--muted);
    font-size:.9rem;
    font-weight:800;
    text-align:right;
    white-space:nowrap;
    flex-shrink:0;
  }

  .empty{
    padding:40px 24px;
    border-radius:20px;
    background:rgba(255,255,255,.03);
    border:1px solid var(--line);
    text-align:center;
    color:var(--muted);
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
  }

  .empty strong{
    display:block;
    font-size:1.8rem;
    color:var(--text);
    margin-bottom:8px;
    letter-spacing:-.03em;
  }

  .qr-corner{
    position:fixed;
    bottom:24px;
    right:24px;
    background:#fff;
    border-radius:16px;
    padding:12px;
    box-shadow:0 8px 32px rgba(0,0,0,.50);
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:8px;
    z-index:100;
  }

  .qr-corner img{
    width:110px;
    height:110px;
    display:block;
  }

  .qr-corner-label{
    font-size:.72rem;
    font-weight:900;
    letter-spacing:.10em;
    text-transform:uppercase;
    color:#111;
    text-align:center;
  }

  @media (max-width:700px){
    body{ padding:12px; overflow:auto; height:auto; }
    html,body{ overflow:auto; height:auto; }
    .layout{ grid-template-columns:1fr; }
    .panel{ height:auto; }
    .now-name{ font-size:3.5rem; }
    .qr-corner{ display:none; }
  }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <div class="brand">
        <img src="/delish/assets/delish-logo-mark-512.png" alt="Delish logo" class="logo" />
        <div>
          <h1 class="title" id="brandDay">Delish — Loading...</h1>
          <div class="subline" id="dateLine">Loading...</div>
        </div>
      </div>

      <div class="right-meta">
        <div class="time" id="timeNow">--:--</div>
        <div class="count" id="count">0 Orders Ready</div>
      </div>
    </div>

    <div class="banner">
      Order online &nbsp;·&nbsp; Scan the QR code &nbsp;·&nbsp; Pick up here
    </div>

    <div class="layout">
      <section class="panel now-serving">
        <div class="panel-body">
          <div class="now-badge">Now Serving</div>
          <div class="now-name" id="nowName">—</div>
          <div class="now-number" id="nowNumber"></div>
          <div class="now-window" id="nowWindow"></div>
        </div>
      </section>

      <section class="panel">
        <div class="panel-body">
          <div class="queue-head">
            <div>
              <div class="queue-title">Ready Queue</div>
              <div class="queue-sub">Recently completed pickup orders</div>
            </div>
          </div>

          <div class="queue" id="queue"></div>
        </div>
      </section>
    </div>
  </div>

  <div class="qr-corner">
    <img src="https://api.qrserver.com/v1/create-qr-code/?size=110x110&data=https://www.squarebidness.com/delish/" alt="Scan to order" />
    <div class="qr-corner-label">Scan to Order</div>
  </div>

  <script>
    const OPERATOR_TOKEN_KEY = "delish_operator_token";

    function getSavedOperatorToken() {
      try { return localStorage.getItem(OPERATOR_TOKEN_KEY) || ""; }
      catch { return ""; }
    }

    function operatorHeaders() {
      const token = getSavedOperatorToken();
      return token ? { "x-operator-token": token.trim() } : {};
    }

    let lastIds = [];

    function escapeHtml(str) {
      return String(str || "")
        .replace(/&/g,"&amp;").replace(/</g,"&lt;")
        .replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");
    }

    function firstName(fullName) {
      const raw = String(fullName || "").trim();
      if (!raw) return "";
      return raw.split(/\s+/)[0];
    }

    function updateTime() {
      const now = new Date();
      document.getElementById("timeNow").textContent = new Intl.DateTimeFormat("en-US",{
        timeZone:"America/Chicago", hour:"numeric", minute:"2-digit"
      }).format(now);
      document.getElementById("dateLine").textContent = new Intl.DateTimeFormat("en-US",{
        timeZone:"America/Chicago", weekday:"long", month:"long", day:"numeric"
      }).format(now);
      document.getElementById("brandDay").textContent = "Delish — " + new Intl.DateTimeFormat("en-US",{
        timeZone:"America/Chicago", weekday:"long"
      }).format(now);
    }

    function formatQueueTime(isoString) {
      if (!isoString) return "";
      return new Intl.DateTimeFormat("en-US",{
        timeZone:"America/Chicago", hour:"numeric", minute:"2-digit"
      }).format(new Date(isoString));
    }

    function setNowServing(name, orderNumber, window) {
      const nameEl = document.getElementById("nowName");
      const prev = nameEl.textContent;
      const next = name || "—";

      nameEl.textContent = next;

      if (prev && prev !== "—" && prev !== next) {
        nameEl.classList.remove("is-fresh");
        void nameEl.offsetWidth;
        nameEl.classList.add("is-fresh");
      }

      document.getElementById("nowNumber").textContent = orderNumber || "";
      document.getElementById("nowWindow").textContent = window || "";
    }

    function renderReadyOrders(orders) {
      const countEl  = document.getElementById("count");
      const queueEl  = document.getElementById("queue");

      countEl.textContent = `${orders.length} ${orders.length === 1 ? "Order" : "Orders"} Ready`;

      if (!orders.length) {
        setNowServing("—", "", "No ready orders right now");
        queueEl.innerHTML = `
          <div class="empty">
            <strong>No ready orders</strong>
            Completed orders will appear here.
          </div>`;
        return;
      }

      const nowServing = orders[0];
      setNowServing(
        firstName(nowServing.customerName || ""),
        nowServing.orderNumber || "",
        nowServing.pickupWindow || ""
      );

      const queueOrders = orders.slice(1);

      if (!queueOrders.length) {
        queueEl.innerHTML = `
          <div class="empty">
            <strong>Queue is clear</strong>
            No additional ready orders.
          </div>`;
        return;
      }

      queueEl.innerHTML = queueOrders.map(order => {
        const isNew = lastIds.length && !lastIds.includes(order.id);
        return `
          <article class="queue-card ${isNew ? "is-new" : ""}">
            <div class="queue-top">
              <div>
                <div class="queue-name">${escapeHtml(firstName(order.customerName || ""))}</div>
                <div class="queue-number">${escapeHtml(order.orderNumber || "")}</div>
                ${order.pickupWindow ? `<div class="queue-window">${escapeHtml(order.pickupWindow)}</div>` : ""}
              </div>
              <div class="queue-time">${escapeHtml(formatQueueTime(order.completedAt || order.createdAt || ""))}</div>
            </div>
          </article>`;
      }).join("");
    }

    async function loadReadyOrders() {
      try {
        const res = await fetch(`/api/delish/ready-orders/?t=${Date.now()}`, {
          cache:"no-store", headers:operatorHeaders()
        });
        const data = await res.json();
        if (!res.ok || !data.ok) throw new Error(data.error || "Failed to load.");
        const readyOrders = Array.isArray(data.readyOrders) ? data.readyOrders : [];
        renderReadyOrders(readyOrders);
        lastIds = readyOrders.map(o => o.id);
      } catch (error) {
        console.error("READY SCREEN ERROR:", error);
        document.getElementById("queue").innerHTML = `
          <div class="empty">
            <strong>Unable to load ready queue</strong>
            Please refresh shortly.
          </div>`;
      }
    }

    updateTime();
    loadReadyOrders();
    setInterval(updateTime, 10000);
    setInterval(loadReadyOrders, 10000);
  </script>
</body>
</html>
