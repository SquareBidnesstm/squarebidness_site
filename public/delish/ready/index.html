<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Delish — Ready</title>

<style>
  body {
    margin:0;
    font-family:system-ui;
    background:#0f1012;
    color:#fff;
  }

  .wrap {
    padding:20px;
  }

  .header {
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
  }

  .title {
    font-size:42px;
    font-weight:900;
  }

  .count {
    font-size:22px;
    opacity:.8;
  }

  .now-serving {
    background:#1d6b39;
    padding:30px;
    border-radius:16px;
    margin-bottom:20px;
    text-align:center;
  }

  .now-label {
    font-size:18px;
    opacity:.8;
  }

  .now-number {
    font-size:80px;
    font-weight:900;
  }

  .grid {
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:16px;
  }

  .card {
    background:#181a1f;
    padding:20px;
    border-radius:14px;
    text-align:center;
  }

  .order {
    font-size:40px;
    font-weight:900;
  }

  .name {
    margin-top:6px;
    opacity:.7;
  }

</style>
</head>
<body>

<div class="wrap">

  <div class="header">
    <div class="title">ORDER READY</div>
    <div class="count" id="count">0 Orders</div>
  </div>

  <div class="now-serving" id="nowServing" style="display:none;">
    <div class="now-label">NOW SERVING</div>
    <div class="now-number" id="nowNumber"></div>
  </div>

  <div class="grid" id="grid"></div>

</div>

<audio id="ding" src="https://assets.mixkit.co/sfx/preview/mixkit-bell-notification-933.mp3"></audio>

<script>
let lastIds = [];

function firstName(n){
  return (n || "").split(" ")[0];
}

async function load(){
  const res = await fetch("/api/delish/ready-orders/");
  const data = await res.json();

  const orders = data.readyOrders || [];

  document.getElementById("count").textContent = orders.length + " Orders";

  const ids = orders.map(o => o.id);

  // 🔔 SOUND ON NEW ORDER
  if(lastIds.length && ids[0] && !lastIds.includes(ids[0])){
    document.getElementById("ding").play().catch(()=>{});
  }

  lastIds = ids;

  // NOW SERVING
  if(orders[0]){
    document.getElementById("nowServing").style.display = "block";
    document.getElementById("nowNumber").textContent = orders[0].orderNumber;
  }

  // AUTO CLEAN (15 min)
  const now = Date.now();
  const filtered = orders.filter(o=>{
    const t = new Date(o.completedAt || o.createdAt).getTime();
    return (now - t) < (1000 * 60 * 15);
  });

  const grid = document.getElementById("grid");

  grid.innerHTML = filtered.slice(1).map(o=>`
    <div class="card">
      <div class="order">${o.orderNumber}</div>
      <div class="name">${firstName(o.customerName)}</div>
    </div>
  `).join("");
}

load();
setInterval(load, 10000);
</script>

</body>
</html>
