<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Delish — Ready</title>
  <meta name="robots" content="noindex,nofollow" />
  <meta name="theme-color" content="#111111" />

  <link rel="icon" sizes="32x32" href="/delish/assets/delish-favicon-32.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/delish/assets/delish-logo-mark-180.png" />

  <style>
    :root{
      --bg:#0f1012;
      --panel:#181a1f;
      --panel-2:#13151a;
      --line:rgba(255,255,255,.10);
      --text:#f5f2ea;
      --muted:rgba(255,255,255,.70);
      --accent:#d7ae72;
      --accent-2:#f2d8ae;
      --good:#1d6b39;
      --good-2:#c7f5d6;
      --shadow:0 20px 50px rgba(0,0,0,.30);
    }

    *{box-sizing:border-box}

    html,body{
      margin:0;
      min-height:100%;
      background:
        radial-gradient(circle at top, rgba(215,174,114,.10), transparent 35%),
        linear-gradient(180deg,#0d0e10 0%, #111318 100%);
      color:var(--text);
      font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    }

    body{padding:20px}

    .wrap{
      width:min(1600px, 100%);
      margin:0 auto;
    }

    .header{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:18px;
      margin-bottom:18px;
      flex-wrap:wrap;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:14px;
    }

    .logo{
      width:72px;
      height:72px;
      border-radius:18px;
      object-fit:cover;
      border:1px solid rgba(255,255,255,.08);
      background:#fff;
    }

    .title{
      margin:0;
      font-size:clamp(2rem, 4vw, 3.6rem);
      line-height:1;
      font-weight:900;
      letter-spacing:-.04em;
    }

    .subline{
      margin-top:8px;
      font-size:1.05rem;
      color:var(--muted);
    }

    .right-meta{
      text-align:right;
      display:grid;
      gap:10px;
      min-width:240px;
    }

    .time{
      font-size:2rem;
      font-weight:900;
      color:var(--accent-2);
    }

    .count{
      font-size:1.1rem;
      color:var(--muted);
      font-weight:800;
    }

    .banner{
      margin-bottom:18px;
      padding:14px 18px;
      border-radius:18px;
      background:linear-gradient(180deg, rgba(215,174,114,.14), rgba(215,174,114,.08));
      border:1px solid rgba(215,174,114,.20);
      color:var(--accent-2);
      font-size:1.05rem;
      font-weight:800;
      box-shadow:var(--shadow);
    }

    .layout{
      display:grid;
      grid-template-columns:1.1fr .9fr;
      gap:18px;
    }

    .panel{
      border-radius:28px;
      background:linear-gradient(180deg,#181b21,#14171c);
      border:1px solid var(--line);
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .panel-body{
      padding:22px;
    }

    .panel-label{
      color:var(--muted);
      font-size:.9rem;
      text-transform:uppercase;
      letter-spacing:.12em;
      font-weight:900;
      margin:0 0 10px;
    }

    .now-serving{
      min-height:430px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      text-align:center;
      background:
        radial-gradient(circle at top, rgba(29,107,57,.18), transparent 40%),
        linear-gradient(180deg,#1a2a20 0%, #152019 100%);
      border:1px solid rgba(29,107,57,.30);
    }

    .now-badge{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:42px;
      padding:0 16px;
      border-radius:999px;
      background:rgba(29,107,57,.24);
      border:1px solid rgba(29,107,57,.38);
      color:var(--good-2);
      font-size:.86rem;
      letter-spacing:.10em;
      text-transform:uppercase;
      font-weight:900;
    }

    .now-number{
      margin-top:18px;
      font-size:clamp(3rem, 9vw, 7rem);
      line-height:1;
      font-weight:900;
      letter-spacing:-.06em;
    }

    .now-customer{
      margin-top:16px;
      font-size:1.5rem;
      color:var(--accent-2);
      font-weight:800;
    }

    .now-window{
      margin-top:12px;
      font-size:1.1rem;
      color:var(--muted);
      font-weight:700;
    }

    .queue-head{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      margin-bottom:14px;
    }

    .queue-title{
      margin:0;
      font-size:1.3rem;
      font-weight:900;
      letter-spacing:-.03em;
    }

    .queue-sub{
      color:var(--muted);
      font-size:.95rem;
      font-weight:700;
    }

    .queue{
      display:grid;
      gap:12px;
    }

    .queue-card{
      padding:18px;
      border-radius:20px;
      background:linear-gradient(180deg,#1b1e25,#15181d);
      border:1px solid var(--line);
    }

    .queue-card.is-new{
      border-color:rgba(215,174,114,.45);
      box-shadow:0 0 0 1px rgba(215,174,114,.25) inset;
    }

    .queue-top{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
    }

    .queue-number{
      font-size:2rem;
      font-weight:900;
      letter-spacing:-.04em;
      line-height:1;
    }

    .queue-name{
      margin-top:8px;
      color:var(--muted);
      font-size:1rem;
      font-weight:700;
    }

    .queue-time{
      color:var(--accent-2);
      font-size:.95rem;
      font-weight:800;
      text-align:right;
      white-space:nowrap;
    }

    .empty{
      padding:40px 24px;
      border-radius:24px;
      background:var(--panel);
      border:1px solid var(--line);
      text-align:center;
      color:var(--muted);
      box-shadow:var(--shadow);
    }

    .empty strong{
      display:block;
      font-size:2rem;
      color:var(--text);
      margin-bottom:10px;
      letter-spacing:-.03em;
    }

   @media (max-width: 700px){
  .layout{
    grid-template-columns:1fr;
  }

  .now-serving{
    min-height:300px;
  }

  body{
    padding:12px;
  }

  .now-number{
    font-size:3.4rem;
  }
}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <div class="brand">
        <img src="/delish/assets/delish-logo-mark-512.png" alt="Delish logo" class="logo" />
        <div>
          <h1 class="title" id="brandDay">Delish — Loading...</h1>
          <div class="subline" id="dateLine">Loading...</div>
        </div>
      </div>

      <div class="right-meta">
        <div class="time" id="timeNow">--:--</div>
        <div class="count" id="count">0 Orders Ready</div>
      </div>
    </div>

    <div class="banner">
      Please have your order number ready when you come to the counter.
    </div>

    <div class="layout">
      <section class="panel now-serving">
        <div class="panel-body">
          <div class="now-badge">Now Serving</div>
          <div class="now-number" id="nowNumber">—</div>
          <div class="now-customer" id="nowCustomer"></div>
          <div class="now-window" id="nowWindow"></div>
        </div>
      </section>

      <section class="panel">
        <div class="panel-body">
          <div class="queue-head">
            <div>
              <h2 class="queue-title">Ready Queue</h2>
              <div class="queue-sub">Recently completed pickup orders</div>
            </div>
          </div>

          <div class="queue" id="queue"></div>
        </div>
      </section>
    </div>
  </div>

  <script>
    let lastIds = [];

    function escapeHtml(str) {
      return String(str || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function firstName(fullName) {
      const raw = String(fullName || "").trim();
      if (!raw) return "";
      return raw.split(/\s+/)[0];
    }

    function updateTime() {
      const now = new Date();

      const time = new Intl.DateTimeFormat("en-US", {
        timeZone: "America/Chicago",
        hour: "numeric",
        minute: "2-digit"
      }).format(now);

      const date = new Intl.DateTimeFormat("en-US", {
        timeZone: "America/Chicago",
        weekday: "long",
        month: "long",
        day: "numeric"
      }).format(now);

      const weekday = new Intl.DateTimeFormat("en-US", {
        timeZone: "America/Chicago",
        weekday: "long"
      }).format(now);

      document.getElementById("timeNow").textContent = time;
      document.getElementById("dateLine").textContent = date;
      document.getElementById("brandDay").textContent = `Delish — ${weekday}`;
    }

    function formatQueueTime(isoString) {
      if (!isoString) return "";
      return new Intl.DateTimeFormat("en-US", {
        timeZone: "America/Chicago",
        hour: "numeric",
        minute: "2-digit"
      }).format(new Date(isoString));
    }

    function renderReadyOrders(orders) {
      const countEl = document.getElementById("count");
      const queueEl = document.getElementById("queue");
      const nowNumberEl = document.getElementById("nowNumber");
      const nowCustomerEl = document.getElementById("nowCustomer");
      const nowWindowEl = document.getElementById("nowWindow");

      countEl.textContent = `${orders.length} ${orders.length === 1 ? "Order" : "Orders"} Ready`;

      if (!orders.length) {
        nowNumberEl.textContent = "—";
        nowCustomerEl.textContent = "";
        nowWindowEl.textContent = "No ready orders right now";

        queueEl.innerHTML = `
          <div class="empty">
            <strong>No ready orders</strong>
            Completed orders will appear here.
          </div>
        `;
        return;
      }

      const nowServing = orders[0];
      nowNumberEl.textContent = nowServing.orderNumber || "—";
      nowCustomerEl.textContent = firstName(nowServing.customerName || "");
      nowWindowEl.textContent = nowServing.pickupWindow || "";

      const queueOrders = orders.slice(1);

      if (!queueOrders.length) {
        queueEl.innerHTML = `
          <div class="empty">
            <strong>Queue is clear</strong>
            No additional ready orders behind the current order.
          </div>
        `;
        return;
      }

      queueEl.innerHTML = queueOrders.map(order => {
        const isNew = lastIds.length && !lastIds.includes(order.id);

        return `
          <article class="queue-card ${isNew ? "is-new" : ""}">
            <div class="queue-top">
              <div>
                <div class="queue-number">${escapeHtml(order.orderNumber || "")}</div>
                <div class="queue-name">${escapeHtml(firstName(order.customerName || ""))}</div>
              </div>
              <div class="queue-time">${escapeHtml(formatQueueTime(order.completedAt || order.createdAt || ""))}</div>
            </div>
          </article>
        `;
      }).join("");
    }

    async function loadReadyOrders() {
      try {
        const res = await fetch(`/api/delish/ready-orders/?t=${Date.now()}`, {
          cache: "no-store"
        });

        const data = await res.json();

        if (!res.ok || !data.ok) {
          throw new Error(data.error || "Failed to load ready orders.");
        }

       const readyOrders = Array.isArray(data.readyOrders) ? data.readyOrders : [];

        renderReadyOrders(readyOrders);
        lastIds = readyOrders.map(o => o.id);
      } catch (error) {
        console.error("READY SCREEN V3 ERROR:", error);
        document.getElementById("queue").innerHTML = `
          <div class="empty">
            <strong>Unable to load ready queue</strong>
            Please refresh shortly.
          </div>
        `;
      }
    }

    updateTime();
    loadReadyOrders();

    setInterval(updateTime, 10000);
    setInterval(loadReadyOrders, 10000);
  </script>
</body>
</html>
