<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Delish Admin</title>
  <meta name="robots" content="noindex,nofollow" />
  <style>
    :root{
      --bg:#0f0f10;
      --panel:#18181b;
      --panel2:#212126;
      --line:#32323a;
      --text:#f6f2ea;
      --muted:#bfb7aa;
      --accent:#d7ae72;
      --good:#204b2d;
      --bad:#5a2222;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      background:linear-gradient(180deg,#0e0e10 0%, #0a0a0b 100%);
      color:var(--text);
      font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    }
    .wrap{
      max-width:980px;
      margin:0 auto;
      padding:22px;
    }
    .card{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:20px;
      padding:18px;
      margin-bottom:16px;
    }
    h1,h2,h3{margin:0 0 10px}
    p{color:var(--muted)}
    .row{
      display:grid;
      grid-template-columns:repeat(3,minmax(0,1fr));
      gap:12px;
    }
    .toggle{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:14px;
      border-radius:14px;
      background:var(--panel2);
      border:1px solid var(--line);
    }
    .toggle label{
      font-weight:800;
    }
    .muted{color:var(--muted); font-size:.95rem}
    .item-list{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:10px;
    }
    .item{
      display:flex;
      align-items:center;
      gap:10px;
      padding:12px 14px;
      border-radius:14px;
      background:var(--panel2);
      border:1px solid var(--line);
    }
    textarea{
      width:100%;
      min-height:90px;
      resize:vertical;
      background:var(--panel2);
      color:var(--text);
      border:1px solid var(--line);
      border-radius:14px;
      padding:12px;
      font:inherit;
    }
    button{
      border:none;
      border-radius:999px;
      padding:14px 18px;
      font-weight:900;
      cursor:pointer;
    }
    .btn-primary{
      background:var(--accent);
      color:#181410;
    }
    .btn-secondary{
      background:#27272c;
      color:var(--text);
      border:1px solid var(--line);
    }
    .actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:14px;
    }
    .status{
      margin-top:12px;
      padding:12px 14px;
      border-radius:14px;
      background:#1a1a1f;
      border:1px solid var(--line);
      color:var(--muted);
    }
    .status.good{
      background:rgba(32,75,45,.28);
      border-color:rgba(74,155,97,.5);
      color:#d6f5de;
    }
    .status.bad{
      background:rgba(90,34,34,.28);
      border-color:rgba(196,88,88,.45);
      color:#ffd3d3;
    }
    .topline{
      display:flex;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
      align-items:center;
    }
    .token-row{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }
    .token-badge{
      padding:8px 12px;
      border-radius:999px;
      background:#27272c;
      border:1px solid var(--line);
      font-weight:800;
    }
    @media (max-width: 800px){
      .row,.item-list{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="topline">
        <div>
          <h1>Delish Admin v1</h1>
          <p>Live menu controls for kitchen-side operators.</p>
        </div>
        <div class="token-row">
          <span class="token-badge" id="tokenStatus">Token not saved</span>
          <button class="btn-secondary" id="clearTokenBtn">Clear Token</button>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>Sections</h2>
      <div class="row">
        <div class="toggle">
          <label for="lagniappeToggle">Lagniappe</label>
          <input type="checkbox" id="lagniappeToggle" checked />
        </div>
        <div class="toggle">
          <label for="drinksToggle">Drinks</label>
          <input type="checkbox" id="drinksToggle" checked />
        </div>
        <div class="toggle">
          <label for="extraSidesToggle">Extra Sides</label>
          <input type="checkbox" id="extraSidesToggle" checked />
        </div>
      </div>
    </div>

    <div class="card">
      <h2>Turn Off Individual Items</h2>
      <p class="muted">Checked items are hidden from Delish and blocked in checkout.</p>
      <div class="item-list" id="itemsOffList"></div>
    </div>

    <div class="card">
      <h2>Customer Banner Message</h2>
      <p class="muted">Optional live message shown at the top of the Delish order page.</p>
      <textarea id="customerMessage" placeholder="Example: Black Eyed Peas sold out for today."></textarea>

      <div class="actions">
        <button class="btn-primary" id="saveBtn">Save Admin Changes</button>
        <button class="btn-secondary" id="reloadBtn">Reload Current Overrides</button>
      </div>

      <div class="status" id="statusBox">Ready.</div>
    </div>
  </div>

  <script>
    const TOKEN_KEY = "delish_operator_token";
    const statusBox = document.getElementById("statusBox");
    const tokenStatus = document.getElementById("tokenStatus");

    const ITEM_CATALOG = [
      { id: "monday_red_beans_fried_chicken", name: "Monday - Red Beans or Okra with Fried Chicken" },
      { id: "monday_hamburger_steak", name: "Monday - Hamburger Steak Plate" },
      { id: "tuesday_beef_tips", name: "Tuesday - Beef Tips Plate" },
      { id: "tuesday_meatloaf", name: "Tuesday - Meatloaf Plate" },
      { id: "wednesday_pork_neckbones", name: "Wednesday - Pork Neckbones Plate" },
      { id: "wednesday_baked_chicken", name: "Wednesday - Baked Chicken Plate" },
      { id: "wednesday_country_fried_steak", name: "Wednesday - Country Fried Steak Plate" },
      { id: "thursday_turkey_wings", name: "Thursday - Turkey Wings Plate" },
      { id: "friday_crawfish_etouffee", name: "Friday - Crawfish Étouffée Plate" },
      { id: "friday_shrimp_pasta", name: "Friday - Shrimp Pasta Plate" },
      { id: "friday_fried_catfish", name: "Friday - Fried Catfish Plate" },
      { id: "friday_baked_catfish", name: "Friday - Baked Catfish Plate" },
      { id: "sunday_pork_steak_gravy", name: "Sunday - Pork Steak and Gravy Plate" },
      { id: "sunday_oxtails", name: "Sunday - Oxtails Plate" },
      { id: "sunday_baked_chicken", name: "Sunday - Baked Chicken Plate" },

      { id: "drink_tropical_punch_koolaid", name: "Drink - Tropical Punch Kool-Aid" },
      { id: "drink_lemonade", name: "Drink - Lemonade" },
      { id: "drink_can_soda", name: "Drink - Can Soda" },
      { id: "drink_bottle_water", name: "Drink - Bottle Water" },

      { id: "lagniappe_grilled_chicken_salad", name: "Lagniappe - Grilled Chicken Salad" },
      { id: "lagniappe_grilled_shrimp_salad", name: "Lagniappe - Grilled Shrimp Salad" },
      { id: "lagniappe_both_meat_salad", name: "Lagniappe - Both Meat Salad" },
      { id: "lagniappe_chicken_tender_basket_fries", name: "Lagniappe - Chicken Tender Basket with Fries" },
      { id: "lagniappe_fried_porkchop_sandwich_fries", name: "Lagniappe - Fried Porkchop Sandwich with Fries" },
      { id: "lagniappe_cheeseburger_basket", name: "Lagniappe - Cheeseburger Basket" },

      { id: "extra_side_mac_and_cheese", name: "Extra Side - Mac and Cheese" },
      { id: "extra_side_yams", name: "Extra Side - Yams" },
      { id: "extra_side_corn", name: "Extra Side - Corn" },
      { id: "extra_side_cabbage", name: "Extra Side - Cabbage" },
      { id: "extra_side_green_salad", name: "Extra Side - Green Salad" },
      { id: "extra_side_black_eyed_peas", name: "Extra Side - Black Eyed Peas" },
      { id: "extra_side_green_beans", name: "Extra Side - Green Beans" },
      { id: "extra_side_potato_salad", name: "Extra Side - Potato Salad" },
      { id: "extra_side_rice_dressing", name: "Extra Side - Rice Dressing" }
    ];

    function setStatus(text, tone = "") {
      statusBox.textContent = text;
      statusBox.className = "status" + (tone ? ` ${tone}` : "");
    }

    function getSavedToken() {
      try {
        return localStorage.getItem(TOKEN_KEY) || "";
      } catch {
        return "";
      }
    }

    function saveToken(token) {
      try {
        localStorage.setItem(TOKEN_KEY, token);
      } catch {}
      updateTokenStatus();
    }

    function clearToken() {
      try {
        localStorage.removeItem(TOKEN_KEY);
      } catch {}
      updateTokenStatus();
    }

    function updateTokenStatus() {
      tokenStatus.textContent = getSavedToken() ? "Token saved" : "Token not saved";
    }

    function renderItemList(selected = []) {
      const selectedSet = new Set(selected);
      const wrap = document.getElementById("itemsOffList");
      wrap.innerHTML = ITEM_CATALOG.map(item => `
        <label class="item">
          <input type="checkbox" value="${item.id}" ${selectedSet.has(item.id) ? "checked" : ""} />
          <span>${item.name}</span>
        </label>
      `).join("");
    }

    async function loadOverrides() {
      setStatus("Loading current overrides...");
      const res = await fetch("/api/delish/menu-overrides/", { cache: "no-store" });
      const data = await res.json();

      if (!res.ok || !data.ok) {
        throw new Error(data.error || "Failed to load overrides.");
      }

      const overrides = data.overrides || {};
      document.getElementById("lagniappeToggle").checked = overrides?.sections?.lagniappe !== false;
      document.getElementById("drinksToggle").checked = overrides?.sections?.drinks !== false;
      document.getElementById("extraSidesToggle").checked = overrides?.sections?.extraSides !== false;
      document.getElementById("customerMessage").value = overrides.customerMessage || "";
      renderItemList(Array.isArray(overrides.itemsOff) ? overrides.itemsOff : []);
      setStatus("Overrides loaded.", "good");
    }

    async function saveOverrides() {
      let token = getSavedToken();

      if (!token) {
        token = window.prompt("Enter Delish operator token");
        if (!token) {
          setStatus("Save cancelled.");
          return;
        }
        if (window.confirm("Save token on this device?")) {
          saveToken(token.trim());
        }
      }

      const itemsOff = [...document.querySelectorAll("#itemsOffList input:checked")].map(el => el.value);

      const payload = {
        sections: {
          lagniappe: document.getElementById("lagniappeToggle").checked,
          drinks: document.getElementById("drinksToggle").checked,
          extraSides: document.getElementById("extraSidesToggle").checked
        },
        itemsOff,
        customerMessage: document.getElementById("customerMessage").value.trim()
      };

      setStatus("Saving admin changes...");

      const res = await fetch("/api/delish/save-menu-overrides/", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-operator-token": token.trim()
        },
        body: JSON.stringify(payload)
      });

      const data = await res.json().catch(() => ({}));

      if (!res.ok || !data.ok) {
        if (res.status === 401) {
          clearToken();
        }
        throw new Error(data.error || "Failed to save overrides.");
      }

      setStatus("Admin changes saved.", "good");
      await loadOverrides();
    }

    document.getElementById("saveBtn").addEventListener("click", saveOverrides);
    document.getElementById("reloadBtn").addEventListener("click", loadOverrides);
    document.getElementById("clearTokenBtn").addEventListener("click", () => {
      clearToken();
      setStatus("Saved token cleared.");
    });

    updateTokenStatus();
    loadOverrides().catch((err) => {
      console.error(err);
      setStatus(err.message || "Unable to load admin.", "bad");
      renderItemList([]);
    });
  </script>
</body>
</html>
