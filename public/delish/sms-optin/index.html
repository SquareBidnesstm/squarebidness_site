<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />

  <title>Delish — SMS Consent</title>
  <meta name="description" content="Demonstration of Delish transactional SMS opt-in language for checkout and catering request flows." />
  <meta name="robots" content="index,follow" />
  <meta name="theme-color" content="#0f0f0f" />

  <link rel="canonical" href="https://www.squarebidness.com/delish/sms-optin/" />
  <link rel="icon" type="image/png" sizes="16x16" href="/delish/assets/delish-favicon-16.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="/delish/assets/delish-favicon-32.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/delish/assets/delish-logo-mark-180.png" />

  <style>
    body{
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background:#0f0f10;
      color:#f5f2ea;
      margin:0;
      padding:40px 20px;
    }

    .wrap{
      max-width:680px;
      margin:0 auto;
      background:#171718;
      border:1px solid #2c2c2f;
      border-radius:16px;
      padding:24px;
      box-shadow:0 18px 40px rgba(0,0,0,.28);
    }

    h1{ margin-top:0; }

    p{
      color:#d4ccc0;
      line-height:1.6;
    }

    label{
      display:block;
      margin-top:16px;
    }

    input[type="tel"]{
      width:100%;
      padding:12px;
      margin-top:6px;
      background:#0f0f10;
      border:1px solid #2a2a2a;
      color:#fff;
      border-radius:10px;
    }

    .smsConsent{
      display:flex;
      gap:10px;
      align-items:flex-start;
      margin-top:16px;
      padding:14px;
      border:1px solid #2a2a2a;
      border-radius:12px;
      background:#101012;
    }

    .smsConsent input{
      margin-top:4px;
      transform:scale(1.15);
    }

    .smsConsent span{
      font-size:.92rem;
      line-height:1.45;
      color:#ddd5c9;
    }

    a{
      color:#fff;
      text-decoration:underline;
    }

    .tiny{
      opacity:.82;
      font-size:.85rem;
      margin-top:10px;
    }
  </style>

  <script defer src="/scripts/sb-analytics.js"></script>
</head>
<body>
  <div class="wrap">
    <h1>SMS Consent (Optional)</h1>

    <p>
      This page demonstrates how customers opt in to receive transactional SMS messages from Delish.
    </p>

    <label>
      Phone Number (Optional)
      <input type="tel" placeholder="(xxx) xxx-xxxx" />
    </label>

    <label class="smsConsent">
      <input type="checkbox" />
      <span>
        I agree to receive <strong>transactional SMS messages</strong> from Delish related to my order or catering request,
        including confirmations, status updates, pickup notifications, and deposit/payment confirmations.
        Message frequency varies. Message and data rates may apply.
        Reply <strong>STOP</strong> to opt out. Reply <strong>HELP</strong> for assistance.
        <br /><br />
        <strong>Phone number is optional.</strong> If you do not opt in, you will not receive SMS messages.
        <br /><br />
        <a href="https://www.squarebidness.com/delish/privacy/">Privacy Policy</a> ·
        <a href="https://www.squarebidness.com/delish/terms/">SMS Terms &amp; Conditions</a>
      </span>
    </label>

    <p class="tiny">
      Customers must actively check the box above to provide consent. No marketing or promotional messages are sent.
    </p>
  </div>
</body>
</html>
