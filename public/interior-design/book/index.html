<style>
  :root{
    --gold:#b79c6e; --gold2:#8f7a55;
    --bg:#0e0e0e; --panel:#111; --ink:#fff;
    --muted:rgba(255,255,255,.78);
    --line:rgba(255,255,255,.12);
    --radius:18px;
    --shadow:0 18px 40px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:radial-gradient(1200px 700px at 15% 10%, rgba(183,156,110,.18), transparent 55%),
               radial-gradient(900px 600px at 85% 40%, rgba(183,156,110,.10), transparent 55%),
               var(--bg);
    color:var(--ink);
  }
  .wrap{max-width:980px;margin:0 auto;padding:0 18px}
  header{padding:26px 0 6px}
  .top{display:flex;align-items:center;justify-content:space-between;gap:12px}
  .brand b{letter-spacing:.9px}
  .brand span{
    display:block;font-size:12px;letter-spacing:1.8px;text-transform:uppercase;
    color:rgba(255,255,255,.70);margin-top:4px
  }
  a.back{
    color:rgba(255,255,255,.86);
    text-decoration:none;
    border:1px solid var(--line);
    padding:10px 14px;
    border-radius:999px;
  }
  a.back:hover{border-color:rgba(255,255,255,.22)}

  .panel{
    margin:18px 0 40px;
    background:rgba(17,17,17,.92);
    border:1px solid var(--line);
    border-radius:calc(var(--radius) + 6px);
    box-shadow:var(--shadow);
    overflow:hidden;
  }
  .panel-head{
    padding:22px 20px 16px;
    border-bottom:1px solid var(--line);
    background:linear-gradient(90deg, rgba(183,156,110,.10), transparent 60%);
  }
  .panel-head h1{margin:0 0 6px;font-size:26px;letter-spacing:.4px}
  .panel-head p{margin:0;color:var(--muted);line-height:1.55}

  form{padding:18px 20px 22px}
  label{display:block;margin:10px 0}
  label span{
    display:block;
    font-size:12px;
    letter-spacing:.8px;
    text-transform:uppercase;
    color:rgba(255,255,255,.78);
    margin:0 0 6px;
  }
  input,select,textarea{
    width:100%;
    padding:12px 12px;
    border-radius:12px;
    border:1px solid var(--line);
    background:rgba(255,255,255,.06);
    color:#fff;
    outline:none;
  }
  input::placeholder,textarea::placeholder{color:rgba(255,255,255,.55)}
  input:focus,select:focus,textarea:focus{
    border-color:rgba(183,156,110,.55);
    box-shadow:0 0 0 4px rgba(183,156,110,.15);
  }
  select{appearance:none}
  .row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  @media (max-width:860px){.row{grid-template-columns:1fr}}

  .btn{
    display:inline-block;
    margin-top:12px;
    padding:12px 18px;
    background:var(--gold);
    color:#fff;
    text-decoration:none;
    letter-spacing:1px;
    border-radius:999px;
    transition:.25s ease;
    border:1px solid rgba(0,0,0,.18);
    cursor:pointer;
  }
  .btn:hover{background:var(--gold2)}
  .fineprint{
    margin-top:10px;
    font-size:12px;
    color:rgba(255,255,255,.62);
    line-height:1.4;
  }

  footer{
    padding:18px 0 36px;
    text-align:center;
    color:rgba(255,255,255,.55);
    font-size:12px;
    letter-spacing:.6px;
  }
</style>
</head>

<body>

<header>
  <div class="wrap top">
    <div class="brand">
      <b>Interior Design by Monica</b>
      <span>Consultation Request</span>
    </div>
    <a class="back" href="/interior-design/">← Back</a>
  </div>
</header>

<main class="wrap">
  <div class="panel">
    <div class="panel-head">
      <h1>Book a Consultation</h1>
      <p>Share your project details below. Monica will follow up to confirm next steps.</p>
    </div>

    <!-- NOTE: mailto opens the visitor's email app. We'll wire a real submit endpoint later. -->
    <form action="mailto:monicacarter@squarebidness.com" method="post" enctype="text/plain">
      <div class="row">
        <label>
          <span>Full Name</span>
          <input name="name" type="text" autocomplete="name" required />
        </label>
        <label>
          <span>Phone</span>
          <input name="phone" type="tel" autocomplete="tel" required />
        </label>
      </div>

      <label>
        <span>Email</span>
        <input name="email" type="email" autocomplete="email" required />
      </label>

      <div class="row">
        <label>
          <span>City / State</span>
          <input name="location" type="text" placeholder="City, State" required />
        </label>
        <label>
          <span>Project Type</span>
          <select name="project_type" required>
            <option value="" selected disabled>Select one</option>
            <option>Room Refresh</option>
            <option>Full Home</option>
            <option>Renovation / Remodel</option>
            <option>Staging</option>
            <option>Other</option>
          </select>
        </label>
      </div>

      <label>
        <span>Tell Monica what you want done</span>
        <textarea name="details" rows="6" placeholder="Budget range, timeline, rooms, goals, etc." required></textarea>
      </label>

      <button class="btn" type="submit">Send Request</button>

      <div class="fineprint">
        By submitting, you agree Monica may contact you by phone/email to follow up.
      </div>
    </form>
  </div>
</main>

<footer>
  © <span id="y"></span> Interior Design by Monica — Designed with Intention
</footer>

<script>document.getElementById('y').textContent=new Date().getFullYear();</script>
</body>
</html>
